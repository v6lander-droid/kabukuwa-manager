<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beetle Base - 統合管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>table { writing-mode: horizontal-tb !important; }</style>
</head>
<body class="bg-neutral-950 text-white font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [selectedCreature, setSelectedCreature] = useState(null);
            const [creatures, setCreatures] = useState(() => {
                const saved = localStorage.getItem('beetle_data');
                return saved ? JSON.parse(saved) : Array.from({ length: 50 }, (_, i) => ({
                    id: (i + 1).toString(), name: `個体 ${i + 1}号`, alias: '極太血統',
                    origin: '福岡県久留米市', generation: 'F5', stage: '幼虫', saleStatus: '非売', 
                    size: '80', hatchDate: '2026-04-01', 
                    history: [{date: '2026-05-01', item: '孵化', size: '10'}]
                }));
            });

            useEffect(() => { localStorage.setItem('beetle_data', JSON.stringify(creatures)); }, [creatures]);

            const toggleSaleStatus = (id, e) => {
                e.stopPropagation();
                const statuses = ['非売', '予備', '販売'];
                setCreatures(creatures.map(c => c.id === id ? { ...c, saleStatus: statuses[(statuses.indexOf(c.saleStatus) + 1) % 3] } : c));
            };

            const updateCreature = (updated) => {
                setCreatures(creatures.map(c => c.id === updated.id ? updated : c));
                setSelectedCreature(updated);
            };

            if (selectedCreature) return <DetailView creature={selectedCreature} creatures={creatures} onBack={() => setSelectedCreature(null)} onUpdate={updateCreature} />;

            return (
                <div className="p-4">
                    <nav className="mb-4 flex justify-between items-center font-bold text-emerald-400">
                        <span>Beetle Base - 全個体一覧</span>
                        <button onClick={() => { const n = {id:Date.now().toString(), name:'新規個体', history:[], stage:'幼虫', saleStatus:'非売', size:'0', hatchDate:'2026-04-01'}; setCreatures([n,...creatures]); setSelectedCreature(n); }} className="bg-emerald-600 px-3 py-1 rounded text-white">➕ 追加</button>
                    </nav>
                    <div className="overflow-x-auto bg-neutral-900 rounded-lg">
                        <table className="w-full text-sm text-white">
                            <thead><tr className="bg-neutral-800 text-left border-b border-neutral-700">
                                <th className="p-3">販売</th><th className="p-3">個体名</th><th className="p-3">サイズ</th><th className="p-3">孵化日</th><th className="p-3">操作</th>
                            </tr></thead>
                            <tbody>{creatures.map(c => <tr key={c.id} className="border-b border-neutral-800 cursor-pointer hover:bg-neutral-800" onClick={() => setSelectedCreature(c)}>
                                <td className="p-3"><button onClick={(e) => toggleSaleStatus(c.id, e)} className={`px-2 py-1 rounded text-xs ${c.saleStatus === '販売' ? 'bg-emerald-600' : 'bg-neutral-600'}`}>{c.saleStatus}</button></td>
                                <td className="p-3 font-bold">{c.name}</td><td className="p-3">{c.size}</td><td className="p-3">{c.hatchDate}</td>
                                <td className="p-3"><button onClick={(e) => {e.stopPropagation(); if(confirm('削除?')) setCreatures(creatures.filter(x=>x.id!==c.id))}} className="bg-emerald-600 px-2 py-1 rounded">削除</button></td>
                            </tr>)}</tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function DetailView({ creature, creatures, onBack, onUpdate }) {
            const [form, setForm] = useState(creature);
            const [showEdit, setShowEdit] = useState(false);
            const [showRec, setShowRec] = useState(false);
            const canvasRef = useRef(null);

            useEffect(() => {
                const ctx = canvasRef.current.getContext('2d');
                ctx.clearRect(0, 0, 400, 200);
                ctx.fillStyle = 'white'; ctx.font = '10px sans-serif';
                ctx.strokeStyle = '#374151';
                // 目盛とラベル
                for(let i=0; i<=4; i++) {
                    const y = 20 + i * 40;
                    ctx.beginPath(); ctx.moveTo(30, y); ctx.lineTo(380, y); ctx.stroke();
                    ctx.fillText(((4 - i) * 12.5).toFixed(0) + 'g', 0, y + 3);
                }
                // グラフ描画ロジックは略 (前回同様)
            }, [form]);

            return (
                <div className="p-6 max-w-lg mx-auto text-white">
                    <button onClick={onBack} className="text-emerald-400 font-bold mb-4">← 一覧へ</button>
                    <div className="bg-neutral-900 p-6 rounded-xl space-y-4">
                        <h2 className="text-xl font-bold">{form.name} <button onClick={() => setShowEdit(true)} className="text-xs bg-neutral-700 px-2 py-1 rounded">編集</button></h2>
                        <p>孵化日: {form.hatchDate}</p>
                        <canvas ref={canvasRef} width="400" height="200" className="w-full border border-neutral-700" />
                        <table className="w-full text-xs">
                            {form.history.sort((a,b)=>new Date(a.date)-new Date(b.date)).map((h,i) => (
                                <tr key={i} className="border-b border-neutral-800">
                                    <td className="py-2">{h.item}</td><td className="py-2">{h.size}g</td><td className="py-2 text-right">{h.date}</td>
                                </tr>
                            ))}
                        </table>
                        <button onClick={() => setShowRec(true)} className="w-full bg-emerald-600 p-2 rounded">＋ 記録追加</button>
                    </div>
                    {/* 編集・追加用モーダル（グレーの入力欄） */}
                    {(showEdit || showRec) && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4">
                            <div className="bg-neutral-900 p-6 rounded-xl w-full max-w-sm border border-neutral-700 space-y-4">
                                <h3 className="font-bold">{showEdit ? '詳細編集' : '記録追加'}</h3>
                                <input className="w-full bg-neutral-800 p-2 rounded" placeholder="項目名" />
                                <button onClick={() => {setShowEdit(false); setShowRec(false);}} className="w-full bg-emerald-600 p-2 rounded">保存</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
