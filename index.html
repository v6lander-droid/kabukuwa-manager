        // ---- 画像トリミングモーダル：画像選択後、保存前にトリミング範囲（位置・拡大率）を調整できる ----
        // aspect: 'square'（正方形固定）または 'free'（自由なアスペクト比、frameW/frameHで指定した枠形状を使う）
        function ImageCropperModal({ imageSrc, aspect, frameW, frameH, outputSize, onConfirm, onCancel }) {
            const containerRef = useRef(null);
            const imgElRef = useRef(null);
            const [imgNatural, setImgNatural] = useState({ w: 0, h: 0 });
            const [offset, setOffset] = useState({ x: 0, y: 0 }); // 画像左上のオフセット（枠基準の座標系、px）
            const [zoom, setZoom] = useState(1);
            const [baseScale, setBaseScale] = useState(1); // 画像が枠を覆うために最低限必要な拡大率
            const dragRef = useRef({ active: false, startX: 0, startY: 0, startOffset: { x: 0, y: 0 } });
            const pinchRef = useRef({ active: false, startDist: 0, startZoom: 1 });

            // 表示用の枠サイズ（画面上のCSSピクセル）。アイコンは正方形、個体写真は frameW:frameH の比率を保った大きめの枠。
            const FRAME_W = aspect === 'square' ? 240 : (frameW || 280);
            const FRAME_H = aspect === 'square' ? 240 : (frameH || 280 * (frameH && frameW ? frameH / frameW : 0.75));

            useEffect(() => {
                const img = new Image();
                img.onload = () => {
                    setImgNatural({ w: img.width, h: img.height });
                    // 画像が枠全体を覆うために必要な最小スケールを計算し、初期表示はそのスケール・中央配置にする
                    const scale = Math.max(FRAME_W / img.width, FRAME_H / img.height);
                    setBaseScale(scale);
                    setZoom(1);
                    setOffset({
                        x: (FRAME_W - img.width * scale) / 2,
                        y: (FRAME_H - img.height * scale) / 2,
                    });
                };
                img.src = imageSrc;
                // eslint-disable-next-line
            }, [imageSrc]);

            const currentScale = baseScale * zoom;

            const clampOffset = (off, scale) => {
                const w = imgNatural.w * scale, h = imgNatural.h * scale;
                // 画像が枠より大きい軸は、枠をはみ出さない範囲でドラッグ可能（従来通り）。
                // 画像を縮小して枠より小さくなった軸は、ドラッグの自由度をなくし常に中央寄せにする
                // （はみ出していないのでドラッグしても見た目が変わらないため、固定した方が直感的）。
                let x, y;
                if (w >= FRAME_W) {
                    x = Math.min(0, Math.max(FRAME_W - w, off.x));
                } else {
                    x = (FRAME_W - w) / 2;
                }
                if (h >= FRAME_H) {
                    y = Math.min(0, Math.max(FRAME_H - h, off.y));
                } else {
                    y = (FRAME_H - h) / 2;
                }
                return { x, y };
            };

            const handlePointerDown = (e) => {
                e.preventDefault();
                if (e.touches && e.touches.length === 2) {
                    pinchRef.current = {
                        active: true,
                        startDist: Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY),
                        startZoom: zoom,
                    };
                    return;
                }
                const point = e.touches ? e.touches[0] : e;
                dragRef.current = { active: true, startX: point.clientX, startY: point.clientY, startOffset: { ...offset } };
            };
            const handlePointerMove = (e) => {
                if (e.touches && e.touches.length === 2 && pinchRef.current.active) {
                    e.preventDefault();
                    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    const ratio = dist / pinchRef.current.startDist;
                    const newZoom = Math.min(4, Math.max(0.3, pinchRef.current.startZoom * ratio));
                    setZoom(newZoom);
                    setOffset(prev => clampOffset(prev, baseScale * newZoom));
                    return;
                }
                if (!dragRef.current.active) return;
                e.preventDefault();
                const point = e.touches ? e.touches[0] : e;
                const dx = point.clientX - dragRef.current.startX;
                const dy = point.clientY - dragRef.current.startY;
                const next = { x: dragRef.current.startOffset.x + dx, y: dragRef.current.startOffset.y + dy };
                setOffset(clampOffset(next, currentScale));
            };
            const handlePointerUp = () => {
                dragRef.current.active = false;
                pinchRef.current.active = false;
            };

            const handleWheel = (e) => {
                e.preventDefault();
                const delta = e.deltaY < 0 ? 0.1 : -0.1;
                const newZoom = Math.min(4, Math.max(0.3, zoom + delta));
                setZoom(newZoom);
                setOffset(prev => clampOffset(prev, baseScale * newZoom));
            };

            const handleConfirm = () => {
                const canvas = document.createElement('canvas');
                const outW = outputSize || 200;
                const outH = aspect === 'square' ? outW : Math.round(outW * (FRAME_H / FRAME_W));
                canvas.width = outW; canvas.height = outH;
                const ctx = canvas.getContext('2d');
                // 画像を縮小して枠を覆いきれない場合、その部分は黒で塗りつぶす（プレビューの黒背景と同じ見た目にする）
                ctx.fillStyle = '#000000';
                ctx.fillRect(0, 0, outW, outH);
                const img = imgElRef.current;
                // 枠座標系(FRAME_W x FRAME_H)での画像描画位置・サイズを、出力解像度(outW x outH)に比例変換する
                const ratio = outW / FRAME_W;
                ctx.drawImage(
                    img,
                    offset.x * ratio, offset.y * ratio,
                    imgNatural.w * currentScale * ratio, imgNatural.h * currentScale * ratio
                );
                const mime = 'image/jpeg';
                const quality = 0.5;
                onConfirm(canvas.toDataURL(mime, quality));
            };

            return (
                <div style={{ position: 'fixed', inset: 0, zIndex: 3000 }} className="bg-black/80 flex items-center justify-center p-4">
                    <div className="bg-neutral-900 rounded-xl border border-neutral-700 p-4 max-w-sm w-full space-y-3">
                        <h3 className="text-sm font-bold text-white">トリミング範囲を調整</h3>
                        <div
                            ref={containerRef}
                            style={{ width: FRAME_W, height: FRAME_H, position: 'relative', overflow: 'hidden', touchAction: 'none', margin: '0 auto' }}
                            className="bg-neutral-950 rounded-lg border border-neutral-700"
                            onMouseDown={handlePointerDown}
                            onMouseMove={handlePointerMove}
                            onMouseUp={handlePointerUp}
                            onMouseLeave={handlePointerUp}
                            onTouchStart={handlePointerDown}
                            onTouchMove={handlePointerMove}
                            onTouchEnd={handlePointerUp}
                            onWheel={handleWheel}
                        >
                            {imgNatural.w > 0 && (
                                <img
                                    ref={imgElRef}
                                    src={imageSrc}
                                    alt="トリミング対象"
                                    draggable={false}
                                    style={{
                                        position: 'absolute',
                                        left: offset.x, top: offset.y,
                                        width: imgNatural.w * currentScale, height: imgNatural.h * currentScale,
                                        userSelect: 'none', pointerEvents: 'none',
                                    }}
                                />
                            )}
                        </div>
                        <p className="text-[10px] text-neutral-500 text-center">ドラッグで位置調整、ピンチまたはホイールで拡大縮小できます。</p>
                        <div className="flex gap-2">
                            <button onClick={onCancel} className="flex-1 bg-neutral-700 py-2 rounded font-bold text-white text-sm">キャンセル</button>
                            <button onClick={handleConfirm} className="flex-1 bg-emerald-600 py-2 rounded font-bold text-white text-sm">この範囲で確定</button>
                        </div>
                    </div>
                </div>
            );
        }

        const GROWTH_TABLE = [
            {day:0,w:0},{day:30,w:0.5},{day:60,w:1.5},{day:90,w:3.5},
            {day:120,w:6.0},{day:150,w:9.0},{day:180,w:13.0},{day:210,w:17.0},
            {day:240,w:21.0},{day:270,w:24.0},{day:300,w:26.5},{day:330,w:28.0},
            {day:360,w:29.0},{day:400,w:29.5},{day:450,w:29.0},{day:500,w:28.0},
        ];
        function getIdealWeight(days) {
            if (days === null || days < 0) return null;
            var t = GROWTH_TABLE;
            if (days <= t[0].day) return t[0].w;
            if (days >= t[t.length-1].day) return t[t.length-1].w;
            for (var i = 0; i < t.length-1; i++) {
                if (days >= t[i].day && days <= t[i+1].day) {
                    var r = (days - t[i].day) / (t[i+1].day - t[i].day);
                    return t[i].w + r * (t[i+1].w - t[i].w);
                }
            }
            return null;
        }
        function calcGrowthRate(hatchDate, h, tbl) {
            if (!h) return null;
            var weightG = parseFloat((h.size || '').replace(/[^0-9.]/g, ''));
            if (isNaN(weightG) || weightG <= 0) return null;
            if (!hatchDate || hatchDate === '-') return null;
            var origin = new Date(hatchDate);
            if (isNaN(origin.getTime())) return null;
            if (!h.date) return null;
            var recDate = new Date(h.date);
            if (isNaN(recDate.getTime())) return null;
            var elapsed = Math.round((recDate - origin) / 86400000);
            var ideal = getIdealWeightFromTable(elapsed, tbl || GROWTH_TABLE);
            if (!ideal) return null;
            return Math.round((weightG / ideal - 1) * 100);
        }
        function getIdealWeightFromTable(days, tbl) {
            if (!tbl || tbl.length === 0 || days === null || days < 0) return null;
            if (days <= tbl[0].day) return tbl[0].w || null;
            if (days >= tbl[tbl.length-1].day) return tbl[tbl.length-1].w || null;
            for (var i = 0; i < tbl.length-1; i++) {
                if (days >= tbl[i].day && days <= tbl[i+1].day) {
                    var r = (days - tbl[i].day) / (tbl[i+1].day - tbl[i].day);
                    return tbl[i].w + r * (tbl[i+1].w - tbl[i].w);
                }
            }
            return null;
        }
        function GrowthRateSpan(props) {
            var rate = props.rate;
            if (rate === null || rate === undefined) return React.createElement('span', {style:{color:'#737373'}}, '-');
            var color = rate >= 10 ? '#34d399' : rate >= 0 ? '#86efac' : rate >= -10 ? '#fbbf24' : '#f87171';
            return React.createElement('span', {style:{color:color, fontWeight:'bold'}}, (rate > 0 ? '+' : '') + rate + '%');
        }
        function App() {
            const [selectedCreature, setSelectedCreature] = useState(null);
            const [activeTab, setActiveTab] = useState('一覧');
            const [highlightId, setHighlightId] = useState(null);
            const [showAddModal, setShowAddModal] = useState(false);
            const [showGrowthSettings, setShowGrowthSettings] = useState(false);
            const [growthAlias, setGrowthAlias] = useState('');
            const [growthTarget, setGrowthTarget] = useState(80);
            const [showSavePrompt, setShowSavePrompt] = useState(false);
            const [pendingSaveData, setPendingSaveData] = useState(null);
            const [newCreatureData, setNewCreatureData] = useState({ name: '新規個体', alias: '', origin: '', generation: '', hatchDate: '-', emergenceDate: '-', maleParent: '', femaleParent: '', stage: '幼虫', saleStatus: '使用', sex: 'オス', emergenceSize: '' });
            const [maleSelection, setMaleSelection] = useState('');
            const [femaleSelection, setFemaleSelection] = useState('');
            const [saveError, setSaveError] = useState(false);
            const [loadFailed, setLoadFailed] = useState(false);
            const [pedigreeLines, setPedigreeLines] = useState(() => {
                try {
                    const saved = localStorage.getItem('beetle_pedigree_lines');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        if (Array.isArray(parsed)) return parsed;
                    }
                } catch (e) { console.warn('血統図の線データの読み込みに失敗しました。', e); }
                return [];
            });
            const [gridSize, setGridSize] = useState(() => {
                try {
                    const saved = localStorage.getItem('beetle_grid_size');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        if (parsed && parsed.rows && parsed.cols) return parsed;
                    }
                } catch (e) { console.warn('グリッドサイズの読み込みに失敗しました。', e); }
                return { rows: 1, cols: 1 };
            });

            useEffect(() => {
                try { localStorage.setItem('beetle_pedigree_lines', JSON.stringify(pedigreeLines)); } catch (e) { console.error('線データの保存に失敗しました。', e); }
            }, [pedigreeLines]);
            useEffect(() => {
                try { localStorage.setItem('beetle_grid_size', JSON.stringify(gridSize)); } catch (e) { console.error('グリッドサイズの保存に失敗しました。', e); }
            }, [gridSize]);

            const [creatures, setCreatures] = useState(() => {
                try {
                    const saved = localStorage.getItem('beetle_data');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        if (Array.isArray(parsed)) return dedupeIds(parsed);
                    }
                } catch (e) {
                    console.warn('保存データの読み込みに失敗しました。', e);
                }
                const sampleStages = ['孵化', '1令', '2令', '3令', '蛹', '成虫'];
                return Array.from({ length: 10 }, (_, i) => {
                    const historyLength = 2 + Math.floor(Math.random() * 4);
                    const history = Array.from({ length: historyLength }, (_, j) => ({
                        item: sampleStages[j] || '経過',
                        date: `2026-04-${String(10 + j).padStart(2,'0')}`,
                        size: `${1 + j * 5}g`,
                        temp: `${22 + (i % 5)}℃`
                    }));
                    return {
                        id: (i + 1).toString(),
                        name: `個体 ${i + 1}号`,
                        alias: i < 5 ? 'Aライン' : 'Bライン',
                        origin: '福岡県久留米市',
                        generation: `F${(i % 5) + 1}`,
                        maleParent: '',
                        femaleParent: '',
                        stage: history[history.length - 1].item,
                        saleStatus: '使用',
                        hatchDate: '2026-04-01',
                        emergenceDate: '-',
                        emergenceSize: '',
                        history,
                        sex: i % 2 === 0 ? 'オス' : 'メス'
                    };
                });
            });

            const [sort, setSort] = useState({ key: 'id', direction: 'asc' });

            // 行・列の追加・削除処理。PedigreeViewのJSX内に巨大な無名関数として埋め込むのではなく、
            // 独立した関数として定義することで、再レンダリング毎の関数再生成や、
            // JSXトランスパイル時の挙動による問題を避ける。
            const handleInsertRow = (index, cellH, cellGap) => {
                const shiftY = cellH;
                const thresholdY = cellGap / 2 + index * cellH - 0.01;
                setCreatures(prev => prev.map(c => {
                    if (c.gridPos && c.gridPos.row >= index) {
                        return { ...c, gridPos: { ...c.gridPos, row: c.gridPos.row + 1 } };
                    }
                    return c;
                }));
                setPedigreeLines(prev => prev.map(l => {
                    const newL = { ...l };
                    if (l.y1 >= thresholdY) newL.y1 = l.y1 + shiftY;
                    if (l.y2 >= thresholdY) newL.y2 = l.y2 + shiftY;
                    return newL;
                }));
                setGridSize(prev => ({ ...prev, rows: prev.rows + 1 }));
            };
            const handleInsertCol = (index, cellW, cellGap) => {
                const shiftX = cellW;
                const thresholdX = cellGap / 2 + index * cellW - 0.01;
                setCreatures(prev => prev.map(c => {
                    if (c.gridPos && c.gridPos.col >= index) {
                        return { ...c, gridPos: { ...c.gridPos, col: c.gridPos.col + 1 } };
                    }
                    return c;
                }));
                setPedigreeLines(prev => prev.map(l => {
                    const newL = { ...l };
                    if (l.x1 >= thresholdX) newL.x1 = l.x1 + shiftX;
                    if (l.x2 >= thresholdX) newL.x2 = l.x2 + shiftX;
                    return newL;
                }));
                setGridSize(prev => ({ ...prev, cols: prev.cols + 1 }));
            };
            const handleDeleteRow = (index, cellH, cellGap) => {
                const shiftY = cellH;
                const rowTopY = cellGap / 2 + index * cellH - cellH / 2;
                setCreatures(prev => prev.map(c => {
                    if (c.gridPos && c.gridPos.row > index) {
                        return { ...c, gridPos: { ...c.gridPos, row: c.gridPos.row - 1 } };
                    }
                    return c;
                }));
                setPedigreeLines(prev => prev.map(l => {
                    const newL = { ...l };
                    if (l.y1 >= rowTopY) newL.y1 = l.y1 - shiftY;
                    if (l.y2 >= rowTopY) newL.y2 = l.y2 - shiftY;
                    return newL;
                }));
                setGridSize(prev => ({ ...prev, rows: Math.max(1, prev.rows - 1) }));
            };
            const handleDeleteCol = (index, cellW, cellGap) => {
                const shiftX = cellW;
                const colLeftX = cellGap / 2 + index * cellW - cellW / 2;
                setCreatures(prev => prev.map(c => {
                    if (c.gridPos && c.gridPos.col > index) {
                        return { ...c, gridPos: { ...c.gridPos, col: c.gridPos.col - 1 } };
                    }
                    return c;
                }));
                setPedigreeLines(prev => prev.map(l => {
                    const newL = { ...l };
                    if (l.x1 >= colLeftX) newL.x1 = l.x1 - shiftX;
                    if (l.x2 >= colLeftX) newL.x2 = l.x2 - shiftX;
                    return newL;
                }));
                setGridSize(prev => ({ ...prev, cols: Math.max(1, prev.cols - 1) }));
            };

            // 登録個体数の変化に応じて、グリッドサイズ（行数・列数）が常に「個体数×2」を下回らないよう自動拡大する。
            // 手動の行追加・列追加ボタンで広げたサイズより縮小することはない（Math.maxで両者の大きい方を採用）。
            useEffect(() => {
                const minSize = creatures.length * 2;
                setGridSize(prev => {
                    const newRows = Math.max(prev.rows, minSize, 1);
                    const newCols = Math.max(prev.cols, minSize, 1);
                    if (newRows === prev.rows && newCols === prev.cols) return prev;
                    return { rows: newRows, cols: newCols };
                });
            }, [creatures.length]);
            const [filters, setFilters] = useState({ name: '', sex: '', saleStatus: '', stage: '', alias: '', generation: '' });
            const [showFilter, setShowFilter] = useState(false);
            // 一覧の「計画」欄は誤操作防止のため、デフォルトでロック（タップしても切り替わらない）しておき、
            // 項目名横のロックボタンで明示的に解除した時だけタップでの状態切り替えを可能にする。
            const [saleStatusLocked, setSaleStatusLocked] = useState(true);
            // 上部の固定領域（ロゴ・タブ・フィルター等）の実際の高さを計測し、
            // テーブルのthead（項目名行）のsticky位置（top）に反映する。
            // showFilterの開閉等でこの領域の高さが変わるため、関連する状態が変化するたびに再計測する。
            const stickyHeaderRef = useRef(null);
            const [stickyHeaderHeight, setStickyHeaderHeight] = useState(0);
            const [agreedToTerms, setAgreedToTerms] = useState(() => localStorage.getItem('beetle_agreed') === 'true');
            const [termsTab, setTermsTab] = useState('使用方法');
            const [appIcon, setAppIcon] = useState(() => localStorage.getItem('beetle_icon') || '');
            const [showIconModal, setShowIconModal] = useState(false);
            const [iconCropSrc, setIconCropSrc] = useState(null); // アイコン用：トリミング待ちの選択直後画像

            const nameMap = useMemo(() => {
                const m = {};
                creatures.forEach(c => { m[c.name] = c; });
                return m;
            }, [creatures]);

            const processedCreatures = (() => {
                return [...creatures]
                    .filter(c => {
                        if (filters.name && !c.name.includes(filters.name)) return false;
                        if (filters.sex && c.sex !== filters.sex) return false;
                        if (filters.saleStatus && c.saleStatus !== filters.saleStatus) return false;
                        if (filters.stage && c.stage !== filters.stage) return false;
                        if (filters.alias && c.alias !== filters.alias) return false;
                        if (filters.generation && c.generation !== filters.generation) return false;
                        return true;
                    })
                    .sort((a, b) => {
                        let av, bv;
                        if (sort.key === 'growthRate') {
                            const aLast = a.history.length > 0 ? a.history[a.history.length-1] : null;
                            const bLast = b.history.length > 0 ? b.history[b.history.length-1] : null;
                            av = calcGrowthRate(a.hatchDate, aLast);
                            bv = calcGrowthRate(b.hatchDate, bLast);
                        } else if (sort.key === 'size' || sort.key === 'temp') {
                            // 体重・温度はcreature自体のプロパティではなく、飼育記録（history）の最新値を見る必要がある。
                            // 単位付き文字列（例:"15g","26℃"）から数値部分だけを抽出して数値として比較する。
                            const aLatest = a.history.length > 0 ? a.history[a.history.length - 1][sort.key] : null;
                            const bLatest = b.history.length > 0 ? b.history[b.history.length - 1][sort.key] : null;
                            const aNum = aLatest ? parseFloat(String(aLatest).replace(/[^0-9.\-]/g, '')) : null;
                            const bNum = bLatest ? parseFloat(String(bLatest).replace(/[^0-9.\-]/g, '')) : null;
                            av = (aNum == null || isNaN(aNum)) ? null : aNum;
                            bv = (bNum == null || isNaN(bNum)) ? null : bNum;
                        } else {
                            av = a[sort.key];
                            bv = b[sort.key];
                        }
                        // 値が無い（null）ものは常に末尾に回す
                        if (av == null && bv == null) return 0;
                        if (av == null) return 1;
                        if (bv == null) return -1;
                        // 文字列同士の場合は自然順ソート（"1","2",...,"10","11"のように数値部分を正しく比較する）を使う。
                        // それ以外（数値・日付文字列等）は従来通りの比較を行う。
                        let cmp;
                        if (typeof av === 'string' && typeof bv === 'string') {
                            cmp = av.localeCompare(bv, 'ja', { numeric: true, sensitivity: 'base' });
                        } else {
                            cmp = av < bv ? -1 : av > bv ? 1 : 0;
                        }
                        return cmp * (sort.direction === 'asc' ? 1 : -1);
                    });
            })();

            const sim = useMemo(() => {
                const m = creatures.find(c => c.id === maleSelection);
                const f = creatures.find(c => c.id === femaleSelection);
                if (!m || !f) return null;
                const F = calcF(m.name, f.name, nameMap);
                const r = calcR(m.name, f.name, nameMap);
                const Fpct = (F * 100).toFixed(2);
                const Rpct = (r * 100).toFixed(2);
                const risk = fRiskInfo(F);
                const desc = fRiskDesc(F);
                const mAnc = getAncestors(m.name, nameMap, 0);
                const fAnc = getAncestors(f.name, nameMap, 0);
                const commonAncestors = [];
                mAnc.forEach((_, name) => { if (fAnc.has(name)) commonAncestors.push(name); });
                return { F, Fpct, r, Rpct, riskLabel: risk.label, desc, commonAncestors };
            }, [maleSelection, femaleSelection, nameMap]);

            useEffect(() => {
                if (loadFailed) return;
                try {
                    localStorage.setItem('beetle_data', JSON.stringify(creatures));
                    setSaveError(false);
                } catch (e) {
                    console.error('データの保存に失敗しました。', e);
                    setSaveError(true);
                }
            }, [creatures, loadFailed]);

            useEffect(() => {
                if (!saveError) return;
                const check = () => {
                    try {
                        const testKey = '_beetle_space_check_';
                        localStorage.setItem(testKey, '1');
                        localStorage.removeItem(testKey);
                        localStorage.setItem('beetle_data', JSON.stringify(creatures));
                        setSaveError(false);
                    } catch(e) {}
                };
                const timer = setInterval(check, 3000);
                return () => clearInterval(timer);
            }, [saveError, creatures]);

            const resetFilters = () => setFilters({ name: '', sex: '', saleStatus: '', stage: '', alias: '', generation: '' });
            const activeFilterCount = Object.values(filters).filter(v => v !== '').length;
            useEffect(() => {
                const update = () => {
                    if (stickyHeaderRef.current) setStickyHeaderHeight(stickyHeaderRef.current.getBoundingClientRect().height);
                };
                update();
                window.addEventListener('resize', update);
                const timer = setTimeout(update, 50); // フォントやアイコン読み込み後の高さ変化にも対応
                return () => { window.removeEventListener('resize', update); clearTimeout(timer); };
            }, [showFilter, activeTab, appIcon, activeFilterCount]);
            const toggleSaleStatus = (id, e) => {
                e.stopPropagation();
                const statuses = ['使用', '予備', '不要'];
                setCreatures(creatures.map(c => c.id === id ? { ...c, saleStatus: statuses[(statuses.indexOf(c.saleStatus) + 1) % 3] } : c));
            };
            const confirmAdd = () => {
                // 新規登録個体は一時置き場（gridPos未設定）に入る。描画エリアへはユーザーが手動でドラッグして配置する。
                const newCreature = { ...newCreatureData, id: `${Date.now().toString()}_${Math.random().toString(36).slice(2, 8)}`, history: [] };
                const nextCreatures = [newCreature, ...creatures];
                setCreatures(nextCreatures);
                setShowAddModal(false);
                setNewCreatureData({ name: '新規個体', alias: '', origin: '', generation: '', hatchDate: '-', emergenceDate: '-', maleParent: '', femaleParent: '', stage: '幼虫', saleStatus: '使用', sex: 'オス', emergenceSize: '' });
                setPendingSaveData({ creatures: nextCreatures, pedigreeLines, gridSize });
                setShowSavePrompt(true);
            };
            const updateCreature = (updated) => {
                setCreatures(creatures.map(c => c.id === updated.id ? updated : c));
                setSelectedCreature(updated);
            };
            const updateAppIcon = (base64) => {
                localStorage.setItem('beetle_icon', base64);
                setAppIcon(base64);
                document.getElementById('favicon').href = base64;
                document.getElementById('apple-touch-icon').href = base64;
            };
            const removeAppIcon = () => {
                localStorage.removeItem('beetle_icon');
                setAppIcon('');
                document.getElementById('favicon').href = '';
                document.getElementById('apple-touch-icon').href = '';
            };
            const agreeToTerms = () => {
                localStorage.setItem('beetle_agreed', 'true');
                setAgreedToTerms(true);
            };

            if (!agreedToTerms) return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-neutral-950">
                    <div className="bg-neutral-900 border border-neutral-700 rounded-xl w-full max-w-lg shadow-2xl text-white">
                        <div className="p-6 border-b border-neutral-700">
                            <h1 className="text-lg font-bold text-emerald-400">Beetle Base</h1>
                            <p className="text-xs text-neutral-400 mt-1">ご利用前に以下をお読みください</p>
                        </div>
                        <div className="flex border-b border-neutral-700">
                            {['使用方法', '利用規約'].map(t => (
                                <button key={t} onClick={() => setTermsTab(t)} className={`px-5 py-2 text-sm font-bold ${termsTab === t ? 'text-emerald-400 border-b-2 border-emerald-400' : 'text-neutral-400'}`}>{t}</button>
                            ))}
                        </div>
                        <div className="p-6 h-96 overflow-y-auto text-sm space-y-4">
                            {termsTab === '使用方法' ? (
                                <>
                                    <section className="space-y-2">
                                        <h2 className="font-bold text-emerald-400">基本操作</h2>
                                        <p className="text-neutral-300 leading-relaxed">「一覧」タブで個体を管理します。行をタップすると詳細画面へ移動します。「追加」ボタンで新規個体を登録できます。詳細画面では写真を、ヘッダーの「アイコン」ボタンからはアプリ全体のアイコン画像を設定できます。いずれも画像選択後にトリミング範囲（位置・拡大縮小）を調整してから保存されます。</p>
                                    </section>
                                    <section className="space-y-2">
                                        <h2 className="font-bold text-emerald-400">血統図</h2>
                                        <p className="text-neutral-300 leading-relaxed">「血統図」タブでは、個体カードをグリッド上に自由に配置し、線で親子・婚姻関係を手動で描いて家系図を作成します。自動配置・自動接続は行われません。</p>
                                        <ul className="text-neutral-300 leading-relaxed space-y-1.5 list-none">
                                            <li>・ 新しく登録した個体は、画面上部の「未配置リスト」に追加されます。</li>
                                            <li>・「編集モード」をONにすると、未配置リストのカードをグリッドへドラッグして配置できます。グリッド上のカードを未配置リスト側へ戻すこともできます（1セルに1枚まで）。</li>
                                            <li>・ 編集モード中は「行追加」「列追加」「行削除」「列削除」ボタンも表示され、ドラッグで挿入・削除位置を選んで確認のうえグリッドを拡張・縮小できます（カードがある行・列は削除できません）。</li>
                                            <li>・「線追加」ボタンで、カード間をドラッグして直線・L字型の接続線を描けます。</li>
                                            <li>・「線編集」ボタンで、既存の線をタップして選択し、端点のドラッグで長さ変更、線の途中のドラッグで平行移動ができます。選択中は「削除」ボタンで線を削除できます。</li>
                                            <li>・ 2本指のピンチ操作で拡大・縮小、空セル部分を1本指でドラッグすると画面を移動できます。</li>
                                        </ul>
                                    </section>
                                    <section className="space-y-2">
                                        <h2 className="font-bold text-emerald-400">交配シミュレーション</h2>
                                        <p className="text-neutral-300 leading-relaxed">「交配」タブでオス・メスを選択すると、ライト係数法に基づく近親交配係数（F値）と血縁係数（r値）を計算します。登録されている血統情報の範囲内（最大6世代）での計算となります。</p>
                                    </section>
                                    <section className="space-y-2">
                                        <h2 className="font-bold text-white bg-red-800/50 border border-red-600 rounded px-3 py-2">⚠ データ消失について（必読）</h2>
                                        <ul className="text-neutral-300 leading-relaxed space-y-1.5 list-none">
                                            <li>・ 個体データ・血統図のカード配置・接続線は、お使いのブラウザ内（localStorage）にのみ保存されます。</li>
                                            <li>・ <span className="text-red-400 font-bold">ブラウザのキャッシュ・履歴・Cookieを削除するとデータが完全に消失します。</span></li>
                                            <li>・ <span className="text-red-400 font-bold">ブラウザの変更・PCの買い替え・OSの再インストール時もデータは引き継がれません。</span></li>

                    ) : (

                            </div>
                            {sim && (
                                <div className="space-y-4">

                                        </div>

                                    </div>

                                            <p className="font-bold text-white mb-2">共通祖先（{sim.commonAncestors.length}個体）</p>
                                            <div className="flex flex-wrap gap-1">
                                                {sim.commonAncestors.map((name, i) => (

        }

        // ---- 比較グラフ ----
        function CompareGrowthChart({ mainCreature, allCreatures, showIdealCurve, idealCurve, onToggleIdealCurve, growthTable }) {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            const [compareIds, setCompareIds] = useState([]);

            const otherCreatures = allCreatures.filter(c => c.id !== mainCreature.id && c.history.length > 0);
            const availableToAdd = otherCreatures.filter(c => !compareIds.includes(c.id));
            const canAddMore = compareIds.length < COMPARE_COLORS.length - 1;

            const addCompare = (id) => {
                if (!id || compareIds.includes(id) || !canAddMore) return;
                setCompareIds(prev => [...prev, id]);
            };
            const removeCompare = (id) => {
                setCompareIds(prev => prev.filter(x => x !== id));
            };

            useEffect(() => {
                if (!chartRef.current) return;
                if (chartInstance.current) chartInstance.current.destroy();

                const datasets = [];
                compareIds.forEach((cid, idx) => {
                    const c = allCreatures.find(x => x.id === cid);
                    if (!c) return;
                    const color = COMPARE_COLORS[idx + 1];
                    datasets.push({
                        label: c.name, data: [], _history: c.history, _hatchDate: c.hatchDate,
                        _maleParent: c.maleParent, _femaleParent: c.femaleParent,
                        borderColor: color.border, backgroundColor: color.bg, tension: 0.3, fill: false,
                        pointBackgroundColor: color.border, pointRadius: 4, borderDash: [4, 3], borderWidth: 1.5, _isCompare: true,
                    });
                });
                datasets.push({
                    label: mainCreature.name, data: [], _history: mainCreature.history, _hatchDate: mainCreature.hatchDate,
                    _maleParent: mainCreature.maleParent, _femaleParent: mainCreature.femaleParent,
                    borderColor: COMPARE_COLORS[0].border, backgroundColor: COMPARE_COLORS[0].bg, tension: 0.3, fill: true,
                    pointBackgroundColor: '#fff', pointRadius: 5, borderWidth: 2.5, _isCompare: false,
                });

                // 横軸を「孵化日からの経過日数」に変換する。
                // 孵化日が未設定（'-'等、有効な日付でない）の個体は、まずオス親・メス親が両方一致する
                // 兄弟個体（同腹）の孵化日の平均を代わりに使う。兄弟にも孵化日設定者がいない場合は、
                // その個体自身の測定履歴の中で最も古い日付を起点（ただし0g点は追加しない）とする。
                const parseDateSafe = (s) => {
                    if (!s || s === '-') return null;
                    const d = new Date(s);
                    return isNaN(d.getTime()) ? null : d;
                };
                const dayDiff = (from, to) => Math.round((to.getTime() - from.getTime()) / 86400000);

                const getSiblingAvgHatchDate = (ds) => {
                    if (!ds._maleParent || ds._maleParent === '-' || !ds._femaleParent || ds._femaleParent === '-') return null;
                    const siblingDates = allCreatures
                        .filter(c => c.maleParent === ds._maleParent && c.femaleParent === ds._femaleParent)
                        .map(c => parseDateSafe(c.hatchDate))
                        .filter(Boolean);
                    if (siblingDates.length === 0) return null;
                    const avgMs = siblingDates.reduce((sum, d) => sum + d.getTime(), 0) / siblingDates.length;
                    return new Date(avgMs);
                };

                const elapsedDatasets = datasets.map(ds => {
                    const validHistory = ds._history.filter(h => parseDateSafe(h.date));
                    let origin = parseDateSafe(ds._hatchDate);
                    let hasReliableOrigin = !!origin; // 孵化日（本人または兄弟平均）が分かっているかどうか
                    if (!origin) {
                        origin = getSiblingAvgHatchDate(ds);
                        if (origin) hasReliableOrigin = true;
                    }
                    if (!origin && validHistory.length > 0) {
                        // 孵化日が（本人にも兄弟にも）まったく分からない場合のみ、測定履歴の最古日をフォールバック起点にする。
                        // この場合は孵化日自体が不明なので、0g点は追加しない。
                        origin = validHistory.map(h => parseDateSafe(h.date)).sort((a, b) => a - b)[0];
                    }
                    const points = validHistory.map(h => {
                        const val = parseFloat(h.size.replace(/[^0-9.]/g, ''));
                        const elapsed = origin ? dayDiff(origin, parseDateSafe(h.date)) : null;
                        return { elapsed, value: isNaN(val) ? null : val };
                    }).filter(p => p.elapsed != null);
                    // 孵化日（本人または兄弟平均）が分かっている場合、経過0日・体重0gの点をグラフの起点として追加する。
                    if (hasReliableOrigin && !points.some(p => p.elapsed === 0)) {
                        points.unshift({ elapsed: 0, value: 0 });
                    }
                    return { ds, points };
                });

                // 全データセットに登場する経過日数の和集合を横軸ラベルとする
                const allElapsedSet = new Set();
                elapsedDatasets.forEach(({ points }) => points.forEach(p => allElapsedSet.add(p.elapsed)));
                allElapsedSet.add(0);
                const sortedElapsed = Array.from(allElapsedSet).sort((a, b) => a - b);

                const mappedDatasets = elapsedDatasets.map(({ ds, points }) => {
                    const map = {};
                    points.forEach(p => { map[p.elapsed] = p.value; });
                    const { _history, _isCompare, _hatchDate, ...rest } = ds;
                    return { ...rest, data: sortedElapsed.map(e => map[e] ?? null) };
                });

                // 「孵化」「羽化」の縦基準線をグラフ上に描画するためのカスタムプラグイン。
                // 孵化は常に経過0日（横軸の原点）。羽化はメイン個体の羽化日が分かれば、
                // 孵化日からの経過日数を計算し、横軸の目盛り範囲内で最も近い位置に線を引く。
                // 比較表示している他の個体の羽化タイミングはここでは表示しない（メイン個体のみ）。
                const mainOrigin = parseDateSafe(mainCreature.hatchDate) ||
                    getSiblingAvgHatchDate({ _maleParent: mainCreature.maleParent, _femaleParent: mainCreature.femaleParent }) ||
                    (mainCreature.history.filter(h => parseDateSafe(h.date)).length > 0
                        ? mainCreature.history.filter(h => parseDateSafe(h.date)).map(h => parseDateSafe(h.date)).sort((a, b) => a - b)[0]
                        : null);
                const mainEmergence = parseDateSafe(mainCreature.emergenceDate);
                const markers = [];
                if (mainOrigin && sortedElapsed.length > 0) {
                    markers.push({ label: '孵化', elapsed: 0, color: '#34d399' });
                    if (mainEmergence) {
                        const emergenceElapsed = dayDiff(mainOrigin, mainEmergence);
                        markers.push({ label: '羽化', elapsed: emergenceElapsed, color: '#f472b6' });
                    }
                }
                // 理想曲線データセットを追加
                const _showIdeal = idealCurve !== undefined ? idealCurve : showIdealCurve;
                var _idealTable = growthTable || GROWTH_TABLE;
                if (_showIdeal && _idealTable.length > 0) {
                    const idealDataMapped = sortedElapsed.map((e, idx) => {
                        if (idx === 0) return 0;
                        const w = getIdealWeightFromTable(e, _idealTable);
                        return w !== null ? Math.round(w * 10) / 10 : null;
                    });
                    mappedDatasets.push({
                        label: '理想曲線',
                        data: idealDataMapped,
                        borderColor: '#fbbf24',
                        backgroundColor: 'transparent',
                        borderDash: [6, 3],
                        borderWidth: 1.5,
                        pointRadius: 0,
                        tension: 0.4,
                        spanGaps: false,
                    });
                }
                const milestonePlugin = {
                    id: 'milestoneLines',
                    afterDraw: (chart) => {
                        if (markers.length === 0) return;
                        const { ctx, chartArea, scales } = chart;
                        const xScale = scales.x;
                        markers.forEach(m => {
                            // sortedElapsedの中で、目的の経過日数に最も近い目盛り位置（カテゴリ軸のインデックス）を探す
                            let closestIdx = 0, closestDiff = Infinity;
                            sortedElapsed.forEach((e, idx) => {
                                const diff = Math.abs(e - m.elapsed);
                                if (diff < closestDiff) { closestDiff = diff; closestIdx = idx; }
                            });
                            const x = xScale.getPixelForValue(closestIdx);
                            if (x < chartArea.left || x > chartArea.right) return;
                            ctx.save();
                            ctx.beginPath();
                            ctx.setLineDash([4, 3]);
                            ctx.strokeStyle = m.color;
                            ctx.lineWidth = 1.5;
                            ctx.moveTo(x, chartArea.top);
                            ctx.lineTo(x, chartArea.bottom);
                            ctx.stroke();
                            ctx.setLineDash([]);
                            ctx.fillStyle = m.color;
                            ctx.font = 'bold 10px sans-serif';
                            ctx.textAlign = 'center';
                            ctx.fillText(m.label, x, chartArea.top - 4);
                            ctx.restore();
                        });
                    }
                };

                chartInstance.current = new Chart(chartRef.current, {
                    type: 'line',
                    data: { labels: sortedElapsed.map(e => `${e}日`), datasets: mappedDatasets },
                    plugins: [milestonePlugin],
                    options: {
                        responsive: true, maintainAspectRatio: false, spanGaps: true,
                        layout: { padding: { top: 16 } },
                        plugins: {
                            legend: { display: true, labels: { color: '#d4d4d4', font: { size: 10 }, boxWidth: 12, padding: 8 } },
                            tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y ?? '-'}g` } }
                        },
                        scales: {
                            y: { beginAtZero: true, grid: { color: '#333' }, ticks: { color: '#fff', callback: v => `${v}g` } },
                            x: { grid: { color: '#333' }, ticks: { color: '#fff', maxRotation: 30, font: { size: 9 } }, title: { display: true, text: '孵化日からの経過日数', color: '#aaa', font: { size: 10 } } }
                        }
                    }
                });
                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [mainCreature, compareIds, allCreatures, showIdealCurve, idealCurve, growthTable]);

            return (
                 <div className="bg-neutral-900 p-6 rounded-xl border border-neutral-700 mt-4 text-white shadow-2xl">
                     <div className="flex items-center justify-between border-b border-neutral-700 pb-2 mb-4">
                         <h3 className="font-bold text-sm flex items-center gap-2">成長グラフ<span className="text-[10px] text-neutral-400 font-normal">（他の個体と比較できます）</span></h3>
                         <button onClick={onToggleIdealCurve} className={idealCurve ? "px-2 py-1 rounded text-xs font-bold bg-emerald-600 text-white" : "px-2 py-1 rounded text-xs font-bold bg-neutral-700 text-neutral-300"}>理想曲線</button>
                     </div>
                    {otherCreatures.length > 0 && (
                        <div className="mb-3 space-y-2">
                            <select value="" onChange={e => { addCompare(e.target.value); }} disabled={!canAddMore}
                                className="w-full bg-neutral-800 border border-neutral-600 text-white text-xs rounded px-2 py-1.5 disabled:opacity-40 disabled:cursor-not-allowed focus:outline-none focus:border-emerald-500">
                                <option value="">{canAddMore ? (availableToAdd.length > 0 ? '比較個体を選択...' : '（追加できる個体なし）') : `最大${COMPARE_COLORS.length - 1}個体まで`}</option>
                                {availableToAdd.map(c => (<option key={c.id} value={c.id}>{c.name}（{c.generation} / {c.alias || '—'}）</option>))}
                            </select>
                            {compareIds.length > 0 && (
                                <div className="flex flex-wrap gap-1.5">
                                    {compareIds.map((cid, idx) => {
                                        const c = allCreatures.find(x => x.id === cid);
                                        if (!c) return null;
                                        const color = COMPARE_COLORS[idx + 1];
                                        return (
                                            <span key={cid} className="compare-tag" style={{ borderColor: color.border, color: color.text, backgroundColor: color.bg }}>
                                                <span style={{ width: 6, height: 6, borderRadius: '50%', backgroundColor: color.border, display: 'inline-block', flexShrink: 0 }}></span>
                                                {c.name}
                                                <button onClick={() => removeCompare(cid)} style={{ marginLeft: 2, lineHeight: 1 }} title="削除"><i className="fa-solid fa-xmark" style={{ fontSize: 8 }}></i></button>
                                            </span>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    )}
                    <div className="h-52 w-full"><canvas ref={chartRef}></canvas></div>
                    
                    {compareIds.length > 0 && <p className="text-[10px] text-neutral-500 mt-2">⚠ 比較個体は記録日が異なる場合、グラフが途切れることがあります</p>}
                </div>
            );
        }

        // ---- 詳細画面 ----
        function DetailView({ creature, allCreatures, nameMap, onBack, onUpdate, onGoToTree, onRequestSave, onOpenGrowthSettings }) {
            const [form, setForm] = useState(creature);
            const [showEditModal, setShowEditModal] = useState(false);
            const [editForm, setEditForm] = useState(creature);
            const [showRecordModal, setShowRecordModal] = useState(null);
            const [photoCropSrc, setPhotoCropSrc] = useState(null); // 個体写真用：トリミング待ちの選択直後画像

            // 一覧画面でスクロールした位置のまま詳細画面に遷移すると、詳細画面も同じスクロール位置
            // （画面の途中・下の方）で表示されてしまうため、詳細画面が開いたら必ず先頭に戻す。
            useEffect(() => {
                window.scrollTo(0, 0);
                // eslint-disable-next-line
            }, []);

            // 詳細表示・編集のフィールド定義（羽化サイズ追加）
            const fields = [
                {key:'name', label:'個体名'}, {key:'sex', label:'性別'}, {key:'alias', label:'名称'},
                {key:'origin', label:'産地'}, {key:'generation', label:'累代'},
                {key:'hatchDate', label:'孵化日', isDate:true},
                {key:'emergenceDate', label:'羽化日', isDate:true},
                {key:'emergenceSize', label:'羽化サイズ（mm）', isNumber:true},
                {key:'maleParent', label:'オス親'}, {key:'femaleParent', label:'メス親'}, {key:'stage', label:'ステージ'}
            ];

            const saveEdit = () => { setForm(editForm); onUpdate(editForm); setShowEditModal(false); };
            const [showIdealCurve, setShowIdealCurve] = React.useState(false);
            const [showGrowthPanel, setShowGrowthPanel] = React.useState(false);
            const [growthAlias, setGrowthAlias] = React.useState('');
            const [growthTarget, setGrowthTarget] = React.useState(80);
            const [growthTable, setGrowthTable] = React.useState(GROWTH_TABLE.slice());
             // alias が同じ全個体の飼育記録からGROWTH_TABLEを自動生成
             React.useEffect(function() {
                 var alias = form.alias;
                 if (!alias) return;
                 var sameAlias = allCreatures.filter(function(c) {
                     return c.alias === alias && c.hatchDate && c.hatchDate !== '-' && c.emergenceSize && c.history && c.history.length > 0;
                 });
                 if (sameAlias.length === 0) return;
                 var points = {};
                 sameAlias.forEach(function(c) {
                     var size = parseFloat((c.emergenceSize || '').replace(/[^0-9.]/g, ''));
                     var ratio = (!isNaN(size) && size > 0) ? growthTarget / size : 1;
                     var origin = new Date(c.hatchDate);
                     c.history.forEach(function(h) {
                         var w = parseFloat((h.size || '').replace(/[^0-9.]/g, ''));
                         if (isNaN(w) || w <= 0 || !h.date) return;
                         var elapsed = Math.round((new Date(h.date) - origin) / 86400000);
                         if (elapsed < 0) return;
                         if (!points[elapsed]) points[elapsed] = [];
                         points[elapsed].push(w * ratio);
                     });
                 });
                 var newTable = Object.keys(points).map(function(d) {
                     var vals = points[d];
                     return { day: parseInt(d), w: Math.round(vals.reduce(function(a,b){return a+b;},0)/vals.length * 10)/10 };
                 }).sort(function(a,b){return a.day-b.day;});
                 if (newTable.length === 0) return;
                 if (newTable[0].day > 0) newTable.unshift({day:0, w:0});
                 GROWTH_TABLE.length = 0;
                 newTable.forEach(function(r){ GROWTH_TABLE.push(r); });
                 setGrowthTable(newTable.slice());
             }, [form.alias, growthTarget]);

            const saveRecord = (record) => {
                // 入力欄は数値のみを受け付けるため、保存時に単位（g・℃）を自動付与する。
                // 既に単位が含まれている場合（過去データの編集等）は二重に付与しない。
                const withUnit = (val, unit) => {
                    if (val == null || val === '') return '';
                    const str = String(val);
                    return str.endsWith(unit) ? str : `${str}${unit}`;
                };
                const sizeWithUnit = withUnit(record.size, 'g');
                const tempWithUnit = withUnit(record.temp, '℃');
                let h = [...form.history];
                if (record.index !== null) h[record.index] = {item:record.item, size:sizeWithUnit, temp:tempWithUnit, date:record.date};
                else h.push({item:record.item, size:sizeWithUnit, temp:tempWithUnit, date:record.date || new Date().toISOString().split('T')[0]});
                const updated = {...form, history: h, stage: record.item};
                setForm(updated);
                onUpdate(updated);
                setShowRecordModal(null);
                if (record.index === null && typeof onRequestSave === 'function') onRequestSave(updated);
            };

            const deleteRecord = (index) => {
                if (!confirm('この記録を削除しますか？')) return;
                const h = form.history.filter((_, i) => i !== index);
                const newStage = h.length > 0 ? h[h.length - 1].item : form.stage;
                const updated = {...form, history: h, stage: newStage};
                setForm(updated);
                onUpdate(updated);
            };

            const allForChart = allCreatures.map(c => c.id === form.id ? form : c);
            const selfF = useMemo(() => calcSelfF(form, nameMap), [form, nameMap]);
            const selfFInfo = fRiskInfo(selfF);
            const relatedList = useMemo(() => {
                return allCreatures
                    .filter(c => c.id !== form.id)
                    .map(c => ({ creature: c, r: calcR(form.name, c.name, nameMap) }))
                    .sort((a, b) => b.r - a.r);
            }, [form, allCreatures, nameMap]);

            return (
                <div className="p-6 max-w-lg mx-auto">
                    <div className="flex justify-between items-center mb-4 sticky top-0 z-30 bg-neutral-950 -mx-6 px-6 py-3">
                        <button onClick={onBack} className="text-emerald-400 font-bold">← 戻る</button>
                        <div className="flex gap-2">
                            <button onClick={() => onGoToTree(creature.id)} className="bg-neutral-700 px-4 py-1 rounded text-sm font-bold">血統図へ</button>
                            <button onClick={() => { setEditForm(form); setShowEditModal(true); }} className="bg-emerald-600 px-4 py-1 rounded text-sm font-bold">編集</button>
                        </div>
                    </div>

                    {showEditModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-neutral-900 p-6 rounded-xl w-full max-w-sm border border-neutral-700 space-y-4 overflow-y-auto max-h-[90vh]">
                                <h3 className="font-bold text-white">詳細情報の編集</h3>
                                {fields.map(f => (
                                    <div key={f.key}>
                                        <p className="text-[10px] text-white mb-1">{f.label}</p>
                                        {f.key === 'maleParent' ? (
                                            <select className="w-full bg-neutral-800 p-2 rounded text-white text-sm border border-neutral-700" value={(!editForm[f.key] || editForm[f.key] === '-') ? '' : editForm[f.key]} onChange={e => setEditForm({...editForm, [f.key]: e.target.value})}>
                                                <option value="">未設定</option>
                                                {allCreatures.filter(c => isMale(c.sex)).map(c => <option key={c.id} value={c.name}>{c.name}（{c.generation}）</option>)}
                                            </select>
                                        ) : f.key === 'femaleParent' ? (
                                            <select className="w-full bg-neutral-800 p-2 rounded text-white text-sm border border-neutral-700" value={(!editForm[f.key] || editForm[f.key] === '-') ? '' : editForm[f.key]} onChange={e => setEditForm({...editForm, [f.key]: e.target.value})}>
                                                <option value="">未設定</option>
                                                {allCreatures.filter(c => isFemale(c.sex)).map(c => <option key={c.id} value={c.name}>{c.name}（{c.generation}）</option>)}
                                            </select>
                                        ) : f.isDate ? (
                                            <DateInput
                                                value={editForm[f.key]}
                                                onChange={v => setEditForm({...editForm, [f.key]: v})}
                                                className="w-full bg-neutral-800 p-2 rounded text-white text-sm border border-neutral-700"
                                            />
                                        ) : f.isNumber ? (
                                            <div className="flex items-center gap-1">
                                                <input type="number" min="0" step="0.1" className="w-full bg-neutral-800 p-2 rounded text-white text-sm border border-neutral-700" value={editForm[f.key] || ''} onChange={e => setEditForm({...editForm, [f.key]: e.target.value})} placeholder="例: 78.5" />
                                                <span className="text-xs text-neutral-400">mm</span>
                                            </div>
                                        ) : (
                                            <input className="w-full bg-neutral-800 p-2 rounded text-white text-sm border border-neutral-700" value={editForm[f.key] || ''} onChange={e => setEditForm({...editForm, [f.key]: e.target.value})} />
                                        )}
                                    </div>
                                ))}
                                <div className="flex gap-2">
                                    <button onClick={() => setShowEditModal(false)} className="w-full bg-neutral-700 py-2 rounded font-bold text-white">キャンセル</button>
                                    <button onClick={saveEdit} className="w-full bg-emerald-600 py-2 rounded font-bold text-white">保存</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="bg-neutral-900 p-6 rounded-xl border border-neutral-700 space-y-4 text-white shadow-2xl">
                        <h2 className="text-xl font-bold border-b border-neutral-700 pb-2">詳細情報</h2>

                        {/* 写真エリア */}
                        <div className="relative w-full">
                            {form.photo ? (
                                <div className="relative">
                                    <img src={form.photo} alt="個体写真" className="w-full rounded-lg object-cover max-h-64" />
                                    <button onClick={() => { const updated = {...form, photo: null}; setForm(updated); onUpdate(updated); }} className="absolute top-2 right-2 bg-black/70 text-white rounded-full w-7 h-7 flex items-center justify-center text-xs hover:bg-red-700 transition-colors" title="写真を削除">
                                        <i className="fa-solid fa-xmark"></i>
                                    </button>
                                    <label className="absolute bottom-2 right-2 bg-black/70 text-white rounded-full px-3 py-1.5 text-[10px] font-bold cursor-pointer hover:bg-neutral-700 transition-colors">
                                        変更
                                        <input type="file" accept="image/*" className="hidden" onChange={e => {
                                            const file = e.target.files[0];
                                            if (!file) return;
                                            const reader = new FileReader();
                                            reader.onload = ev => { setPhotoCropSrc(ev.target.result); };
                                            reader.readAsDataURL(file);
                                            e.target.value = '';
                                        }} />
                                    </label>
                                </div>
                            ) : (
                                <label className="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-neutral-600 rounded-lg cursor-pointer hover:border-emerald-500 transition-colors bg-neutral-800/50">
                                    <i className="fa-solid fa-camera text-2xl text-neutral-500 mb-2"></i>
                                    <span className="text-xs text-neutral-500">タップして写真を追加</span>
                                    <input type="file" accept="image/*" className="hidden" onChange={e => {
                                        const file = e.target.files[0];
                                        if (!file) return;
                                        const reader = new FileReader();
                                        reader.onload = ev => {
                                            // 即座に保存せず、トリミングモーダルを開いて範囲調整できるようにする
                                            setPhotoCropSrc(ev.target.result);
                                        };
                                        reader.readAsDataURL(file);
                                        e.target.value = '';
                                    }} />
                                </label>
                            )}
                        </div>
                        {photoCropSrc && (
                            <ImageCropperModal
                                imageSrc={photoCropSrc}
                                aspect="free"
                                frameW={320}
                                frameH={240}
                                outputSize={800}
                                onConfirm={(dataUrl) => {
                                    const updated = { ...form, photo: dataUrl };
                                    setForm(updated);
                                    onUpdate(updated);
                                    setPhotoCropSrc(null);
                                }}
                                onCancel={() => setPhotoCropSrc(null)}
                            />
                        )}

                        {/* 詳細フィールド表示 */}
                        <div className="grid grid-cols-[100px,1fr] gap-x-2 gap-y-2 text-sm items-center">
                            {fields.map(f => (
                                <React.Fragment key={f.key}>
                                    <p className="text-white text-left text-[11px] uppercase">{f.label}</p>
                                    <p className="p-2 bg-neutral-800 rounded w-full border border-neutral-700/50">
                                        {f.key === 'sex'
                                            ? <span style={{color: sexColor(form[f.key]), fontWeight: 'bold'}}>{form[f.key] || '-'}</span>
                                            : f.isNumber
                                                ? (form[f.key] ? `${form[f.key]}mm` : '-')
                                                : (f.key === 'maleParent' || f.key === 'femaleParent')
                                                    ? ((form[f.key] && form[f.key] !== '-' && nameMap[form[f.key]]) ? form[f.key] : '')
                                                    : (form[f.key] || '-')}
                                    </p>
                                </React.Fragment>
                            ))}
                        </div>

                        {/* 飼育記録テーブル（「サイズ」→「体重」、削除ボタン追加） */}
                        <div className="border-t border-neutral-700 pt-4">
                            <div className="flex justify-between items-center mb-3">
                                <h3 className="font-bold text-sm">飼育記録</h3>
                                {showGrowthPanel && (
                                    <div className="mb-4 p-4 bg-neutral-800 rounded-xl border border-emerald-700">
                                        <p className="text-emerald-400 font-bold text-sm mb-3">📈 成長率設定 <span className="text-neutral-400 text-xs">[30日理想:{growthTable.length > 1 ? growthTable[1].w : "?"}g]</span></p>
                                        <p className="text-neutral-400 text-xs mb-3">羽化済み個体の実績から理想成長テーブルを生成します。</p>
                                        <div className="flex flex-col gap-2 mb-3">
                                            <div>
                                                <p className="text-xs text-white mb-1">alias（名称）</p>
                                                <select value={growthAlias} onChange={e => setGrowthAlias(e.target.value)} className="w-full bg-neutral-700 text-white text-xs rounded px-2 py-1 border border-neutral-600">
                                                    <option value="">-- 選択 --</option>
                                                    {[...new Set(allCreatures.filter(c => c.alias).map(c => c.alias))].map(a => <option key={a} value={a}>{a}</option>)}
                                                </select>
                                            </div>
                                            <div>
                                                <p className="text-xs text-white mb-1">目標サイズ（mm）</p>
                                                <input type="number" value={growthTarget} onChange={e => setGrowthTarget(Number(e.target.value))} min="40" max="130" className="w-20 bg-neutral-700 text-white text-xs rounded px-2 py-1 border border-neutral-600" />
                                            </div>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => {
                                                if (!growthAlias) { alert('aliasを選択してください'); return; }
                                                const emerged = allCreatures.filter(c => c.alias === growthAlias && c.hatchDate && c.hatchDate !== '-' && c.history && c.history.length > 0);
                                                if (emerged.length === 0) { alert('該当する個体がありません'); return; }
                                                const points = {};
                                                emerged.forEach(c => {
                                                    const size = parseFloat((c.emergenceSize || '').replace(/[^0-9.]/g, ''));
                                                    const ratio = (!isNaN(size) && size > 0) ? growthTarget / size : 1;
                                                    const origin = new Date(c.hatchDate);
                                                    c.history.forEach(h => {
                                                        const w = parseFloat((h.size || '').replace(/[^0-9.]/g, ''));
                                                        if (isNaN(w) || w <= 0 || !h.date) return;
                                                        const elapsed = Math.round((new Date(h.date) - origin) / 86400000);
                                                        if (elapsed < 0) return;
                                                        if (!points[elapsed]) points[elapsed] = [];
                                                        points[elapsed].push(w * ratio);
                                                    });
                                                });
                                                const newTable = Object.keys(points).map(d => ({ day: parseInt(d), w: Math.round(points[d].reduce((a,b)=>a+b,0)/points[d].length*10)/10 })).sort((a,b)=>a.day-b.day);
                                                if (newTable.length === 0) { alert('データが不足しています'); return; }
                                                if (newTable[0].day > 0) newTable.unshift({day:0, w:0.1});
                                                GROWTH_TABLE.length = 0;
                                                newTable.forEach(r => GROWTH_TABLE.push(r));
                                                setShowGrowthPanel(false);
                                                alert('成長テーブルを更新しました（' + emerged.length + '個体）');
                                            }} className="flex-1 bg-emerald-600 py-2 rounded text-white text-xs font-bold">テーブル生成</button>
                                            <button onClick={() => {
                                                GROWTH_TABLE.length = 0;
                                                [{day:0,w:0},{day:30,w:0.5},{day:60,w:1.5},{day:90,w:3.5},{day:120,w:6},{day:150,w:9},{day:180,w:13},{day:210,w:17},{day:240,w:21},{day:270,w:24},{day:300,w:26.5},{day:330,w:28},{day:360,w:29},{day:400,w:29.5},{day:450,w:29},{day:500,w:28}].forEach(r => GROWTH_TABLE.push(r));
                                                setShowGrowthPanel(false);
                                            }} className="flex-1 bg-neutral-600 py-2 rounded text-neutral-300 text-xs">リセット</button>
                                        </div>
                                    </div>
                                )}
                                <div className="flex gap-1">
                                <button onClick={() => setShowGrowthPanel(v => !v)} className="bg-emerald-700 px-2 py-1 rounded text-xs text-white font-bold"><i className="fa-solid fa-chart-line mr-1"></i>成長率設定</button>
                                <button onClick={() => setShowRecordModal({item: form.stage, size:'', temp:'', date:new Date().toISOString().split('T')[0], index:null})} className="bg-emerald-600 px-2 py-1 rounded text-[10px] text-white">追加</button>
                                 </div>
                            </div>
                            <div className="overflow-hidden rounded border border-neutral-800">
                                <table className="w-full text-[10px]">
                                    <thead className="bg-neutral-800">
                                        <tr className="text-white text-center">
                                            <th className="p-2">日付</th>
                                            <th className="p-2">ステージ</th>
                                            <th className="p-2">体重</th>
                                            <th className="p-2">成長率</th>
                                            <th className="p-2">温度</th>
                                            <th className="p-2">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {form.history.map((h,i) => (
                                            <tr key={i} className="border-b border-neutral-800 hover:bg-neutral-800/50 transition-colors text-center">
                                                <td className="p-2">{h.date}</td>
                                                <td className="p-2">{h.item}</td>
                                                <td className="p-2">{h.size}</td>
                                                <td className="p-2"><GrowthRateSpan rate={calcGrowthRate(form.hatchDate, h, growthTable)} /></td>
                                                <td className="p-2">{h.temp}</td>
                                                <td className="p-2">
                                                    <div className="flex gap-1 justify-center">
                                                        <button onClick={() => setShowRecordModal({item:h.item, size:h.size, temp:h.temp, date:h.date, index:i})} className="bg-emerald-600 text-white px-2 py-0.5 rounded text-[10px] font-bold">訂正</button>
                                                        <button onClick={() => deleteRecord(i)} className="bg-red-700 text-white px-2 py-0.5 rounded text-[10px] font-bold">削除</button>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <CompareGrowthChart mainCreature={form} allCreatures={allForChart} showIdealCurve={showIdealCurve} idealCurve={showIdealCurve} onToggleIdealCurve={() => setShowIdealCurve(v => !v)} growthTable={growthTable} />

                    {/* 累積F値 */}
                    <div className="bg-neutral-900 p-6 rounded-xl border border-neutral-700 mt-4 text-white shadow-2xl space-y-3">
                        <h3 className="font-bold border-b border-neutral-700 pb-2 text-sm">累積近親交配係数（個体自身のF値）</h3>
                        <div className="flex items-center justify-between">
                            <p className="text-xs text-neutral-300">この個体の両親間のF値。自身が近親交配の産物かどうかを示します。</p>
                            <p className="text-2xl font-bold ml-4 shrink-0" style={{ color: gradColor(selfF, 0.25) }}>{(selfF * 100).toFixed(2)}%</p>
                        </div>
                        <div className="w-full bg-neutral-700 rounded-full h-2">
                            <div className="h-2 rounded-full" style={{ width: `${Math.min(selfF / 0.25 * 100, 100)}%`, backgroundColor: gradColor(selfF, 0.25) }}></div>
                        </div>
                        <p className="text-xs"><span className="font-bold" style={{ color: gradColor(selfF, 0.25) }}>{selfFInfo.label}</span></p>
                        <p className="text-[10px] text-neutral-500">※ 登録血統情報の範囲内（最大6世代）で計算。</p>
                    </div>

                    {/* 他個体との血縁係数一覧 */}
                    <div className="bg-neutral-900 p-6 rounded-xl border border-neutral-700 mt-4 text-white shadow-2xl space-y-3">
                        <h3 className="font-bold border-b border-neutral-700 pb-2 text-sm">他個体との血縁係数（r値）</h3>
                        <p className="text-[10px] text-neutral-400">値が高いほど遺伝的に近い関係。親子・きょうだい≒50%、いとこ≒12.5%が理論値です。</p>
                        <div className="space-y-2">
                            {relatedList.map(({ creature: c, r }) => {
                                const pct = (r * 100).toFixed(2);
                                const col = gradColor(r, 0.5);
                                return (
                                    <div key={c.id} className="flex items-center gap-2">
                                        <span className="text-[11px] w-28 truncate shrink-0">{c.name}</span>
                                        <div className="flex-1 bg-neutral-700 rounded-full h-1.5">
                                            <div className="h-1.5 rounded-full" style={{ width: `${Math.min(r / 0.5 * 100, 100)}%`, backgroundColor: col }}></div>
                                        </div>
                                        <span className="text-[11px] w-12 text-right shrink-0 font-bold" style={{ color: col }}>{pct}%</span>
                                    </div>
                                );
                            })}
                        </div>
                        <p className="text-[10px] text-neutral-500">※ 登録血統情報の範囲内（最大6世代）で計算。r=0の個体は血縁なし。</p>
                    </div>

                    {/* 飼育記録編集モーダル（「サイズ」→「体重」、日付不明チェックボックス対応） */}
                    {showRecordModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-neutral-900 p-6 rounded-xl w-full max-w-sm border border-neutral-700 space-y-4 shadow-2xl">
                                <h3 className="font-bold text-white">飼育記録の編集</h3>
                                <div className="space-y-3">
                                    <div>
                                        <p className="text-[10px] text-white mb-1">日付</p>
                                        <DateInput
                                            value={showRecordModal.date}
                                            onChange={v => setShowRecordModal({...showRecordModal, date: v})}
                                            className="w-full bg-neutral-800 p-2 rounded text-white text-sm border border-neutral-700"
                                        />
                                    </div>
                                    <input className="w-full bg-neutral-800 p-2 rounded text-white text-sm border border-neutral-700" placeholder="ステージ" value={showRecordModal.item} onChange={e=>setShowRecordModal({...showRecordModal, item:e.target.value})} />
                                    <div className="flex items-center gap-1">
                                        <input type="number" step="0.1" inputMode="decimal" className="flex-1 bg-neutral-800 p-2 rounded text-white text-sm border border-neutral-700" placeholder="体重（数値のみ）" value={showRecordModal.size != null ? String(showRecordModal.size).replace(/[^0-9.\-]/g, '') : ''} onChange={e=>setShowRecordModal({...showRecordModal, size:e.target.value})} />
                                        <span className="text-xs text-neutral-400 shrink-0">g</span>
                                    </div>
                                    <div className="flex items-center gap-1">
                                        <input type="number" step="0.1" inputMode="decimal" className="flex-1 bg-neutral-800 p-2 rounded text-white text-sm border border-neutral-700" placeholder="温度（数値のみ）" value={showRecordModal.temp != null ? String(showRecordModal.temp).replace(/[^0-9.\-]/g, '') : ''} onChange={e=>setShowRecordModal({...showRecordModal, temp:e.target.value})} />
                                        <span className="text-xs text-neutral-400 shrink-0">℃</span>
                                    </div>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => setShowRecordModal(null)} className="w-full bg-neutral-700 py-2 rounded font-bold text-white text-sm">キャンセル</button>
                                    <button onClick={() => saveRecord(showRecordModal)} className="w-full bg-emerald-600 py-2 rounded font-bold text-white text-sm">保存</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
