<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beetle Base - 管理画面</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-neutral-950 text-white font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [selectedCreature, setSelectedCreature] = useState(null);
            const [creatures, setCreatures] = useState([
                { id: '1', name: '個体 1号', alias: '極太血統A', origin: '福岡県久留米市', generation: 'F5', maleParent: '-', femaleParent: '-', stage: '幼虫', isForSale: false, 
                  history: [{item: '菌糸ビン交換', date: '2026-06-01', size: '15g'}, {item: '初令投入', date: '2026-04-01', size: '1g'}] }
            ]);

            const updateCreature = (updated) => {
                setCreatures(creatures.map(c => c.id === updated.id ? updated : c));
                setSelectedCreature(updated);
            };

            const addHistory = (id) => {
                const item = prompt("項目を入力:");
                const date = new Date().toISOString().split('T')[0];
                const size = prompt("サイズを入力:");
                if(item && size) {
                    const c = creatures.find(x => x.id === id);
                    updateCreature({...c, history: [...c.history, {item, date, size}]});
                }
            };

            if (selectedCreature) {
                return <DetailView creature={selectedCreature} onBack={() => setSelectedCreature(null)} onUpdate={updateCreature} onAddHistory={addHistory} />;
            }

            return (
                <div className="min-h-screen">
                    <nav className="bg-neutral-900 border-b border-neutral-800 p-4 font-bold text-emerald-400">Beetle Base</nav>
                    <main className="p-4 overflow-x-auto">
                        <table className="w-full text-sm bg-neutral-900 rounded-lg overflow-hidden">
                            <thead className="bg-neutral-800">
                                <tr>
                                    <th className="p-3 text-left">販売</th><th className="p-3 text-left">個体名</th><th className="p-3 text-left">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                {creatures.map(c => (
                                    <tr key={c.id} className="border-t border-neutral-800" onClick={() => setSelectedCreature(c)}>
                                        <td className="p-3"><input type="checkbox" checked={c.isForSale} onChange={(e) => { e.stopPropagation(); setCreatures(creatures.map(x=>x.id===c.id?{...x, isForSale:!x.isForSale}:x))}} /></td>
                                        <td className="p-3 font-bold">{c.name}</td>
                                        <td className="p-3"><button onClick={(e) => { e.stopPropagation(); if(confirm('削除しますか？')) setCreatures(creatures.filter(x=>x.id!==c.id)) }} className="text-red-400">削除</button></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </main>
                </div>
            );
        }

        function DetailView({ creature, onBack, onUpdate, onAddHistory }) {
            const [isEditing, setIsEditing] = useState(false);
            const [editForm, setEditForm] = useState(creature);

            const save = () => { onUpdate(editForm); setIsEditing(false); };

            return (
                <div className="p-6 max-w-lg mx-auto">
                    <button onClick={onBack} className="mb-6 text-emerald-400 font-bold">← 一覧に戻る</button>
                    <div className="bg-neutral-900 p-6 rounded-xl border border-neutral-700 shadow-xl space-y-4">
                        <div className="flex justify-between items-center border-b border-neutral-700 pb-2">
                            <h2 className="text-2xl font-bold">{isEditing ? <input className="bg-neutral-800 p-1 w-full" value={editForm.name} onChange={e=>setEditForm({...editForm, name:e.target.value})} /> : creature.name}</h2>
                            <button onClick={isEditing ? save : () => setIsEditing(true)} className="bg-emerald-700 px-4 py-1 rounded font-bold">{isEditing ? '保存' : '編集'}</button>
                        </div>
                        
                        <div className="grid grid-cols-2 gap-4 text-sm">
                            <p className="text-neutral-400">名称:</p>
                            {isEditing ? <input className="bg-neutral-800 p-1" value={editForm.alias} onChange={e=>setEditForm({...editForm, alias:e.target.value})} /> : <p className="font-bold">{creature.alias}</p>}
                            {/* 以下同様に項目を追加可能 */}
                        </div>

                        <div className="border-t border-neutral-700 pt-6">
                            <div className="flex justify-between items-center mb-3">
                                <h3 className="font-bold text-emerald-400">飼育履歴</h3>
                                <button onClick={() => onAddHistory(creature.id)} className="text-xs bg-neutral-700 px-3 py-1 rounded">+ 履歴追加</button>
                            </div>
                            <table className="w-full text-sm">
                                <thead><tr className="text-neutral-400 border-b border-neutral-700 text-left"><th>項目</th><th>日付</th><th>サイズ</th></tr></thead>
                                <tbody>
                                    {creature.history.map((h, i) => (
                                        <tr key={i} className="border-b border-neutral-800">
                                            <td className="py-2">{h.item}</td><td className="py-2">{h.date}</td><td className="py-2">{h.size}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
