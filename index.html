<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beetle Base - 統合管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-neutral-950 text-white font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('list');
            const [selectedCreature, setSelectedCreature] = useState(null);
            const [creatures, setCreatures] = useState([
                { id: '1', name: '個体 1号', alias: '極太血統A', origin: '福岡県久留米市', generation: 'F5', maleParent: '-', femaleParent: '-', stage: '幼虫', isForSale: false, history: [{item: '菌糸ビン交換', date: '2026-06-01', size: '15g'}] }
            ]);

            const updateCreature = (updated) => {
                setCreatures(creatures.map(c => c.id === updated.id ? updated : c));
                setSelectedCreature(updated);
            };

            const addHistory = (id) => {
                const item = prompt("項目:");
                const size = prompt("サイズ:");
                if(item && size) {
                    const c = creatures.find(x => x.id === id);
                    updateCreature({...c, history: [...c.history, {item, date: new Date().toISOString().split('T')[0], size}]});
                }
            };

            if (selectedCreature) {
                return <DetailView creature={selectedCreature} onBack={() => setSelectedCreature(null)} onUpdate={updateCreature} onAddHistory={addHistory} />;
            }

            return (
                <div className="min-h-screen">
                    <nav className="bg-neutral-900 border-b border-neutral-800 p-4 flex gap-4">
                        {['list', 'pedigree', 'simulation'].map(tab => (
                            <button key={tab} onClick={() => setActiveTab(tab)} className={activeTab === tab ? "font-bold text-emerald-400" : ""}>{tab === 'list' ? '一覧' : tab === 'pedigree' ? '血統図' : 'シミュ'}</button>
                        ))}
                    </nav>
                    <main className="p-4 overflow-x-auto">
                        {activeTab === 'list' ? (
                            <table className="w-full text-sm bg-neutral-900 rounded-lg overflow-hidden">
                                <thead className="bg-neutral-800"><tr><th className="p-3">販売</th><th className="p-3">個体名</th><th className="p-3">操作</th></tr></thead>
                                <tbody>
                                    {creatures.map(c => (
                                        <tr key={c.id} className="border-t border-neutral-800" onClick={() => setSelectedCreature(c)}>
                                            <td className="p-3"><input type="checkbox" checked={c.isForSale} onChange={(e) => { e.stopPropagation(); setCreatures(creatures.map(x=>x.id===c.id?{...x, isForSale:!x.isForSale}:x))}} /></td>
                                            <td className="p-3 font-bold">{c.name}</td>
                                            <td className="p-3"><button onClick={(e) => { e.stopPropagation(); if(confirm('削除?')) setCreatures(creatures.filter(x=>x.id!==c.id)) }} className="text-red-400">削除</button></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        ) : <div className="p-4 text-neutral-500">機能実装中...</div>}
                    </main>
                </div>
            );
        }

        function DetailView({ creature, onBack, onUpdate, onAddHistory }) {
            const [isEditing, setIsEditing] = useState(false);
            const [form, setForm] = useState(creature);

            const fields = [
                { key: 'name', label: '個体名' },
                { key: 'alias', label: '名称' },
                { key: 'origin', label: '産地' },
                { key: 'generation', label: '累代' },
                { key: 'maleParent', label: 'オス親' },
                { key: 'femaleParent', label: 'メス親' },
                { key: 'stage', label: 'ステージ' }
            ];

            return (
                <div className="p-6 max-w-lg mx-auto">
                    <button onClick={onBack} className="mb-4 text-emerald-400">← 一覧に戻る</button>
                    <div className="bg-neutral-900 p-6 rounded-xl border border-neutral-700 space-y-4">
                        <div className="flex justify-between items-center">
                            <h2 className="text-xl font-bold">詳細情報</h2>
                            <button onClick={isEditing ? () => { onUpdate(form); setIsEditing(false); } : () => setIsEditing(true)} className="bg-emerald-700 px-3 py-1 rounded">{isEditing ? '保存' : '編集'}</button>
                        </div>
                        <div className="grid grid-cols-2 gap-2 text-sm">
                            {fields.map(f => (
                                <React.Fragment key={f.key}>
                                    <p className="text-neutral-400">{f.label}:</p>
                                    {isEditing ? <input className="bg-neutral-800 p-1 w-full" value={form[f.key]} onChange={e=>setForm({...form, [f.key]:e.target.value})} /> : <p>{creature[f.key]}</p>}
                                </React.Fragment>
                            ))}
                        </div>
                        <div className="border-t pt-4">
                            <div className="flex justify-between mb-2"><h3>飼育履歴</h3><button onClick={() => onAddHistory(creature.id)} className="text-xs bg-neutral-700 px-2 py-1">+ 履歴追加</button></div>
                            <table className="w-full text-xs">
                                <thead><tr className="text-neutral-400 border-b border-neutral-700 text-left"><th>項目</th><th>日付</th><th>サイズ</th></tr></thead>
                                <tbody>{creature.history.map((h,i) => <tr key={i} className="border-b border-neutral-800"><td>{h.item}</td><td>{h.date}</td><td>{h.size}</td></tr>)}</tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
