<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beetle Base - 統合管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-neutral-950 text-white font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [selectedCreature, setSelectedCreature] = useState(null);
            const [creatures, setCreatures] = useState(() => {
                const saved = localStorage.getItem('beetle_data');
                return saved ? JSON.parse(saved) : [];
            });

            // creaturesの状態が変わるたびに自動保存
            useEffect(() => {
                localStorage.setItem('beetle_data', JSON.stringify(creatures));
            }, [creatures]);

            const updateCreature = (updatedCreature) => {
                setCreatures(creatures.map(c => c.id === updatedCreature.id ? updatedCreature : c));
            };

            if (selectedCreature) return <DetailView creature={selectedCreature} onBack={() => setSelectedCreature(null)} onUpdate={updateCreature} />;

            return (
                <div className="min-h-screen p-4">
                    <nav className="mb-4 flex justify-between items-center font-bold text-emerald-400">
                        <span>Beetle Base</span>
                        <button onClick={() => {
                            const newC = { id: Date.now().toString(), name: '新規個体', history: [], stage: '幼虫' };
                            setCreatures([newC, ...creatures]);
                            setSelectedCreature(newC);
                        }} className="bg-emerald-600 px-3 py-1 rounded text-sm text-white">➕ 追加</button>
                    </nav>
                    <div className="overflow-x-auto bg-neutral-900 rounded-lg shadow-xl">
                        <table className="w-full text-sm border-collapse whitespace-nowrap">
                            <thead className="bg-neutral-800">
                                <tr>
                                    <th className="p-3">個体名</th><th className="p-3">ステージ</th><th className="p-3">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                {creatures.map(c => (
                                    <tr key={c.id} className="border-t border-neutral-800 hover:bg-neutral-800 cursor-pointer" onClick={() => setSelectedCreature(c)}>
                                        <td className="p-3 font-bold">{c.name}</td><td className="p-3">{c.stage}</td>
                                        <td className="p-3"><button onClick={(e) => { e.stopPropagation(); setCreatures(creatures.filter(x=>x.id!==c.id)) }} className="bg-emerald-600 px-2 py-1 rounded text-xs text-white">削除</button></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function DetailView({ creature, onBack, onUpdate }) {
            const [form, setForm] = useState(creature);
            const [showModal, setShowModal] = useState(null);

            const saveRecord = (record) => {
                let h = [...form.history];
                if (record.index !== null) h[record.index] = {item:record.item, size:record.size, date:h[record.index].date};
                else h.push({item:record.item, size:record.size, date:new Date().toISOString().split('T')[0]});
                
                const updated = {...form, history: h};
                setForm(updated);
                onUpdate(updated); // 記録追加の瞬間に親の状態(localStorage)を更新
                setShowModal(null);
            };

            return (
                <div className="p-6 max-w-lg mx-auto">
                    <button onClick={onBack} className="mb-4 text-emerald-400 font-bold">← 一覧に戻る</button>
                    <div className="bg-neutral-900 p-6 rounded-xl border border-neutral-700 space-y-4">
                        <input className="bg-neutral-800 p-2 w-full font-bold text-xl" value={form.name} onChange={e=>setForm({...form, name:e.target.value})} />
                        <div className="border-t border-neutral-700 pt-4">
                            <button onClick={() => setShowModal({item:'', size:'', index:null})} className="bg-emerald-600 px-3 py-1 rounded text-sm w-full mb-4">＋ 記録を追加</button>
                            {form.history.map((h,i) => (
                                <div key={i} className="flex justify-between bg-neutral-800 p-2 mb-2 rounded text-xs">
                                    <span>{h.item} ({h.size})</span>
                                    <button onClick={() => setShowModal({...h, index:i})} className="text-emerald-400">訂正</button>
                                </div>
                            ))}
                        </div>
                    </div>
                    {showModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4">
                            <div className="bg-neutral-900 p-6 rounded-xl w-full max-w-sm border border-neutral-700 space-y-4">
                                <input placeholder="項目" className="w-full bg-neutral-800 p-2 rounded" value={showModal.item} onChange={e=>setShowModal({...showModal, item:e.target.value})} />
                                <input placeholder="サイズ" className="w-full bg-neutral-800 p-2 rounded" value={showModal.size} onChange={e=>setShowModal({...showModal, size:e.target.value})} />
                                <button onClick={() => saveRecord(showModal)} className="w-full bg-emerald-600 py-2 rounded font-bold text-white">保存</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
