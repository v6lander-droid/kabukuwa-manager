<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beetle Base - 統合管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        table { border-collapse: separate; border-spacing: 0; width: 100%; }
        /* 左側に列を固定 */
        .sticky-col-sale { position: sticky; left: 0; z-index: 100; background-color: #171717; border-right: 1px solid #333; }
        .sticky-col-name { position: sticky; left: 80px; z-index: 10; background-color: #171717; border-right: 1px solid #333; }
        .scrollable-area { max-height: 70vh; overflow-y: auto; }
        .history-scroll { max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body class="bg-neutral-950 text-white font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function useBodyScrollLock(isLocked) {
            useEffect(() => {
                const originalStyle = window.getComputedStyle(document.body).overflow;
                if (isLocked) {
                    document.body.style.overflow = 'hidden';
                } else {
                    document.body.style.overflow = originalStyle;
                }
                return () => { document.body.style.overflow = originalStyle; };
            }, [isLocked]);
        }

        function App() {
            const [selectedCreature, setSelectedCreature] = useState(null);
            const [creatures, setCreatures] = useState(() => {
                const saved = localStorage.getItem('beetle_data');
                return saved ? JSON.parse(saved) : Array.from({ length: 50 }, (_, i) => ({
                    id: (i + 1).toString(), name: `個体 ${i + 1}号`, alias: '極太血統', origin: '福岡県久留米市', generation: 'F5', maleParent: 'M-1', femaleParent: 'F-1', gene: '未解析', mendelPrediction: 'AA:100%', stage: i % 3 === 0 ? '蛹' : '幼虫', saleStatus: '非売', size: (30 + i * 2).toString(), hatchDate: '2026-06-05', 
                    history: [{date: '2026-06-05', item: '孵化', size: '5'}]
                }));
            });
            const [sort, setSort] = useState({ key: 'id', direction: 'asc' });

            useEffect(() => { localStorage.setItem('beetle_data', JSON.stringify(creatures)); }, [creatures]);

            const updateCreature = (updated) => {
                setCreatures(creatures.map(c => c.id === updated.id ? updated : c));
                setSelectedCreature(updated);
            };

            const getStatusBtnColor = (status) => status === '販売' ? 'bg-emerald-600' : status === '予備' ? 'bg-yellow-600' : 'bg-neutral-700';

            const processedCreatures = [...creatures].sort((a, b) => {
                const valA = a[sort.key] || '', valB = b[sort.key] || '';
                return (valA < valB ? -1 : 1) * (sort.direction === 'asc' ? 1 : -1);
            });

            if (selectedCreature) return <DetailView creature={selectedCreature} creatures={creatures} onBack={() => setSelectedCreature(null)} onUpdate={updateCreature} />;

            return (
                <div className="p-4">
                    <nav className="mb-4 flex justify-between items-center font-bold text-emerald-400">
                        <span>Beetle Base - 全個体一覧</span>
                        <button onClick={() => { const n = {id:Date.now().toString(), name:'新規', history:[], stage:'幼虫', saleStatus:'非売', size:'0'}; setCreatures([n,...creatures]); setSelectedCreature(n); }} className="bg-emerald-600 px-3 py-1 rounded text-white">追加</button>
                    </nav>
                    <div className="overflow-x-auto bg-neutral-900 rounded-lg">
                        <table className="w-full text-sm text-white whitespace-nowrap">
                            <thead>
                                <tr className="bg-neutral-800 text-left border-b border-neutral-700">
                                    <th className="p-3 sticky-col-sale">販売</th>
                                    <th className="p-3 sticky-col-name">個体名</th>
                                    {['遺伝子', 'サイズ', 'オス親', 'メス親', 'ステージ', '操作'].map(h => <th key={h} className="p-3">{h}</th>)}
                                </tr>
                            </thead>
                            <tbody>
                                {processedCreatures.map(c => (
                                    <tr key={c.id} className="border-b border-neutral-800 hover:bg-neutral-800 cursor-pointer" onClick={(e) => { if (!e.target.closest('[data-sale-cell="true"]')) setSelectedCreature(c); }}>
                                        <td data-sale-cell="true" className="p-3 sticky-col-sale">
                                            <button type="button" onClick={(e) => { e.stopPropagation(); const s = ['販売', '予備', '非売']; updateCreature({...c, saleStatus: s[(s.indexOf(c.saleStatus) + 1) % 3]}); }} className={`px-2 py-1 rounded text-xs w-16 ${getStatusBtnColor(c.saleStatus)}`}>{c.saleStatus}</button>
                                        </td>
                                        <td className="p-3 sticky-col-name font-bold">{c.name}</td>
                                        <td className="p-3">{c.gene}</td><td className="p-3">{c.size}</td><td className="p-3">{c.maleParent}</td><td className="p-3">{c.femaleParent}</td><td className="p-3">{c.stage}</td>
                                        <td className="p-3"><button onClick={(e) => {e.stopPropagation(); if(confirm('削除?')) setCreatures(creatures.filter(x=>x.id!==c.id))}} className="bg-emerald-600 px-2 py-1 rounded">削除</button></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // --- DetailViewは既存のまま省略なしで維持 ---
        function DetailView({ creature, creatures, onBack, onUpdate }) { /* ...省略... */ }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
