<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beetle Base - 統合管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-neutral-950 text-white font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [selectedCreature, setSelectedCreature] = useState(null);
            const [creatures, setCreatures] = useState(() => {
                const saved = localStorage.getItem('beetle_data');
                return saved ? JSON.parse(saved) : [];
            });
            useEffect(() => { localStorage.setItem('beetle_data', JSON.stringify(creatures)); }, [creatures]);

            const addNew = () => {
                const newC = { id: Date.now().toString(), name: '新規個体', history: [], stage: '幼虫' };
                setCreatures([newC, ...creatures]);
                setSelectedCreature(newC);
            };

            if (selectedCreature) return <DetailView creature={selectedCreature} creatures={creatures} onBack={() => setSelectedCreature(null)} onUpdate={(u) => {setCreatures(creatures.map(c => c.id === u.id ? u : c)); setSelectedCreature(u);}} />;

            return (
                <div className="p-4"><nav className="mb-4 flex justify-between items-center font-bold text-emerald-400"><span>Beetle Base</span><button onClick={addNew} className="bg-emerald-600 px-3 py-1 rounded text-white">➕ 追加</button></nav>
                <div className="bg-neutral-900 rounded-lg p-4">{creatures.map(c => <div key={c.id} className="p-2 border-b border-neutral-800 cursor-pointer" onClick={() => setSelectedCreature(c)}>{c.name}</div>)}</div></div>
            );
        }

        function DetailView({ creature, creatures, onBack, onUpdate }) {
            const [form, setForm] = useState(creature);
            const [ghostId, setGhostId] = useState('');
            const canvasRef = useRef(null);

            useEffect(() => {
                const ctx = canvasRef.current.getContext('2d');
                ctx.clearRect(0, 0, 400, 200);
                
                const drawLine = (data, color, width) => {
                    if (data.length < 2) return;
                    ctx.beginPath();
                    ctx.strokeStyle = color;
                    ctx.lineWidth = width;
                    data.forEach((h, i) => {
                        const x = (i / (data.length - 1)) * 380 + 10;
                        const size = parseFloat(h.size.replace('g','').replace('mm',''));
                        const y = 190 - (size / 100) * 180;
                        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                    });
                    ctx.stroke();
                };

                drawLine(form.history, '#10b981', 3);
                if (ghostId) {
                    const ghost = creatures.find(c => c.id === ghostId);
                    if (ghost) drawLine(ghost.history, '#4b5563', 1);
                }
            }, [form, ghostId]);

            return (
                <div className="p-6 max-w-lg mx-auto text-white">
                    <button onClick={onBack} className="text-emerald-400 mb-4">← 戻る</button>
                    <div className="bg-neutral-900 p-6 rounded-xl space-y-4">
                        <input className="w-full bg-neutral-800 p-2 text-xl font-bold" value={form.name} onChange={e => onUpdate({...form, name: e.target.value})} />
                        <canvas ref={canvasRef} width="400" height="200" className="bg-neutral-800 rounded w-full" />
                        <select className="w-full bg-neutral-800 p-2" onChange={(e) => setGhostId(e.target.value)}>
                            <option value="">ゴーストグラフを選択</option>
                            {creatures.filter(c => c.id !== form.id).map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                        </select>
                        <button onClick={() => { const s = prompt('記録追加 (項目,サイズ)'); if(s) { const [item, size] = s.split(','); onUpdate({...form, history: [...form.history, {item, size, date: 'today'}]}); }}} className="w-full bg-emerald-600 p-2">記録を追加</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
