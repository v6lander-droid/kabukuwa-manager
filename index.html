<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beetle Base - 統合管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        table { border-collapse: separate; border-spacing: 0; }
        /* 固定列のスタイル */
        .sticky-sale { position: sticky; left: 0; z-index: 30; background-color: #171717; }
        .sticky-name { position: sticky; left: 60px; z-index: 30; background-color: #171717; }
        /* スクロール設定 */
        .scrollable-area { max-height: 70vh; overflow-y: auto; }
        .history-scroll { max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body class="bg-neutral-950 text-white font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function useBodyScrollLock(isLocked) {
            useEffect(() => {
                const originalStyle = window.getComputedStyle(document.body).overflow;
                if (isLocked) {
                    document.body.style.overflow = 'hidden';
                } else {
                    document.body.style.overflow = originalStyle;
                }
                return () => { document.body.style.overflow = originalStyle; };
            }, [isLocked]);
        }

        function App() {
            const [selectedCreature, setSelectedCreature] = useState(null);
            const [filterStatus, setFilterStatus] = useState('すべて');
            const [creatures, setCreatures] = useState(() => {
                const saved = localStorage.getItem('beetle_data');
                if (saved) return JSON.parse(saved);
                return Array.from({ length: 50 }, (_, i) => {
                    const offset = i * 2;
                    return {
                        id: (i + 1).toString(), name: `個体 ${i + 1}号`, alias: '極太血統',
                        origin: '福岡県久留米市', generation: 'F5', maleParent: 'M-1', femaleParent: 'F-1',
                        gene: '未解析', mendelPrediction: 'AA:100%', stage: i % 3 === 0 ? '蛹' : '幼虫', saleStatus: '非売', size: (30 + offset).toString(), hatchDate: '2026-06-05', 
                        history: [
                            {date: '2026-06-05', item: '孵化', size: '5'},
                            {date: `2026-06-${10 + offset}`, item: '初令交換', size: (10 + offset).toString()},
                            {date: `2026-07-${10 + offset}`, item: '菌糸投入', size: (20 + offset).toString()},
                            {date: `2026-08-${10 + offset}`, item: 'マット交換', size: (30 + offset).toString()}
                        ]
                    };
                });
            });
            const [sort, setSort] = useState({ key: 'id', direction: 'asc' });

            useEffect(() => { localStorage.setItem('beetle_data', JSON.stringify(creatures)); }, [creatures]);

            const updateCreature = (updated) => {
                setCreatures(creatures.map(c => c.id === updated.id ? updated : c));
                setSelectedCreature(updated);
            };

            const toggleSaleStatus = (e, creature) => {
                e.stopPropagation();
                const statuses = ['販売', '予備', '非売'];
                const currentIndex = statuses.indexOf(creature.saleStatus);
                const nextStatus = statuses[(currentIndex + 1) % statuses.length];
                updateCreature({ ...creature, saleStatus: nextStatus });
            };

            const getStatusColor = (status) => {
                if (status === '販売') return 'text-emerald-400 font-bold';
                if (status === '予備') return 'text-yellow-400 font-bold';
                return 'text-neutral-400';
            };

            const filteredCreatures = creatures.filter(c => filterStatus === 'すべて' || c.saleStatus === filterStatus);
            const processedCreatures = [...filteredCreatures].sort((a, b) => {
                const valA = a[sort.key] || '', valB = b[sort.key] || '';
                return (valA < valB ? -1 : 1) * (sort.direction === 'asc' ? 1 : -1);
            });

            if (selectedCreature) return <DetailView creature={selectedCreature} creatures={creatures} onBack={() => setSelectedCreature(null)} onUpdate={updateCreature} />;

            return (
                <div className="p-4">
                    <nav className="mb-4 flex flex-col gap-4">
                        <div className="flex justify-between items-center font-bold text-emerald-400">
                            <span>Beetle Base - 全個体一覧</span>
                            <button onClick={() => { const n = {id:Date.now().toString(), name:'新規個体', history:[], stage:'幼虫', saleStatus:'非売', size:'0', alias:'', origin:'', generation:'', hatchDate:'2026-06-05', gene:'未解析', mendelPrediction:'-', maleParent:'', femaleParent:''}; setCreatures([n,...creatures]); setSelectedCreature(n); }} className="bg-emerald-600 px-3 py-1 rounded text-white">追加</button>
                        </div>
                        <div className="flex gap-2 text-xs">
                            {['すべて', '販売', '予備', '非売'].map(s => (
                                <button key={s} onClick={() => setFilterStatus(s)} className={`px-3 py-1 rounded ${filterStatus === s ? 'bg-emerald-600 text-white' : 'bg-neutral-800 text-neutral-400'}`}>{s}</button>
                            ))}
                        </div>
                    </nav>
                    <div className="overflow-x-auto bg-neutral-900 rounded-lg">
                        <table className="text-sm text-white w-full whitespace-nowrap">
                            <thead>
                                <tr className="bg-neutral-800 text-left border-b border-neutral-700">
                                    <th className="p-3 sticky-sale cursor-pointer hover:bg-neutral-700" onClick={() => setSort({key:'saleStatus', direction: sort.key==='saleStatus' && sort.direction==='asc'?'desc':'asc'})}>販売</th>
                                    <th className="p-3 sticky-name cursor-pointer hover:bg-neutral-700" onClick={() => setSort({key:'name', direction: sort.key==='name' && sort.direction==='asc'?'desc':'asc'})}>個体名</th>
                                    {[{k:'gene',l:'遺伝子'}, {k:'size',l:'サイズ'}, {k:'maleParent',l:'オス親'}, {k:'femaleParent',l:'メス親'}, {k:'stage',l:'ステージ'}].map(h => <th key={h.k} className="p-3 cursor-pointer hover:bg-neutral-700" onClick={() => setSort({key:h.k, direction: sort.key===h.k && sort.direction==='asc'?'desc':'asc'})}>{h.l}</th>)}
                                    <th className="p-3">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                {processedCreatures.map(c => (
                                    <tr key={c.id} className="border-b border-neutral-800 cursor-pointer hover:bg-neutral-800" onClick={() => setSelectedCreature(c)}>
                                        <td className={`p-3 sticky-sale cursor-pointer ${getStatusColor(c.saleStatus)}`} onClick={(e) => toggleSaleStatus(e, c)}>{c.saleStatus}</td>
                                        <td className="p-3 sticky-name font-bold">{c.name}</td>
                                        <td className="p-3">{c.gene}</td><td className="p-3">{c.size}</td><td className="p-3">{c.maleParent}</td><td className="p-3">{c.femaleParent}</td><td className="p-3">{c.stage}</td>
                                        <td className="p-3"><button onClick={(e) => {e.stopPropagation(); if(confirm('削除?')) setCreatures(creatures.filter(x=>x.id!==c.id))}} className="bg-emerald-600 px-2 py-1 rounded">削除</button></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function DetailView({ creature, creatures, onBack, onUpdate }) {
            const [form, setForm] = useState(creature);
            const [editModal, setEditModal] = useState(false);
            const [ghostModal, setGhostModal] = useState(false);
            const [ghostId, setGhostId] = useState('');
            const [recordModal, setRecordModal] = useState({open: false, data: null, index: null});
            const canvasRef = useRef(null);
            useBodyScrollLock(editModal || ghostModal || recordModal.open);
            
            const fields = [{key:'name', label:'個体名'}, {key:'alias', label:'名称'}, {key:'origin', label:'産地'}, {key:'generation', label:'累代'}, {key:'size', label:'サイズ'}, {key:'hatchDate', label:'孵化日'}, {key:'gene', label:'遺伝子'}, {key:'mendelPrediction', label:'メンデル予測'}, {key:'maleParent', label:'オス親'}, {key:'femaleParent', label:'メス親'}, {key:'stage', label:'ステージ'}];
            
            const saveRecord = (record, index) => {
                const newHistory = [...form.history];
                if (index !== null) newHistory[index] = record;
                else newHistory.push(record);
                const updated = {...form, history: newHistory};
                setForm(updated);
                onUpdate(updated);
                setRecordModal({open: false, data: null, index: null});
            };
            
            const deleteRecord = (index) => {
                if(!confirm('この記録を削除しますか？')) return;
                const newHistory = form.history.filter((_, i) => i !== index);
                const updated = {...form, history: newHistory};
                setForm(updated);
                onUpdate(updated);
            };

            useEffect(() => {
                if (!canvasRef.current) return;
                const ctx = canvasRef.current.getContext('2d');
                ctx.clearRect(0, 0, 400, 200);
                const ghost = creatures.find(c => c.id === ghostId);
                const combinedData = [...form.history, ...(ghost?.history || [])];
                const getDays = (date, hatch) => (new Date(date) - new Date(hatch)) / (1000 * 60 * 60 * 24);
                const maxDays = Math.max(10, ...form.history.map(h => getDays(h.date, form.hatchDate)), ghost ? ...ghost.history.map(h => getDays(h.date, ghost.hatchDate)) : 0);
                const maxSize = Math.max(50, ...combinedData.map(h => parseFloat(h.size || 0)));
                ctx.strokeStyle = '#374151'; ctx.fillStyle = '#ffffff'; ctx.font = '10px sans-serif';
                for(let i=0; i<=4; i++) {
                    const y = 20 + i * 40;
                    ctx.beginPath(); ctx.moveTo(30, y); ctx.lineTo(380, y); ctx.stroke();
                    ctx.fillText(((4 - i) * (maxSize / 4)).toFixed(0) + 'g', 0, y + 3);
                }
                const drawLine = (data, hatchDate, color, width) => {
                    if (!data || data.length === 0) return;
                    ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = width;
                    data.sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach((h, i) => {
                        const days = Math.max(0, getDays(h.date, hatchDate));
                        const x = (days / maxDays) * 350 + 30;
                        const y = 180 - (parseFloat(h.size || 0) / maxSize) * 160;
                        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                    });
                    ctx.stroke();
                };
                drawLine(form.history, form.hatchDate, '#10b981', 3);
                if (ghost) drawLine(ghost.history, ghost.hatchDate, '#9ca3af', 2);
            }, [form, ghostId, creatures]);

            return (
                <div className="p-6 max-w-lg mx-auto text-white">
                    <button onClick={onBack} className="text-emerald-400 font-bold mb-4">← 一覧に戻る</button>
                    <div className="bg-neutral-900 p-6 rounded-xl space-y-4 relative">
                        <h2 className="text-xl font-bold border-b border-neutral-700 pb-2">詳細情報</h2>
                        <button onClick={() => setEditModal(true)} className="absolute top-6 right-6 bg-emerald-600 px-3 py-1 rounded text-xs font-bold text-white">編集</button>
                        {fields.map(f => <div key={f.key} className="flex text-sm"><span className="w-24 font-bold text-white shrink-0">{f.label}:</span><span className="break-all">{form[f.key]}</span></div>)}
                        <canvas ref={canvasRef} width="400" height="200" className="bg-neutral-900 rounded w-full border border-neutral-800" />
                        <button onClick={() => setGhostModal(true)} className="bg-emerald-600 px-4 py-2 rounded text-sm inline-block font-bold">
                            {ghostId ? `比較中: ${creatures.find(c=>c.id===ghostId)?.name}` : '比較対象を選択'}
                        </button>
                        <div className="border-t border-neutral-700 pt-4">
                            <h3 className="font-bold mb-2">飼育記録</h3>
                            <div className="history-scroll border border-neutral-800 rounded bg-neutral-950">
                                <table className="w-full text-xs text-left">
                                    <thead className="bg-neutral-800 sticky top-0"><tr><th className="p-2">日付</th><th className="p-2">項目</th><th className="p-2">サイズ</th><th className="p-2">操作</th></tr></thead>
                                    <tbody>{form.history.sort((a,b)=>new Date(a.date)-new Date(b.date)).map((h, i) => (
                                        <tr key={i} className="border-b border-neutral-800"><td className="p-2 text-left">{h.date}</td><td className="p-2">{h.item}</td><td className="p-2">{h.size}</td><td className="p-2 flex gap-1"><button onClick={() => setRecordModal({open: true, data: h, index: i})} className="bg-emerald-600 text-white px-2 py-1 rounded font-bold">編集</button><button onClick={() => deleteRecord(i)} className="bg-red-600 text-white px-2 py-1 rounded font-bold">削除</button></td></tr>
                                    ))}</tbody>
                                </table>
                            </div>
                            <button onClick={() => setRecordModal({open: true, data: {date: new Date().toISOString().split('T')[0], item: '', size: ''}, index: null})} className="inline-block bg-emerald-600 px-3 py-1 mt-4 rounded text-xs font-bold">追加</button>
                        </div>
                    </div>
                    {ghostModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-neutral-900 p-4 rounded-xl w-full max-w-sm border border-neutral-700 scrollable-area">
                                <h3 className="font-bold mb-3">比較対象を選択</h3>
                                <button onClick={() => setGhostModal(false)} className="w-full bg-neutral-700 p-2 rounded mb-2">戻る</button>
                                <button onClick={() => {setGhostId(''); setGhostModal(false);}} className="w-full text-left p-2 border-b border-neutral-800 hover:bg-neutral-800">比較解除</button>
                                {creatures.filter(c => c.id !== form.id).map(c => <button key={c.id} onClick={() => {setGhostId(c.id); setGhostModal(false);}} className="w-full text-left p-2 border-b border-neutral-800 hover:bg-neutral-800">{c.name}</button>)}
                            </div>
                        </div>
                    )}
                    {editModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-neutral-900 p-6 rounded-xl w-full max-w-sm border border-neutral-700 space-y-3 scrollable-area">
                                <h3 className="font-bold border-b border-neutral-700 pb-2">個体編集</h3>
                                {fields.map(f => <div key={f.key}><label className="text-xs">{f.label}</label><input className="w-full bg-neutral-800 p-2 rounded" value={form[f.key]} onChange={e => setForm({...form, [f.key]: e.target.value})} /></div>)}
                                <div className="flex gap-2 mt-4"><button onClick={() => setEditModal(false)} className="w-full bg-neutral-700 p-2 rounded">戻る</button><button onClick={() => { onUpdate(form); setEditModal(false); }} className="w-full bg-emerald-600 p-2 rounded text-white">保存</button></div>
                            </div>
                        </div>
                    )}
                    {recordModal.open && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-neutral-900 p-6 rounded-xl w-full max-w-sm border border-neutral-700 space-y-4">
                                <h3 className="font-bold">飼育記録の追加・編集</h3>
                                <div className="space-y-3">
                                    <div className="flex items-center gap-2"><label className="w-16 text-xs">日付:</label><input type="date" className="flex-1 bg-neutral-800 p-2 rounded text-center" value={recordModal.data.date} onChange={e => setRecordModal({...recordModal, data: {...recordModal.data, date: e.target.value}})} /></div>
                                    <div className="flex items-center gap-2"><label className="w-16 text-xs">項目:</label><input className="flex-1 bg-neutral-800 p-2 rounded text-center" value={recordModal.data.item} onChange={e => setRecordModal({...recordModal, data: {...recordModal.data, item: e.target.value}})} /></div>
                                    <div className="flex items-center gap-2"><label className="w-16 text-xs">サイズ:</label><input className="flex-1 bg-neutral-800 p-2 rounded text-center" value={recordModal.data.size} onChange={e => setRecordModal({...recordModal, data: {...recordModal.data, size: e.target.value}})} /></div>
                                </div>
                                <div className="flex gap-2"><button onClick={() => setRecordModal({open: false})} className="w-full bg-neutral-700 p-2 rounded">戻る</button><button onClick={() => saveRecord(recordModal.data, recordModal.index)} className="w-full bg-emerald-600 p-2 rounded text-white">保存</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
