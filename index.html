<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beetle Base - 統合管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-neutral-950 text-white font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const generateDemoData = () => Array.from({ length: 50 }, (_, i) => ({
            id: (i + 1).toString(), name: `個体 ${i + 1}号`, alias: i % 2 === 0 ? '極太血統' : '標準血統',
            origin: '福岡県久留米市', generation: 'F' + (i % 5 + 1), maleParent: 'M-1', femaleParent: 'F-1',
            stage: i % 3 === 0 ? '幼虫' : i % 3 === 1 ? '蛹' : '成虫', saleStatus: '非売', 
            size: '80.0mm', hatchDate: '2026-05-01',
            history: [{item: '孵化', date: '2026-04-01', size: '1g'}]
        }));

        function App() {
            const [selectedCreature, setSelectedCreature] = useState(null);
            const [creatures, setCreatures] = useState(generateDemoData());
            const [filter, setFilter] = useState({ stage: '', alias: '' });
            const [sort, setSort] = useState({ key: 'id', direction: 'asc' });
            const [showFilter, setShowFilter] = useState(false);

            const addCreature = () => {
                const newId = (creatures.length + 1).toString();
                setCreatures([ { id: newId, name: `個体 ${newId}号`, alias: '新個体', origin: '未設定', generation: 'F1', maleParent: '-', femaleParent: '-', stage: '幼虫', saleStatus: '非売', size: '0mm', hatchDate: '-', history: [] }, ...creatures ]);
            };

            const deleteCreature = (id, e) => {
                e.stopPropagation();
                if(confirm('削除しますか？')) setCreatures(creatures.filter(c => c.id !== id));
            };

            const processedCreatures = useMemo(() => {
                return creatures.filter(c => (filter.stage === '' || c.stage === filter.stage) && (filter.alias === '' || c.alias.includes(filter.alias)))
                    .sort((a, b) => (a[sort.key] < b[sort.key] ? -1 : 1) * (sort.direction === 'asc' ? 1 : -1));
            }, [creatures, filter, sort]);

            const toggleSaleStatus = (id, e) => {
                e.stopPropagation();
                const statuses = ['非売', '予備', '販売'];
                setCreatures(creatures.map(c => c.id === id ? { ...c, saleStatus: statuses[(statuses.indexOf(c.saleStatus) + 1) % 3] } : c));
            };

            if (selectedCreature) return <DetailView creature={selectedCreature} onBack={() => setSelectedCreature(null)} onUpdate={(u) => { setCreatures(creatures.map(c => c.id === u.id ? u : c)); setSelectedCreature(u); }} />;

            const headers = [
                {key:'saleStatus', label:'販売'}, {key:'name', label:'個体名'}, {key:'alias', label:'名称'}, 
                {key:'generation', label:'累代'}, {key:'size', label:'サイズ'}, {key:'stage', label:'ステージ'}, {key:'hatchDate', label:'羽化日'}
            ];

            return (
                <div className="min-h-screen p-4">
                    <nav className="mb-4 flex justify-between items-center font-bold text-emerald-400">
                        <span>Beetle Base (全{creatures.length}匹)</span>
                        <div className="flex gap-2">
                            <button onClick={addCreature} className="bg-emerald-600 px-3 py-1 rounded text-sm text-white">➕ 追加</button>
                            <button onClick={() => setShowFilter(!showFilter)} className="bg-neutral-800 px-3 py-1 rounded text-sm text-white">⚙️ フィルター</button>
                        </div>
                    </nav>
                    
                    {showFilter && (
                        <div className="flex gap-2 mb-4 p-3 bg-neutral-900 rounded border border-neutral-700">
                            <select className="bg-neutral-800 p-2 rounded text-sm" onChange={e => setFilter({...filter, stage: e.target.value})}>
                                <option value="">全ステージ</option><option value="幼虫">幼虫</option><option value="蛹">蛹</option><option value="成虫">成虫</option>
                            </select>
                            <input className="bg-neutral-800 p-2 rounded text-sm w-full" placeholder="名称検索..." onChange={e => setFilter({...filter, alias: e.target.value})} />
                        </div>
                    )}

                    <div className="overflow-x-auto bg-neutral-900 rounded-lg shadow-xl">
                        <table className="w-full text-sm border-collapse whitespace-nowrap">
                            <thead className="bg-neutral-800">
                                <tr>
                                    {headers.map(h => (
                                        <th key={h.key} className="p-3 cursor-pointer hover:bg-neutral-700" onClick={() => setSort({key:h.key, direction: sort.key===h.key && sort.direction==='asc'?'desc':'asc'})}>
                                            {h.label} <span className="opacity-50">{sort.key === h.key && sort.direction === 'asc' ? '▲' : '▼'}</span>
                                        </th>
                                    ))}
                                    <th className="p-3">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                {processedCreatures.map(c => (
                                    <tr key={c.id} className="border-t border-neutral-800 hover:bg-neutral-800 cursor-pointer" onClick={() => setSelectedCreature(c)}>
                                        <td className="p-3"><button onClick={(e) => toggleSaleStatus(c.id, e)} className={`px-2 py-1 rounded text-[10px] font-bold ${c.saleStatus === '販売' ? 'bg-emerald-600' : c.saleStatus === '予備' ? 'bg-amber-600' : 'bg-neutral-600'}`}>{c.saleStatus}</button></td>
                                        <td className="p-3 font-bold">{c.name}</td><td className="p-3">{c.alias}</td><td className="p-3">{c.generation}</td>
                                        <td className="p-3">{c.size}</td><td className="p-3">{c.stage}</td><td className="p-3">{c.hatchDate}</td>
                                        <td className="p-3"><button onClick={(e) => deleteCreature(c.id, e)} className="bg-emerald-600 px-2 py-1 rounded text-xs">削除</button></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function DetailView({ creature, onBack, onUpdate }) {
            const [isEditing, setIsEditing] = useState(false);
            const [form, setForm] = useState(creature);
            const [input, setInput] = useState({ item: '', size: '', index: null });
            const fields = [
                {key:'name', label:'個体名'}, {key:'alias', label:'名称'}, {key:'origin', label:'産地'}, 
                {key:'generation', label:'累代'}, {key:'size', label:'サイズ'}, {key:'hatchDate', label:'羽化日'}, 
                {key:'maleParent', label:'オス親'}, {key:'femaleParent', label:'メス親'}, {key:'stage', label:'ステージ'}
            ];
            
            return (
                <div className="p-6 max-w-lg mx-auto">
                    <button onClick={onBack} className="mb-4 text-emerald-400 font-bold">← 一覧に戻る</button>
                    <div className="bg-neutral-900 p-6 rounded-xl border border-neutral-700 space-y-4">
                        <div className="flex justify-between items-center border-b border-neutral-700 pb-2">
                            <h2 className="text-xl font-bold">詳細情報</h2>
                            <button onClick={isEditing ? () => { onUpdate(form); setIsEditing(false); } : () => setIsEditing(true)} className="bg-emerald-600 px-4 py-1 rounded font-bold">{isEditing ? '保存' : '編集'}</button>
                        </div>
                        <div className="grid grid-cols-2 gap-2 text-sm">{fields.map(f => <React.Fragment key={f.key}><p className="text-neutral-400">{f.label}:</p>{isEditing ? <input className="bg-neutral-800 p-1 w-full" value={form[f.key]} onChange={e=>setForm({...form, [f.key]:e.target.value})} /> : <p>{creature[f.key]}</p>}</React.Fragment>)}</div>
                        <div className="border-t border-neutral-700 pt-4">
                            <h3 className="font-bold mb-3">飼育履歴</h3>
                            <table className="w-full text-xs mb-4"><thead><tr className="text-neutral-400 border-b border-neutral-700 text-left"><th>項目</th><th>日付</th><th>サイズ</th><th>操作</th></tr></thead><tbody>{creature.history.map((h,i) => <tr key={i} className="border-b border-neutral-800"><td>{h.item}</td><td>{h.date}</td><td>{h.size}</td><td><button onClick={() => setInput({item:h.item, size:h.size, index:i})} className="bg-emerald-600 px-1 rounded">訂正</button></td></tr>)}</tbody></table>
                            <div className="bg-neutral-800 p-3 rounded space-y-2"><input placeholder="項目" className="w-full bg-neutral-700 p-1" value={input.item} onChange={e=>setInput({...input, item:e.target.value})} /><input placeholder="サイズ" className="w-full bg-neutral-700 p-1" value={input.size} onChange={e=>setInput({...input, size:e.target.value})} /><button onClick={() => {if(input.item && input.size){ let h = [...creature.history]; input.index !== null ? h[input.index] = {item:input.item, size:input.size, date:h[input.index].date} : h.push({item:input.item, size:input.size, date:new Date().toISOString().split('T')[0]}); onUpdate({...creature, history: h}); setInput({item:'', size:'', index:null});}}} className="w-full bg-emerald-600 py-1 rounded font-bold">{input.index !== null ? '訂正を確定' : '履歴を追加'}</button></div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
