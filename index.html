<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beetle Base - 全機能統合版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-neutral-950 text-white font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('list');
            const [selectedCreature, setSelectedCreature] = useState(null);
            const [creatures, setCreatures] = useState([
                { id: '1', name: '個体 1号', stage: '幼虫', generation: 'F5', origin: '福岡', isForSale: false, exchangeHistory: [{size: '10g'}, {size: '15g'}], parents: null },
                { id: '2', name: '個体 2号', stage: '蛹', generation: 'F5', origin: '福岡', isForSale: true, exchangeHistory: [{size: '8g'}], parents: null },
                { id: '3', name: '個体 3号', stage: '成虫', generation: 'F6', origin: '福岡', isForSale: false, exchangeHistory: [{size: '30g'}], parents: {male: '1', female: '2'} }
            ]);

            const toggleSale = (id) => setCreatures(creatures.map(c => c.id === id ? {...c, isForSale: !c.isForSale} : c));
            const deleteCreature = (id) => { if(confirm('削除しますか？')) setCreatures(creatures.filter(c => c.id !== id)); };

            if (selectedCreature) {
                return <DetailView creature={selectedCreature} onBack={() => setSelectedCreature(null)} />;
            }

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="bg-neutral-900 border-b border-neutral-800 p-4 flex gap-4 overflow-x-auto">
                        {['list', 'pedigree', 'simulation'].map(tab => (
                            <button key={tab} onClick={() => setActiveTab(tab)} className={activeTab === tab ? "font-bold text-emerald-400" : ""}>{tab === 'list' ? '一覧' : tab === 'pedigree' ? '血統図' : 'シミュ'}</button>
                        ))}
                    </nav>

                    <main className="p-4 overflow-x-auto">
                        {activeTab === 'list' ? (
                            <div className="bg-neutral-900 rounded-lg shadow-xl overflow-x-auto">
                                <table className="w-full text-sm border-collapse">
                                    <thead>
                                        <tr className="bg-neutral-800">
                                            <th className="p-3 sticky left-0 bg-neutral-800 z-20">販売</th>
                                            <th className="p-3 sticky left-12 bg-neutral-800 z-20">個体名</th>
                                            <th className="p-3">ステージ</th>
                                            <th className="p-3">サイズ履歴</th>
                                            <th className="p-3">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {creatures.map(c => (
                                            <tr key={c.id} className="border-t border-neutral-800 hover:bg-neutral-800 cursor-pointer" onClick={() => setSelectedCreature(c)}>
                                                <td className="p-3 sticky left-0 bg-neutral-900 z-10" onClick={(e) => e.stopPropagation()}>
                                                    <input type="checkbox" checked={c.isForSale} onChange={() => toggleSale(c.id)} />
                                                </td>
                                                <td className="p-3 sticky left-12 bg-neutral-900 z-10 font-bold">{c.name}</td>
                                                <td className="p-3">{c.stage}</td>
                                                <td className="p-3 text-xs">{c.exchangeHistory.map(h => h.size).join(' → ')}</td>
                                                <td className="p-3"><button onClick={(e) => { e.stopPropagation(); deleteCreature(c.id); }} className="text-red-400">削除</button></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        ) : activeTab === 'pedigree' ? (
                            <div className="p-4 bg-neutral-900 rounded-lg">{creatures.map(c => <div key={c.id} className="border-l border-neutral-700 pl-4 py-2">{c.name} {c.parents && `(親: ${c.parents.male}, ${c.parents.female})`}</div>)}</div>
                        ) : (
                            <div className="p-4 bg-neutral-900 rounded-lg">シミュレーション機能（ここに計算ロジックが入ります）</div>
                        )}
                    </main>
                </div>
            );
        }

        function DetailView({ creature, onBack }) {
            return (
                <div className="p-6">
                    <button onClick={onBack} className="mb-4 text-emerald-400">← 戻る</button>
                    <h1 className="text-2xl font-bold">{creature.name} の詳細</h1>
                    <div className="mt-4 bg-neutral-900 p-6 rounded-lg space-y-2">
                        <p>ステージ: {creature.stage}</p>
                        <p>産地: {creature.origin}</p>
                        <p>サイズ履歴: {creature.exchangeHistory.map(h => h.size).join(', ')}</p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
