<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beetle Base - 統合管理 (Visual Pedigree)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .sticky-col-1 { position: sticky; left: 0; z-index: 20; background-color: #171717; }
        .sticky-col-2 { position: sticky; left: 60px; z-index: 20; background-color: #171717; }
        thead th.sticky-col-1, thead th.sticky-col-2 { background-color: #262626; z-index: 30; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #404040; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #525252; }
        
        /* 血統図用の補助線スタイル */
        .pedigree-line {
            position: absolute;
            left: -20px;
            top: -10px;
            bottom: 50%;
            width: 20px;
            border-left: 2px solid #404040;
            border-bottom: 2px solid #404040;
            border-bottom-left-radius: 8px;
        }
    </style>
</head>
<body class="bg-neutral-950 text-white font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        function App() {
            const [selectedCreature, setSelectedCreature] = useState(null);
            const [activeTab, setActiveTab] = useState('一覧');
            const [highlightId, setHighlightId] = useState(null);
            const [showAddModal, setShowAddModal] = useState(false);
            const [newCreatureData, setNewCreatureData] = useState({ name: '新規個体', alias: '', origin: '', generation: '', hatchDate: '-', emergenceDate: '-', maleParent: '-', femaleParent: '-', stage: '幼虫', saleStatus: '非売', sex: 'オス' });
            
            const [maleSelection, setMaleSelection] = useState('');
            const [femaleSelection, setFemaleSelection] = useState('');
            
            const [creatures, setCreatures] = useState(() => {
                const saved = localStorage.getItem('beetle_data');
                if (saved) return JSON.parse(saved);
                
                const sampleStages = ['孵化', '1令', '2令', '3令', '蛹', '成虫'];
                return Array.from({ length: 10 }, (_, i) => {
                    const historyLength = 2 + Math.floor(Math.random() * 4);
                    const history = Array.from({ length: historyLength }, (_, j) => ({
                        item: sampleStages[j] || '経過',
                        date: `2026-04-${10 + j}`,
                        size: `${1 + j * 5}g`,
                        temp: `${22 + (i % 5)}℃`
                    }));
                    return {
                        id: (i + 1).toString(), 
                        name: `個体 ${i + 1}号`, 
                        alias: i < 5 ? 'Aライン' : 'Bライン', 
                        origin: '福岡県久留米市', 
                        generation: `F${(i % 5) + 1}`, 
                        maleParent: 'M-1', 
                        femaleParent: 'F-1', 
                        stage: history[history.length - 1].item, 
                        saleStatus: '非売', 
                        hatchDate: '2026-04-01', 
                        emergenceDate: '-', 
                        history: history,
                        sex: i % 2 === 0 ? 'オス' : 'メス'
                    };
                });
            });
            const [sort, setSort] = useState({ key: 'id', direction: 'asc' });

            useEffect(() => { localStorage.setItem('beetle_data', JSON.stringify(creatures)); }, [creatures]);

            const toggleSaleStatus = (id, e) => {
                e.stopPropagation();
                const statuses = ['非売', '予備', '販売'];
                setCreatures(creatures.map(c => c.id === id ? { ...c, saleStatus: statuses[(statuses.indexOf(c.saleStatus) + 1) % 3] } : c));
            };

            const confirmAdd = () => {
                const newCreature = { ...newCreatureData, id: Date.now().toString(), history: [] };
                setCreatures([newCreature, ...creatures]);
                setShowAddModal(false);
                setNewCreatureData({ name: '新規個体', alias: '', origin: '', generation: '', hatchDate: '-', emergenceDate: '-', maleParent: '-', femaleParent: '-', stage: '幼虫', saleStatus: '非売', sex: 'オス' });
            };

            const updateCreature = (updated) => {
                setCreatures(creatures.map(c => c.id === updated.id ? updated : c));
                setSelectedCreature(updated);
            };

            const processedCreatures = [...creatures].sort((a, b) => (a[sort.key] < b[sort.key] ? -1 : 1) * (sort.direction === 'asc' ? 1 : -1));

            const getSimData = (m, f) => {
                const isSame = m.alias === f.alias;
                return [
                    { label: "近親交配係数", val: isSame ? "25.0%" : "6.25%", desc: isSame ? "純血統を維持していますが、累代が進むと障害リスクが高まります。" : "異系統交配のため、遺伝的健康度が高い状態です。" },
                    { label: "成長ポテンシャル", val: isSame ? "92点" : "98点", desc: isSame ? "特定の良質な形質が継承されやすく安定しています。" : "強勢効果により、次世代での大型化が強く期待されます。" },
                    { label: "累代障害発生率", val: isSame ? "4.5%" : "1.2%", desc: isSame ? "近親係数の蓄積によりリスクが上昇します。" : "系統交差により、障害リスクが最小限に抑制されています。" },
                    { label: "顎形状遺伝率", val: isSame ? "85%" : "40%", desc: isSame ? "親の顎形状が極めて強く発現しやすく、特徴が安定します。" : "多様な変異が現れやすく、新しい形質の獲得が期待できます。" },
                    { label: "色素遺伝率", val: isSame ? "92%" : "55%", desc: isSame ? "体色の質感が固定化されており、親の見た目を継承します。" : "親の色素形質が混ざり合い、新たな色調が生まれる可能性があります。" }
                ];
            };

            const sim = useMemo(() => {
                const m = creatures.find(c => c.id === maleSelection);
                const f = creatures.find(c => c.id === femaleSelection);
                if (!m || !f) return null;
                return getSimData(m, f);
            }, [maleSelection, femaleSelection, creatures]);

            if (selectedCreature) return <DetailView creature={selectedCreature} onBack={() => setSelectedCreature(null)} onUpdate={updateCreature} onGoToTree={(id) => { setHighlightId(id); setActiveTab('血統図'); setSelectedCreature(null); }} getSimData={getSimData} />;

            const tableHeaders = [
                {k:'saleStatus',l:'販売'}, {k:'name',l:'個体名'}, {k:'sex',l:'性別'}, {k:'alias',l:'名称'}, {k:'origin',l:'産地'}, 
                {k:'generation',l:'累代'}, {k:'size',l:'サイズ'}, {k:'hatchDate',l:'孵化日'}, {k:'stage',l:'ステージ'}, 
                {k:'temp',l:'温度'}, {k:'emergenceDate',l:'羽化日'}, {k:'maleParent',l:'オス親'}, {k:'femaleParent',l:'メス親'}
            ];

            const formFields = [
                {key:'name', label:'個体名'}, {key:'sex', label:'性別'}, {key:'alias', label:'名称'}, {key:'origin', label:'産地'}, 
                {key:'generation', label:'累代'}, {key:'hatchDate', label:'孵化日'}, {key:'emergenceDate', label:'羽化日'}, 
                {key:'maleParent', label:'オス親'}, {key:'femaleParent', label:'メス親'}, {key:'stage', label:'ステージ'}
            ];

            return (
                <div className="min-h-screen p-4">
                    <nav className="mb-4 flex justify-between items-center font-bold text-emerald-400">
                        <div className="flex flex-col"><span>Beetle Base - 統合管理</span><span className="text-[10px] text-neutral-500">made by ＭＨ</span></div>
                        {activeTab === '一覧' && <button onClick={() => setShowAddModal(true)} className="bg-emerald-600 px-3 py-1 rounded text-sm text-white font-bold">追加</button>}
                    </nav>

                    <div className="flex border-b border-neutral-800 mb-4">
                        {['一覧', '血統図', '交配'].map(tab => (
                            <button key={tab} onClick={() => { setActiveTab(tab); setHighlightId(null); }} className={`px-4 py-2 text-sm font-bold ${activeTab === tab ? 'text-emerald-400 border-b-2 border-emerald-400' : 'text-neutral-500'}`}>{tab}</button>
                        ))}
                    </div>

                    {activeTab === '一覧' ? (
                        <>
                            {showAddModal && (
                                <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                                    <div className="bg-neutral-900 p-6 rounded-xl w-full max-w-sm border border-neutral-700 space-y-4">
                                        <h3 className="font-bold text-white">新規個体追加</h3>
                                        {formFields.map(f => (
                                            <div key={f.key}><p className="text-[10px] text-neutral-400">{f.label}</p><input className="w-full bg-neutral-800 p-2 rounded text-white text-sm" value={newCreatureData[f.key]} onChange={e => setNewCreatureData({...newCreatureData, [f.key]: e.target.value})} /></div>
                                        ))}
                                        <div className="flex gap-2"><button onClick={() => setShowAddModal(false)} className="w-full bg-neutral-700 py-2 rounded font-bold text-white">キャンセル</button><button onClick={confirmAdd} className="w-full bg-emerald-600 py-2 rounded font-bold text-white">保存</button></div>
                                    </div>
                                </div>
                            )}

                            <div className="overflow-x-auto bg-neutral-900 rounded-lg shadow-xl">
                                <table className="w-full text-sm border-collapse whitespace-nowrap">
                                    <thead className="bg-neutral-800">
                                        <tr>
                                            {tableHeaders.map((h, i) => (<th key={h.k} className={`p-3 cursor-pointer hover:bg-neutral-700 ${i < 2 ? `sticky-col-${i+1}` : ''}`} onClick={() => setSort({key:h.k, direction: sort.key===h.k && sort.direction==='asc'?'desc':'asc'})}>{h.l}</th>))}
                                            <th className="p-3">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {processedCreatures.map(c => (
                                            <tr key={c.id} className="border-t border-neutral-800 hover:bg-neutral-800 cursor-pointer" onClick={() => setSelectedCreature(c)}>
                                                <td className="p-3 sticky-col-1"><button onClick={(e) => toggleSaleStatus(c.id, e)} className={`px-2 py-1 rounded text-[10px] font-bold ${c.saleStatus === '販売' ? 'bg-emerald-600' : 'bg-neutral-600'}`}>{c.saleStatus}</button></td>
                                                <td className="p-3 sticky-col-2 font-bold">{c.name}</td>
                                                <td className="p-3">{c.sex}</td>
                                                <td className="p-3">{c.alias}</td>
                                                <td className="p-3">{c.origin}</td>
                                                <td className="p-3">{c.generation}</td>
                                                <td className="p-3">{c.history.length > 0 ? c.history[c.history.length - 1].size : '-'}</td>
                                                <td className="p-3">{c.hatchDate}</td>
                                                <td className="p-3">{c.stage}</td>
                                                <td className="p-3">{c.history.length > 0 ? c.history[c.history.length - 1].temp : '-'}</td>
                                                <td className="p-3">{c.emergenceDate}</td>
                                                <td className="p-3">{c.maleParent}</td>
                                                <td className="p-3">{c.femaleParent}</td>
                                                <td className="p-3"><button onClick={(e) => { e.stopPropagation(); if(confirm('削除?')) setCreatures(creatures.filter(x=>x.id!==c.id)) }} className="bg-emerald-600 px-2 py-1 rounded text-xs text-white">削除</button></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </>
                    ) : activeTab === '血統図' ? (
                        <div className="bg-neutral-900 p-6 rounded-lg space-y-12">
                            {/* ライン(Alias)ごとにグループ化 */}
                            {Array.from(new Set(creatures.map(c => c.alias))).map(line => (
                                <div key={line} className="space-y-4">
                                    <div className="flex items-center gap-2">
                                        <h3 className="font-bold text-emerald-400 border-l-4 border-emerald-400 pl-2">{line || "未設定ライン"}</h3>
                                        <div className="h-[1px] bg-neutral-800 flex-1"></div>
                                    </div>
                                    <div className="grid gap-y-4">
                                        {creatures.filter(c => c.alias === line).map((c, idx) => (
                                            <div key={c.id} 
                                                 style={{marginLeft: `${idx * 24}px`}} 
                                                 className="relative group"
                                                 onClick={() => setSelectedCreature(c)}>
                                                
                                                {/* 補助線 (最初の要素以外) */}
                                                {idx > 0 && <div className="pedigree-line"></div>}
                                                
                                                {/* 個体カード */}
                                                <div className={`flex items-center gap-4 p-3 rounded-lg border cursor-pointer transition-all hover:scale-[1.01] 
                                                    ${highlightId === c.id ? 'bg-emerald-900 border-emerald-400' : 'bg-neutral-800 border-neutral-700 hover:border-neutral-500'}
                                                    ${c.sex === 'オス' ? 'border-l-4 border-l-emerald-500' : 'border-l-4 border-l-rose-500'}`}>
                                                    
                                                    {/* 性別アイコン */}
                                                    <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs shadow-inner
                                                        ${c.sex === 'オス' ? 'bg-emerald-900 text-emerald-400' : 'bg-rose-900 text-rose-400'}`}>
                                                        <i className={`fa-solid ${c.sex === 'オス' ? 'fa-mars' : 'fa-venus'}`}></i>
                                                    </div>

                                                    <div className="flex-1 min-w-0">
                                                        <div className="flex items-center gap-2">
                                                            <span className="font-bold text-sm truncate">{c.name}</span>
                                                            <span className="bg-neutral-700 text-[10px] px-1.5 py-0.5 rounded text-neutral-300 font-mono">{c.generation}</span>
                                                        </div>
                                                        <div className="flex gap-4 mt-1">
                                                            <div className="text-[10px] text-neutral-500 flex items-center gap-1">
                                                                <span className="text-emerald-600">♂</span> {c.maleParent}
                                                            </div>
                                                            <div className="text-[10px] text-neutral-500 flex items-center gap-1">
                                                                <span className="text-rose-600">♀</span> {c.femaleParent}
                                                            </div>
                                                        </div>
                                                    </div>

                                                    <div className="text-right">
                                                        <p className="text-[10px] text-neutral-500 uppercase tracking-tighter">Current Stage</p>
                                                        <p className="text-xs font-bold text-emerald-400">{c.stage}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    ) : (
                        <div className="bg-neutral-900 p-6 rounded-lg space-y-6 text-white text-sm">
                            <h3 className="font-bold text-emerald-400 text-lg border-b border-neutral-700 pb-2">交配シミュレーション</h3>
                            <div className="flex gap-4">
                                <select className="bg-neutral-800 p-2 rounded flex-1" onChange={e => setMaleSelection(e.target.value)}><option value="">オス親を選択</option>{creatures.filter(c => c.sex === 'オス').map(c => <option key={c.id} value={c.id}>{c.name}</option>)}</select>
                                <select className="bg-neutral-800 p-2 rounded flex-1" onChange={e => setFemaleSelection(e.target.value)}><option value="">メス親を選択</option>{creatures.filter(c => c.sex === 'メス').map(c => <option key={c.id} value={c.id}>{c.name}</option>)}</select>
                            </div>
                            {sim && (
                                <div className="space-y-4 pt-4">
                                    {sim.map((m, i) => (
                                        <div key={i} className="p-4 border border-neutral-700 rounded bg-neutral-800">
                                            <p className="font-bold text-emerald-400">{m.label}: <span className="text-white">{m.val}</span></p>
                                            <p className="text-xs text-neutral-400 mt-1">{m.desc}</p>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        function DetailView({ creature, onBack, onUpdate, onGoToTree, getSimData }) {
            const [form, setForm] = useState(creature);
            const [showEditModal, setShowEditModal] = useState(false);
            const [editForm, setEditForm] = useState(creature);
            const [showRecordModal, setShowRecordModal] = useState(null);
            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            
            const fields = [{key:'name', label:'個体名'}, {key:'sex', label:'性別'}, {key:'alias', label:'名称'}, {key:'origin', label:'産地'}, {key:'generation', label:'累代'}, {key:'hatchDate', label:'孵化日'}, {key:'emergenceDate', label:'羽化日'}, {key:'maleParent', label:'オス親'}, {key:'femaleParent', label:'メス親'}, {key:'stage', label:'ステージ'}];
            
            const saveEdit = () => { setForm(editForm); onUpdate(editForm); setShowEditModal(false); };
            const saveRecord = (record) => {
                let h = [...form.history];
                if (record.index !== null) h[record.index] = {item:record.item, size:record.size, temp:record.temp, date:record.date};
                else h.push({item:record.item, size:record.size, temp:record.temp, date:record.date || new Date().toISOString().split('T')[0]});
                const updated = {...form, history: h, stage: record.item};
                setForm(updated);
                onUpdate(updated);
                setShowRecordModal(null);
            };

            useEffect(() => {
                if (chartRef.current) {
                    if (chartInstance.current) chartInstance.current.destroy();
                    const labels = form.history.map(h => h.date);
                    const data = form.history.map(h => {
                        const val = parseFloat(h.size.replace(/[^0-9.]/g, ''));
                        return isNaN(val) ? null : val;
                    });
                    chartInstance.current = new Chart(chartRef.current, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'サイズ推移',
                                data: data,
                                borderColor: '#10b981',
                                backgroundColor: 'rgba(16, 185, 129, 0.2)',
                                tension: 0.3,
                                fill: true,
                                pointBackgroundColor: '#fff',
                                pointRadius: 4
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: {
                                y: { beginAtZero: true, grid: { color: '#333' }, ticks: { color: '#999' } },
                                x: { grid: { color: '#333' }, ticks: { color: '#999' } }
                            }
                        }
                    });
                }
            }, [form.history]);

            return (
                <div className="p-6 max-w-lg mx-auto">
                    <div className="flex justify-between items-center mb-4"><button onClick={onBack} className="text-emerald-400 font-bold">← 一覧に戻る</button><div className="flex gap-2"><button onClick={() => onGoToTree(creature.id)} className="bg-neutral-700 px-4 py-1 rounded text-sm font-bold">血統図へ</button><button onClick={() => { setEditForm(form); setShowEditModal(true); }} className="bg-emerald-600 px-4 py-1 rounded text-sm font-bold">編集</button></div></div>
                    
                    {showEditModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50"><div className="bg-neutral-900 p-6 rounded-xl w-full max-w-sm border border-neutral-700 space-y-4"><h3 className="font-bold text-white">詳細情報の編集</h3>{fields.map(f => (<div key={f.key}><p className="text-[10px] text-neutral-400">{f.label}</p><input className="w-full bg-neutral-800 p-2 rounded text-white text-sm" value={editForm[f.key] || ''} onChange={e => setEditForm({...editForm, [f.key]: e.target.value})} /></div>))}<div className="flex gap-2"><button onClick={() => setShowEditModal(false)} className="w-full bg-neutral-700 py-2 rounded font-bold text-white">キャンセル</button><button onClick={saveEdit} className="w-full bg-emerald-600 py-2 rounded font-bold text-white">保存</button></div></div></div>
                    )}

                    <div className="bg-neutral-900 p-6 rounded-xl border border-neutral-700 space-y-4 text-white shadow-2xl">
                        <h2 className="text-xl font-bold border-b border-neutral-700 pb-2 flex items-center gap-3">
                            <span className={form.sex === 'オス' ? 'text-emerald-400' : 'text-rose-400'}>
                                <i className={`fa-solid ${form.sex === 'オス' ? 'fa-mars' : 'fa-venus'}`}></i>
                            </span>
                            詳細情報
                        </h2>
                        <div className="grid grid-cols-[100px,1fr] gap-x-2 gap-y-2 text-sm items-center">
                            {fields.map(f => (
                                <React.Fragment key={f.key}>
                                    <p className="text-neutral-500 text-left text-[11px] uppercase">{f.label}</p>
                                    <p className="p-2 bg-neutral-800 rounded text-white w-full border border-neutral-700/50">{form[f.key] || '-'}</p>
                                </React.Fragment>
                            ))}
                        </div>
                        
                        <div className="border-t border-neutral-700 pt-4">
                            <div className="flex justify-between items-center mb-3">
                                <h3 className="font-bold text-sm">飼育記録</h3>
                                <button onClick={() => setShowRecordModal({item: form.stage, size:'', temp:'', date:new Date().toISOString().split('T')[0], index:null})} className="bg-emerald-600 px-2 py-1 rounded text-[10px] text-white">追加</button>
                            </div>
                            <div className="overflow-hidden rounded border border-neutral-800">
                                <table className="w-full text-[10px]">
                                    <thead className="bg-neutral-800">
                                        <tr className="text-neutral-400 text-left">
                                            <th className="p-2">日付</th><th className="p-2">ステージ</th><th className="p-2">サイズ</th><th className="p-2">温度</th><th className="p-2">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {form.history.map((h,i) => (
                                            <tr key={i} className="border-b border-neutral-800 hover:bg-neutral-800/50 transition-colors">
                                                <td className="p-2">{h.date}</td><td className="p-2">{h.item}</td><td className="p-2">{h.size}</td><td className="p-2">{h.temp}</td>
                                                <td className="p-2"><button onClick={() => setShowRecordModal({item:h.item, size:h.size, temp:h.temp, date:h.date, index:i})} className="text-emerald-500 hover:underline">訂正</button></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <div className="bg-neutral-900 p-6 rounded-xl border border-neutral-700 mt-4 text-white shadow-2xl">
                        <h3 className="font-bold border-b border-neutral-700 pb-2 mb-3 text-sm">成長グラフ</h3>
                        <div className="h-40 w-full">
                            <canvas ref={chartRef}></canvas>
                        </div>
                    </div>

                    <div className="bg-neutral-900 p-6 rounded-xl border border-neutral-700 mt-4 space-y-4 text-white shadow-2xl">
                        <h3 className="font-bold border-b border-neutral-700 pb-2 text-sm">遺伝ポテンシャル</h3>
                        <div className="grid gap-2">
                            {getSimData(creature, creature).map((m,i)=>(
                                <div key={i} className="text-[10px] p-2 bg-neutral-800 rounded border-l-2 border-emerald-500">
                                    <p className="text-emerald-400 font-bold">{m.label}: <span className="text-white text-xs">{m.val}</span></p>
                                    <p className="text-neutral-400 mt-0.5 leading-tight">{m.desc}</p>
                                </div>
                            ))}
                        </div>
                    </div>

                    {showRecordModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-neutral-900 p-6 rounded-xl w-full max-w-sm border border-neutral-700 space-y-4 shadow-2xl">
                                <h3 className="font-bold text-white">飼育記録の編集</h3>
                                <div className="space-y-3">
                                    <input className="w-full bg-neutral-800 p-2 rounded text-white text-sm border border-neutral-700" placeholder="日付" value={showRecordModal.date} onChange={e=>setShowRecordModal({...showRecordModal, date:e.target.value})} />
                                    <input className="w-full bg-neutral-800 p-2 rounded text-white text-sm border border-neutral-700" placeholder="ステージ" value={showRecordModal.item} onChange={e=>setShowRecordModal({...showRecordModal, item:e.target.value})} />
                                    <input className="w-full bg-neutral-800 p-2 rounded text-white text-sm border border-neutral-700" placeholder="サイズ" value={showRecordModal.size} onChange={e=>setShowRecordModal({...showRecordModal, size:e.target.value})} />
                                    <input className="w-full bg-neutral-800 p-2 rounded text-white text-sm border border-neutral-700" placeholder="温度" value={showRecordModal.temp} onChange={e=>setShowRecordModal({...showRecordModal, temp:e.target.value})} />
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => setShowRecordModal(null)} className="w-full bg-neutral-700 py-2 rounded font-bold text-white text-sm">キャンセル</button>
                                    <button onClick={() => saveRecord(showRecordModal)} className="w-full bg-emerald-600 py-2 rounded font-bold text-white text-sm">保存</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
