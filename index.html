<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beetle Base - 統合管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .sticky-col-1 { position: sticky; left: 0; z-index: 20; background-color: #171717; }
        .sticky-col-2 { position: sticky; left: 60px; z-index: 20; background-color: #171717; }
        thead th.sticky-col-1, thead th.sticky-col-2 { background-color: #262626; z-index: 30; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #404040; border-radius: 4px; }
    </style>
</head>
<body class="bg-neutral-950 text-white font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('一覧');
            const [creatures, setCreatures] = useState(() => {
                const saved = localStorage.getItem('beetle_data');
                if (saved) return JSON.parse(saved);
                const sampleStages = ['孵化', '1令', '2令', '3令', '蛹', '成虫'];
                return Array.from({ length: 10 }, (_, i) => ({
                    id: (i + 1).toString(), 
                    name: `個体 ${i + 1}号`, alias: i < 5 ? 'Aライン' : 'Bライン', 
                    origin: '福岡県久留米市', generation: `F${(i % 5) + 1}`, 
                    sex: i % 2 === 0 ? 'オス' : 'メス',
                    stage: '成虫', saleStatus: '非売',
                    history: [{item: '成虫', date: '2026-05-01', size: `${70 + i}mm`, temp: '25℃'}]
                }));
            });

            const [male, setMale] = useState('');
            const [female, setFemale] = useState('');

            const sim = useMemo(() => {
                const m = creatures.find(c => c.id === male);
                const f = creatures.find(c => c.id === female);
                if (!m || !f) return null;
                return {
                    gen: `F${Math.max(parseInt(m.generation.substring(1)), parseInt(f.generation.substring(1))) + 1}`,
                    risk: m.alias === f.alias ? '高' : '低',
                    size: '80mm+',
                    prob: m.alias === f.alias ? '75%' : '25%'
                };
            }, [male, female, creatures]);

            return (
                <div className="p-6">
                    <div className="flex gap-4 border-b border-neutral-800 mb-6">
                        {['一覧', '交配'].map(tab => (
                            <button key={tab} onClick={() => setActiveTab(tab)} className={`py-2 font-bold ${activeTab === tab ? 'text-emerald-400 border-b-2 border-emerald-400' : 'text-neutral-500'}`}>{tab}</button>
                        ))}
                    </div>

                    {activeTab === '一覧' ? (
                        <div className="overflow-x-auto bg-neutral-900 p-4 rounded-xl">
                            <table className="w-full text-sm">
                                <thead><tr className="text-neutral-400 border-b border-neutral-700">
                                    <th className="p-2">個体名</th><th className="p-2">性別</th><th className="p-2">ライン</th><th className="p-2">累代</th>
                                </tr></thead>
                                <tbody>
                                    {creatures.map(c => (
                                        <tr key={c.id} className="border-b border-neutral-800 hover:bg-neutral-800">
                                            <td className="p-2">{c.name}</td><td className="p-2">{c.sex}</td><td className="p-2">{c.alias}</td><td className="p-2">{c.generation}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    ) : (
                        <div className="max-w-2xl mx-auto space-y-6">
                            <div className="grid grid-cols-2 gap-4">
                                <select className="bg-neutral-800 p-3 rounded" onChange={e => setMale(e.target.value)}>
                                    <option value="">オス親選択</option>
                                    {creatures.filter(c => c.sex === 'オス').map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                </select>
                                <select className="bg-neutral-800 p-3 rounded" onChange={e => setFemale(e.target.value)}>
                                    <option value="">メス親選択</option>
                                    {creatures.filter(c => c.sex === 'メス').map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                </select>
                            </div>
                            
                            {sim && (
                                <div className="grid grid-cols-2 gap-4 animate-in fade-in duration-700">
                                    <div className="bg-emerald-900/20 p-5 rounded-xl border border-emerald-500/30">
                                        <p className="text-emerald-400 font-bold mb-2 uppercase text-xs tracking-widest">次世代予測</p>
                                        <div className="text-3xl font-black">{sim.gen}</div>
                                    </div>
                                    <div className="bg-neutral-800 p-5 rounded-xl border border-neutral-700">
                                        <p className="text-neutral-400 font-bold mb-2 uppercase text-xs tracking-widest">インブリードリスク</p>
                                        <div className="text-2xl font-bold">{sim.risk}</div>
                                    </div>
                                    <div className="col-span-2 bg-neutral-900 p-5 rounded-xl border border-neutral-700">
                                        <p className="text-neutral-400 font-bold mb-2 uppercase text-xs tracking-widest">遺伝形質発現確率</p>
                                        <div className="w-full bg-neutral-700 h-2 rounded-full overflow-hidden">
                                            <div className="bg-emerald-500 h-full" style={{width: sim.prob}}></div>
                                        </div>
                                        <p className="text-sm mt-2">優性形質発現: <span className="font-bold text-emerald-400">{sim.prob}</span></p>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
