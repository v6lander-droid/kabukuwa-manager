<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beetle Base - 統合管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>table { writing-mode: horizontal-tb !important; }</style>
</head>
<body class="bg-neutral-950 text-white font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [selectedCreature, setSelectedCreature] = useState(null);
            const [creatures, setCreatures] = useState(() => {
                const saved = localStorage.getItem('beetle_data');
                return saved ? JSON.parse(saved) : Array.from({ length: 50 }, (_, i) => ({
                    id: (i + 1).toString(), name: `個体 ${i + 1}号`, hatchDate: '2026-05-01',
                    history: [{date: '2026-05-01', item: '孵化', size: '10'}]
                }));
            });

            useEffect(() => { localStorage.setItem('beetle_data', JSON.stringify(creatures)); }, [creatures]);

            const updateCreature = (updated) => {
                setCreatures(creatures.map(c => c.id === updated.id ? updated : c));
                setSelectedCreature(updated);
            };

            if (selectedCreature) return <DetailView creature={selectedCreature} creatures={creatures} onBack={() => setSelectedCreature(null)} onUpdate={updateCreature} />;

            return (
                <div className="p-4">
                    <nav className="mb-4 flex justify-between items-center font-bold text-emerald-400">
                        <span>Beetle Base - 全個体一覧</span>
                        <button onClick={() => { const n = {id:Date.now().toString(), name:'新規', hatchDate:'2026-05-01', history:[]}; setCreatures([n,...creatures]); setSelectedCreature(n); }} className="bg-emerald-600 px-3 py-1 rounded text-white">➕ 追加</button>
                    </nav>
                    <div className="overflow-x-auto bg-neutral-900 rounded-lg">
                        <table className="w-full text-sm text-white">
                            <thead><tr className="bg-neutral-800 border-b border-neutral-700 text-left">
                                <th className="p-3">個体名</th><th className="p-3">孵化日</th>
                            </tr></thead>
                            <tbody>{creatures.map(c => <tr key={c.id} className="border-b border-neutral-800 cursor-pointer hover:bg-neutral-800" onClick={() => setSelectedCreature(c)}>
                                <td className="p-3 font-bold">{c.name}</td><td className="p-3">{c.hatchDate}</td>
                            </tr>)}</tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function DetailView({ creature, onBack, onUpdate }) {
            const [form, setForm] = useState(creature);
            const [showModal, setShowModal] = useState(false);
            const canvasRef = useRef(null);

            return (
                <div className="p-6 max-w-lg mx-auto text-white">
                    <button onClick={onBack} className="text-emerald-400 font-bold mb-4">← 一覧へ</button>
                    <div className="bg-neutral-900 p-6 rounded-xl space-y-4">
                        <div className="flex justify-between items-center">
                            <h2 className="text-xl font-bold">{form.name}</h2>
                            <button onClick={() => setShowModal(true)} className="bg-neutral-700 px-3 py-1 rounded text-sm">編集</button>
                        </div>
                        <p className="text-sm">孵化日: {form.hatchDate}</p>
                        <canvas ref={canvasRef} width="400" height="200" className="w-full bg-black rounded" />
                        <table className="w-full text-xs">
                            {form.history.sort((a,b)=>new Date(a.date)-new Date(b.date)).map((h,i) => (
                                <tr key={i} className="border-b border-neutral-800">
                                    <td className="py-2">{h.item}</td><td className="py-2">{h.size}g</td><td className="py-2 text-right">{h.date}</td>
                                </tr>
                            ))}
                        </table>
                    </div>

                    {showModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-neutral-900 p-6 rounded-xl w-full max-w-sm border border-neutral-700 space-y-4">
                                <h3 className="font-bold text-lg">詳細編集</h3>
                                <input className="w-full bg-neutral-800 p-3 rounded text-white" placeholder="個体名" value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
                                <input type="date" className="w-full bg-neutral-800 p-3 rounded text-white" value={form.hatchDate} onChange={e => setForm({...form, hatchDate: e.target.value})} />
                                <div className="flex gap-2 pt-2">
                                    <button onClick={() => setShowModal(false)} className="w-full bg-neutral-700 p-2 rounded">キャンセル</button>
                                    <button onClick={() => { onUpdate(form); setShowModal(false); }} className="w-full bg-emerald-600 p-2 rounded">保存</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
