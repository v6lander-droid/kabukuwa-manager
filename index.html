<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beetle Base - 統合管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-neutral-950 text-white font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const generateDemoData = () => Array.from({ length: 50 }, (_, i) => ({
            id: (i + 1).toString(), name: `個体 ${i + 1}号`, alias: '極太血統',
            origin: '福岡県久留米市', generation: 'F5', maleParent: 'M-1', femaleParent: 'F-1',
            stage: '幼虫', saleStatus: '非売', size: '80.0mm', hatchDate: '2026-05-01', history: []
        }));

        function App() {
            const [selectedCreature, setSelectedCreature] = useState(null);
            const [creatures, setCreatures] = useState(generateDemoData());
            const [filter, setFilter] = useState({ stage: '', alias: '' });
            const [sort, setSort] = useState({ key: 'id', direction: 'asc' });
            const [showFilter, setShowFilter] = useState(false);

            const addNew = () => {
                const newCreature = {
                    id: Date.now().toString(), name: '新規個体', alias: '', origin: '', generation: '',
                    maleParent: '', femaleParent: '', stage: '幼虫', saleStatus: '非売', size: '0mm', hatchDate: '-', history: []
                };
                setSelectedCreature({ data: newCreature, isNew: true });
            };

            const saveCreature = (creature, isNew) => {
                if (isNew) setCreatures([creature, ...creatures]);
                else setCreatures(creatures.map(c => c.id === creature.id ? creature : c));
                setSelectedCreature(null);
            };

            const processedCreatures = useMemo(() => {
                return creatures.filter(c => (filter.stage === '' || c.stage === filter.stage) && (filter.alias === '' || c.alias.includes(filter.alias)))
                    .sort((a, b) => (a[sort.key] < b[sort.key] ? -1 : 1) * (sort.direction === 'asc' ? 1 : -1));
            }, [creatures, filter, sort]);

            if (selectedCreature) return <DetailView creature={selectedCreature.data} isNew={selectedCreature.isNew} onBack={() => setSelectedCreature(null)} onSave={saveCreature} />;

            return (
                <div className="min-h-screen p-4">
                    <nav className="mb-4 flex justify-between items-center font-bold text-emerald-400">
                        <span>Beetle Base (全{creatures.length}匹)</span>
                        <div className="flex gap-2">
                            <button onClick={addNew} className="bg-emerald-600 px-3 py-1 rounded text-sm">➕ 追加</button>
                            <button onClick={() => setShowFilter(!showFilter)} className="bg-neutral-800 px-3 py-1 rounded text-sm">⚙️ フィルター</button>
                        </div>
                    </nav>
                    
                    <div className="overflow-x-auto bg-neutral-900 rounded-lg shadow-xl">
                        <table className="w-full text-sm border-collapse whitespace-nowrap">
                            <thead className="bg-neutral-800">
                                <tr>
                                    {[{k:'saleStatus',l:'販売'}, {k:'name',l:'個体名'}, {k:'alias',l:'名称'}, {k:'stage',l:'ステージ'}, {k:'hatchDate',l:'羽化日'}].map(h => (
                                        <th key={h.k} className="p-3 cursor-pointer" onClick={() => setSort({key:h.k, direction: sort.key===h.k && sort.direction==='asc'?'desc':'asc'})}>{h.l}</th>
                                    ))}
                                    <th className="p-3">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                {processedCreatures.map(c => (
                                    <tr key={c.id} className="border-t border-neutral-800 hover:bg-neutral-800 cursor-pointer" onClick={() => setSelectedCreature({data:c, isNew:false})}>
                                        <td className="p-3"><button className={`px-2 py-1 rounded text-[10px] ${c.saleStatus === '販売' ? 'bg-emerald-600' : 'bg-neutral-600'}`}>{c.saleStatus}</button></td>
                                        <td className="p-3 font-bold">{c.name}</td><td className="p-3">{c.alias}</td><td className="p-3">{c.stage}</td><td className="p-3">{c.hatchDate}</td>
                                        <td className="p-3"><button onClick={(e) => { e.stopPropagation(); if(confirm('削除?')) setCreatures(creatures.filter(x=>x.id!==c.id)) }} className="bg-emerald-600 px-2 py-1 rounded text-xs">削除</button></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function DetailView({ creature, isNew, onBack, onSave }) {
            const [form, setForm] = useState(creature);
            const fields = [{key:'name', label:'個体名'}, {key:'alias', label:'名称'}, {key:'origin', label:'産地'}, {key:'generation', label:'累代'}, {key:'size', label:'サイズ'}, {key:'hatchDate', label:'羽化日'}, {key:'maleParent', label:'オス親'}, {key:'femaleParent', label:'メス親'}, {key:'stage', label:'ステージ'}];
            
            return (
                <div className="p-6 max-w-lg mx-auto">
                    <button onClick={onBack} className="mb-4 text-emerald-400">← 一覧に戻る</button>
                    <div className="bg-neutral-900 p-6 rounded-xl border border-neutral-700 space-y-4">
                        <h2 className="text-xl font-bold border-b pb-2">{isNew ? '新規個体登録' : '詳細編集'}</h2>
                        <div className="grid grid-cols-2 gap-2 text-sm">{fields.map(f => <React.Fragment key={f.key}><p className="text-neutral-400">{f.label}:</p><input className="bg-neutral-800 p-1 w-full" value={form[f.key]} onChange={e=>setForm({...form, [f.key]:e.target.value})} /></React.Fragment>)}</div>
                        <button onClick={() => onSave(form, isNew)} className="w-full bg-emerald-600 py-2 rounded font-bold">保存して一覧へ</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
