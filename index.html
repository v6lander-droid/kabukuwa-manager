<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beetle Base</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-neutral-950 text-white font-sans">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const FIELDS = ['name', 'sex', 'alias', 'origin', 'generation', 'hatchDate', 'emergenceDate', 'maleParent', 'femaleParent', 'stage'];

        function App() {
            const [creatures, setCreatures] = useState(() => JSON.parse(localStorage.getItem('beetle_data')) || []);
            const [view, setView] = useState('一覧');
            const [selected, setSelected] = useState(null);

            useEffect(() => localStorage.setItem('beetle_data', JSON.stringify(creatures)), [creatures]);

            const update = (id, data) => setCreatures(creatures.map(c => c.id === id ? { ...c, ...data } : c));
            
            if (selected) return <DetailView creature={selected} onBack={() => setSelected(null)} onUpdate={(c) => { update(c.id, c); setSelected(c); }} />;

            return (
                <div className="p-4">
                    <nav className="flex justify-between mb-4 text-emerald-400 font-bold">
                        <div>Beetle Base</div>
                        <div className="flex gap-4">
                            {['一覧', '血統図'].map(t => <button key={t} onClick={() => setView(t)}>{t}</button>)}
                        </div>
                    </nav>
                    {view === '一覧' ? (
                        <div className="overflow-x-auto bg-neutral-900 rounded-lg">
                            <table className="w-full text-sm">
                                <thead className="bg-neutral-800"><tr>{['販売', '個体名', '性別', 'ステージ', '操作'].map(h => <th key={h} className="p-3">{h}</th>)}</tr></thead>
                                <tbody>{creatures.map(c => (
                                    <tr key={c.id} className="border-t border-neutral-800 hover:bg-neutral-800 cursor-pointer" onClick={() => setSelected(c)}>
                                        <td className="p-3"><button className="bg-neutral-600 px-2 py-1 rounded text-[10px]">{c.saleStatus}</button></td>
                                        <td className="p-3">{c.name}</td>
                                        <td className="p-3">{c.sex}</td>
                                        <td className="p-3">{c.stage}</td>
                                        <td className="p-3"><button onClick={(e) => { e.stopPropagation(); setCreatures(creatures.filter(x => x.id !== c.id)) }} className="bg-red-600 px-2 py-1 rounded text-xs">削除</button></td>
                                    </tr>
                                ))}</tbody>
                            </table>
                        </div>
                    ) : (
                        <div className="space-y-4">{creatures.map(c => <div key={c.id} className="p-3 bg-neutral-800 rounded">{c.name} ({c.generation})</div>)}</div>
                    )}
                </div>
            );
        }

        function DetailView({ creature, onBack, onUpdate }) {
            const [edit, setEdit] = useState(creature);
            return (
                <div className="p-6 max-w-lg mx-auto">
                    <button onClick={onBack} className="text-emerald-400 mb-4">← 戻る</button>
                    <div className="bg-neutral-900 p-6 rounded-xl space-y-2">
                        {FIELDS.map(f => (
                            <div key={f} className="flex justify-between border-b border-neutral-800 py-2">
                                <span className="text-neutral-400 text-xs uppercase">{f}</span>
                                <input className="bg-transparent text-right outline-none" value={edit[f]} onChange={e => setEdit({...edit, [f]: e.target.value})} onBlur={() => onUpdate(edit)} />
                            </div>
                        ))}
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
