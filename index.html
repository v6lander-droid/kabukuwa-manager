<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beetle Base - 統合管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .sticky-col-1 { position: sticky; left: 0; z-index: 20; background-color: #171717; }
        .sticky-col-2 { position: sticky; left: 60px; z-index: 20; background-color: #171717; }
        thead th.sticky-col-1, thead th.sticky-col-2 { background-color: #262626; z-index: 30; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #404040; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #525252; }
    </style>
</head>
<body class="bg-neutral-950 text-white font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            const [selectedCreature, setSelectedCreature] = useState(null);
            const [activeTab, setActiveTab] = useState('一覧');
            const [highlightId, setHighlightId] = useState(null);
            const [showAddModal, setShowAddModal] = useState(false);
            const [newCreatureData, setNewCreatureData] = useState({ name: '新規個体', alias: '', origin: '', generation: '', hatchDate: '-', emergenceDate: '-', maleParent: '-', femaleParent: '-', stage: '幼虫', saleStatus: '非売', sex: 'オス' });
            
            const [maleSelection, setMaleSelection] = useState('');
            const [femaleSelection, setFemaleSelection] = useState('');
            
            const [creatures, setCreatures] = useState(() => {
                const saved = localStorage.getItem('beetle_data');
                if (saved) return JSON.parse(saved);
                
                const sampleStages = ['孵化', '1令', '2令', '3令', '蛹', '成虫'];
                return Array.from({ length: 10 }, (_, i) => {
                    const historyLength = 2 + Math.floor(Math.random() * 4);
                    const history = Array.from({ length: historyLength }, (_, j) => ({
                        item: sampleStages[j] || '経過',
                        date: `2026-04-${10 + j}`,
                        size: `${1 + j * 5}g`,
                        temp: `${22 + (i % 5)}℃`
                    }));
                    return {
                        id: (i + 1).toString(), 
                        name: `個体 ${i + 1}号`, 
                        alias: i < 5 ? 'Aライン' : 'Bライン', 
                        origin: '福岡県久留米市', 
                        generation: `F${(i % 5) + 1}`, 
                        maleParent: 'M-1', 
                        femaleParent: 'F-1', 
                        stage: history[history.length - 1].item, 
                        saleStatus: '非売', 
                        hatchDate: '2026-04-01', 
                        emergenceDate: '-', 
                        history: history,
                        sex: i % 2 === 0 ? 'オス' : 'メス'
                    };
                });
            });
            const [sort, setSort] = useState({ key: 'id', direction: 'asc' });

            useEffect(() => { localStorage.setItem('beetle_data', JSON.stringify(creatures)); }, [creatures]);

            const toggleSaleStatus = (id, e) => {
                e.stopPropagation();
                const statuses = ['非売', '予備', '販売'];
                setCreatures(creatures.map(c => c.id === id ? { ...c, saleStatus: statuses[(statuses.indexOf(c.saleStatus) + 1) % 3] } : c));
            };

            const confirmAdd = () => {
                const newCreature = { ...newCreatureData, id: Date.now().toString(), history: [] };
                setCreatures([newCreature, ...creatures]);
                setShowAddModal(false);
                setNewCreatureData({ name: '新規個体', alias: '', origin: '', generation: '', hatchDate: '-', emergenceDate: '-', maleParent: '-', femaleParent: '-', stage: '幼虫', saleStatus: '非売', sex: 'オス' });
            };

            const updateCreature = (updated) => {
                setCreatures(creatures.map(c => c.id === updated.id ? updated : c));
                setSelectedCreature(updated);
            };

            const processedCreatures = [...creatures].sort((a, b) => (a[sort.key] < b[sort.key] ? -1 : 1) * (sort.direction === 'asc' ? 1 : -1));

            const sim = useMemo(() => {
                const m = creatures.find(c => c.name === maleSelection);
                const f = creatures.find(c => c.name === femaleSelection);
                if (!m || !f) return null;
                const isSame = m.alias === f.alias;
                return [
                    { label: "近親交配係数", val: isSame ? "25.0%" : "6.25%", desc: isSame ? "純血統維持ですが累代障害リスクあり。" : "異系統交配のため遺伝的健康度が高い。" },
                    { label: "成長ポテンシャル", val: isSame ? "92点" : "98点", desc: isSame ? "形質の安定した継承が期待できます。" : "強勢効果により最大サイズの更新を期待。" },
                    { label: "累代障害発生率", val: isSame ? "4.5%" : "1.2%", desc: isSame ? "近親係数蓄積によりリスクが上昇傾向。" : "系統交差でリスクが最小限に抑制。" },
                    { label: "顎形状遺伝率", val: isSame ? "85%" : "40%", desc: isSame ? "親の顎形状が極めて強く発現します。" : "形質の多様性が現れやすい状態です。" },
                    { label: "色素遺伝率", val: isSame ? "92%" : "55%", desc: isSame ? "体色の質感が固定化されています。" : "新たな色調バリエーションの可能性。" }
                ];
            }, [maleSelection, femaleSelection, creatures]);

            if (selectedCreature) return <DetailView creature={selectedCreature} onBack={() => setSelectedCreature(null)} onUpdate={updateCreature} onGoToTree={(id) => { setHighlightId(id); setActiveTab('血統図'); setSelectedCreature(null); }} />;

            const tableHeaders = [
                {k:'saleStatus',l:'販売'}, {k:'name',l:'個体名'}, {k:'sex',l:'性別'}, {k:'alias',l:'名称'}, {k:'origin',l:'産地'}, 
                {k:'generation',l:'累代'}, {k:'size',l:'サイズ'}, {k:'hatchDate',l:'孵化日'}, {k:'stage',l:'ステージ'}, 
                {k:'temp',l:'温度'}, {k:'emergenceDate',l:'羽化日'}, {k:'maleParent',l:'オス親'}, {k:'femaleParent',l:'メス親'}
            ];

            const formFields = [
                {key:'name', label:'個体名'}, {key:'sex', label:'性別'}, {key:'alias', label:'名称'}, {key:'origin', label:'産地'}, 
                {key:'generation', label:'累代'}, {key:'hatchDate', label:'孵化日'}, {key:'emergenceDate', label:'羽化日'}, 
                {key:'maleParent', label:'オス親'}, {key:'femaleParent', label:'メス親'}, {key:'stage', label:'ステージ'}
            ];

            return (
                <div className="min-h-screen p-4">
                    <nav className="mb-4 flex justify-between items-center font-bold text-emerald-400">
                        <div className="flex flex-col"><span>Beetle Base - 全個体一覧</span><span className="text-[10px] text-neutral-500">made by ＭＨ</span></div>
                        {activeTab === '一覧' && <button onClick={() => setShowAddModal(true)} className="bg-emerald-600 px-3 py-1 rounded text-sm text-white font-bold">追加</button>}
                    </nav>

                    <div className="flex border-b border-neutral-800 mb-4">
                        {['一覧', '血統図', '交配'].map(tab => (
                            <button key={tab} onClick={() => { setActiveTab(tab); setHighlightId(null); }} className={`px-4 py-2 text-sm font-bold ${activeTab === tab ? 'text-emerald-400 border-b-2 border-emerald-400' : 'text-neutral-500'}`}>{tab}</button>
                        ))}
                    </div>

                    {activeTab === '一覧' ? (
                        <div className="overflow-x-auto bg-neutral-900 rounded-lg shadow-xl">
                            <table className="w-full text-sm border-collapse whitespace-nowrap">
                                <thead className="bg-neutral-800">
                                    <tr>
                                        {tableHeaders.map((h, i) => (<th key={h.k} className={`p-3 cursor-pointer hover:bg-neutral-700 ${i < 2 ? `sticky-col-${i+1}` : ''}`} onClick={() => setSort({key:h.k, direction: sort.key===h.k && sort.direction==='asc'?'desc':'asc'})}>{h.l}</th>))}
                                        <th className="p-3">操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {processedCreatures.map(c => (
                                        <tr key={c.id} className="border-t border-neutral-800 hover:bg-neutral-800 cursor-pointer" onClick={() => setSelectedCreature(c)}>
                                            <td className="p-3 sticky-col-1"><button onClick={(e) => toggleSaleStatus(c.id, e)} className={`px-2 py-1 rounded text-[10px] font-bold ${c.saleStatus === '販売' ? 'bg-emerald-600' : 'bg-neutral-600'}`}>{c.saleStatus}</button></td>
                                            <td className="p-3 sticky-col-2 font-bold">{c.name}</td>
                                            <td className="p-3">{c.sex}</td>
                                            <td className="p-3">{c.alias}</td>
                                            <td className="p-3">{c.origin}</td>
                                            <td className="p-3">{c.generation}</td>
                                            <td className="p-3">{c.history.length > 0 ? c.history[c.history.length - 1].size : '-'}</td>
                                            <td className="p-3">{c.hatchDate}</td>
                                            <td className="p-3">{c.stage}</td>
                                            <td className="p-3">{c.history.length > 0 ? c.history[c.history.length - 1].temp : '-'}</td>
                                            <td className="p-3">{c.emergenceDate}</td>
                                            <td className="p-3">{c.maleParent}</td>
                                            <td className="p-3">{c.femaleParent}</td>
                                            <td className="p-3"><button onClick={(e) => { e.stopPropagation(); if(confirm('削除?')) setCreatures(creatures.filter(x=>x.id!==c.id)) }} className="bg-emerald-600 px-2 py-1 rounded text-xs text-white">削除</button></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    ) : activeTab === '交配' ? (
                        <div className="bg-neutral-900 p-6 rounded-lg space-y-6 text-white text-sm">
                            <h3 className="font-bold text-emerald-400 text-lg border-b border-neutral-700 pb-2">交配シミュレーション</h3>
                            <div className="flex gap-4">
                                <select className="bg-neutral-800 p-2 rounded flex-1" value={maleSelection} onChange={e => setMaleSelection(e.target.value)}><option value="">オス親を選択</option>{creatures.filter(c => c.sex === 'オス').map(c => <option key={c.id} value={c.name}>{c.name}</option>)}</select>
                                <select className="bg-neutral-800 p-2 rounded flex-1" value={femaleSelection} onChange={e => setFemaleSelection(e.target.value)}><option value="">メス親を選択</option>{creatures.filter(c => c.sex === 'メス').map(c => <option key={c.id} value={c.name}>{c.name}</option>)}</select>
                            </div>
                            {sim && (
                                <div className="space-y-4 pt-4">
                                    {sim.metrics.map((m, i) => (
                                        <div key={i} className="p-4 border border-neutral-700 rounded bg-neutral-800">
                                            <p className="font-bold text-emerald-400">{m.label}: <span className="text-white">{m.val}</span></p>
                                            <p className="text-xs text-neutral-400 mt-1">{m.desc}</p>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    ) : null}
                </div>
            );
        }

        function DetailView({ creature, onBack, onUpdate, onGoToTree }) {
            const [form, setForm] = useState(creature);
            const [showEditModal, setShowEditModal] = useState(false);
            const [editForm, setEditForm] = useState(creature);
            const [showRecordModal, setShowRecordModal] = useState(null);
            
            const fields = [{key:'name', label:'個体名'}, {key:'sex', label:'性別'}, {key:'alias', label:'名称'}, {key:'origin', label:'産地'}, {key:'generation', label:'累代'}, {key:'hatchDate', label:'孵化日'}, {key:'emergenceDate', label:'羽化日'}, {key:'maleParent', label:'オス親'}, {key:'femaleParent', label:'メス親'}, {key:'stage', label:'ステージ'}];
            
            const saveEdit = () => { setForm(editForm); onUpdate(editForm); setShowEditModal(false); };
            const saveRecord = (record) => {
                let h = [...form.history];
                if (record.index !== null) h[record.index] = {item:record.item, size:record.size, temp:record.temp, date:record.date};
                else h.push({item:record.item, size:record.size, temp:record.temp, date:record.date || new Date().toISOString().split('T')[0]});
                const updated = {...form, history: h, stage: record.item};
                setForm(updated);
                onUpdate(updated);
                setShowRecordModal(null);
            };

            return (
                <div className="p-6 max-w-lg mx-auto">
                    <div className="flex justify-between items-center mb-4"><button onClick={onBack} className="text-emerald-400 font-bold">← 一覧に戻る</button><div className="flex gap-2"><button onClick={() => onGoToTree(creature.id)} className="bg-neutral-700 px-4 py-1 rounded text-sm font-bold">血統図へ</button><button onClick={() => { setEditForm(form); setShowEditModal(true); }} className="bg-emerald-600 px-4 py-1 rounded text-sm font-bold">編集</button></div></div>
                    
                    {/* 詳細情報に交配指標を追加 */}
                    <div className="bg-neutral-900 p-6 rounded-xl border border-neutral-700 space-y-4 text-white">
                        <h2 className="text-xl font-bold border-b border-neutral-700 pb-2">詳細情報・遺伝ポテンシャル</h2>
                        <div className="grid grid-cols-2 gap-4 text-xs bg-neutral-800 p-4 rounded">
                            <p>推定血統安定度: <span className="text-emerald-400">88%</span></p>
                            <p>成長加速係数: <span className="text-emerald-400">1.12x</span></p>
                            <p>障害発生リスク: <span className="text-emerald-400">低</span></p>
                            <p>形質発現率: <span className="text-emerald-400">良好</span></p>
                        </div>
                        <div className="grid grid-cols-[100px,1fr] gap-x-2 gap-y-2 text-sm items-center">
                            {fields.map(f => (<React.Fragment key={f.key}><p className="text-white text-left">{f.label}:</p><p className="p-2 bg-neutral-800 rounded text-white w-full">{form[f.key] || '-'}</p></React.Fragment>))}
                        </div>
                    </div>

                    {showEditModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50"><div className="bg-neutral-900 p-6 rounded-xl w-full max-w-sm border border-neutral-700 space-y-4"><h3 className="font-bold text-white">詳細情報の編集</h3>{fields.map(f => (<div key={f.key}><p className="text-[10px] text-neutral-400">{f.label}</p><input className="w-full bg-neutral-800 p-2 rounded text-white text-sm" value={editForm[f.key] || ''} onChange={e => setEditForm({...editForm, [f.key]: e.target.value})} /></div>))}<div className="flex gap-2"><button onClick={() => setShowEditModal(false)} className="w-full bg-neutral-700 py-2 rounded font-bold text-white">キャンセル</button><button onClick={saveEdit} className="w-full bg-emerald-600 py-2 rounded font-bold text-white">保存</button></div></div></div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
