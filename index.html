<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beetle Base - 統合管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-neutral-950 text-white font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [selectedCreature, setSelectedCreature] = useState(null);
            const [creatures, setCreatures] = useState([
                { id: '1', name: '個体 1号', alias: '極太血統A', origin: '福岡県久留米市', generation: 'F5', maleParent: '-', femaleParent: '-', stage: '幼虫', isForSale: false, 
                  history: [{item: '菌糸ビン交換', date: '2026-06-01', size: '15g'}, {item: '初令投入', date: '2026-04-01', size: '1g'}] },
                { id: '2', name: '個体 2号', alias: '標準タイプ', origin: '福岡県久留米市', generation: 'F5', maleParent: '-', femaleParent: '-', stage: '蛹', isForSale: true, 
                  history: [{item: '蛹化確認', date: '2026-05-20', size: '8g'}] }
            ]);

            const toggleSale = (id) => setCreatures(creatures.map(c => c.id === id ? {...c, isForSale: !c.isForSale} : c));
            const deleteCreature = (id) => { if(confirm('削除しますか？')) setCreatures(creatures.filter(c => c.id !== id)); };

            if (selectedCreature) {
                return <DetailView creature={selectedCreature} onBack={() => setSelectedCreature(null)} />;
            }

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="bg-neutral-900 border-b border-neutral-800 p-4 font-bold text-emerald-400">Beetle Base</nav>
                    <main className="p-4 overflow-x-auto">
                        <div className="bg-neutral-900 rounded-lg shadow-xl overflow-x-auto">
                            <table className="w-full text-sm border-collapse">
                                <thead>
                                    <tr className="bg-neutral-800">
                                        <th className="p-3 sticky left-0 bg-neutral-800 z-20">販売</th>
                                        <th className="p-3 sticky left-12 bg-neutral-800 z-20">個体名</th>
                                        <th className="p-3">名称</th>
                                        <th className="p-3">産地</th>
                                        <th className="p-3">累代</th>
                                        <th className="p-3">操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {creatures.map(c => (
                                        <tr key={c.id} className="border-t border-neutral-800 hover:bg-neutral-800 cursor-pointer" onClick={() => setSelectedCreature(c)}>
                                            <td className="p-3 sticky left-0 bg-neutral-900 z-10" onClick={(e) => e.stopPropagation()}>
                                                <input type="checkbox" checked={c.isForSale} onChange={() => toggleSale(c.id)} />
                                            </td>
                                            <td className="p-3 sticky left-12 bg-neutral-900 z-10 font-bold">{c.name}</td>
                                            <td className="p-3">{c.alias}</td>
                                            <td className="p-3">{c.origin}</td>
                                            <td className="p-3">{c.generation}</td>
                                            <td className="p-3"><button onClick={(e) => { e.stopPropagation(); deleteCreature(c.id); }} className="text-red-400">削除</button></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </main>
                </div>
            );
        }

        function DetailView({ creature, onBack }) {
            return (
                <div className="p-6 max-w-lg mx-auto">
                    <button onClick={onBack} className="mb-6 text-emerald-400 font-bold">← 一覧に戻る</button>
                    <div className="bg-neutral-900 p-6 rounded-xl border border-neutral-700 shadow-xl space-y-6">
                        <h2 className="text-2xl font-bold border-b border-neutral-700 pb-2">{creature.name}</h2>
                        
                        {/* 個別情報 */}
                        <div className="grid grid-cols-2 gap-4 text-sm">
                            <p className="text-neutral-400">名称:</p><p className="font-bold">{creature.alias}</p>
                            <p className="text-neutral-400">産地:</p><p className="font-bold">{creature.origin}</p>
                            <p className="text-neutral-400">累代:</p><p className="font-bold">{creature.generation}</p>
                            <p className="text-neutral-400">ステージ:</p><p className="font-bold">{creature.stage}</p>
                            <p className="text-neutral-400">オス親:</p><p className="font-bold">{creature.maleParent}</p>
                            <p className="text-neutral-400">メス親:</p><p className="font-bold">{creature.femaleParent}</p>
                        </div>

                        {/* 飼育履歴表 */}
                        <div className="border-t border-neutral-700 pt-6">
                            <h3 className="font-bold mb-3 text-emerald-400">飼育履歴</h3>
                            <table className="w-full text-sm">
                                <thead>
                                    <tr className="text-neutral-400 border-b border-neutral-700">
                                        <th className="pb-2 text-left">項目</th>
                                        <th className="pb-2 text-left">日付</th>
                                        <th className="pb-2 text-left">サイズ</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {creature.history.map((h, i) => (
                                        <tr key={i} className="border-b border-neutral-800">
                                            <td className="py-2">{h.item}</td>
                                            <td className="py-2">{h.date}</td>
                                            <td className="py-2">{h.size}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
