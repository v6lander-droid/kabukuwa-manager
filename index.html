// DetailView内のモーダル部分と更新ロジックを最適化しました
{ (showEdit || showRec) && (
    <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4">
        <div className="bg-neutral-900 p-6 rounded-xl w-full max-w-sm border border-neutral-700 space-y-4">
            <h3 className="font-bold">{showEdit ? '詳細編集' : '記録追加'}</h3>
            {showEdit ? (
                <>
                    <input className="w-full bg-neutral-800 p-2 rounded" placeholder="個体名" value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
                    <input className="w-full bg-neutral-800 p-2 rounded" type="date" value={form.hatchDate} onChange={e => setForm({...form, hatchDate: e.target.value})} />
                </>
            ) : (
                <>
                    <input className="w-full bg-neutral-800 p-2 rounded" placeholder="項目 (例: 菌糸交換)" id="rec-item" />
                    <input className="w-full bg-neutral-800 p-2 rounded" type="number" placeholder="サイズ(g)" id="rec-size" />
                </>
            )}
            <div className="flex gap-2">
                <button onClick={() => {setShowEdit(false); setShowRec(false);}} className="w-full bg-neutral-700 p-2 rounded">キャンセル</button>
                <button onClick={() => {
                    if (showRec) {
                        const newItem = {
                            date: new Date().toISOString().split('T')[0],
                            item: document.getElementById('rec-item').value,
                            size: document.getElementById('rec-size').value
                        };
                        onUpdate({...form, history: [...form.history, newItem]});
                    } else {
                        onUpdate(form);
                    }
                    setShowEdit(false); setShowRec(false);
                }} className="w-full bg-emerald-600 p-2 rounded">保存</button>
            </div>
        </div>
    </div>
)}
