<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beetle Base - Dark Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-neutral-950 text-white font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
          const [activeTab, setActiveTab] = useState('list');
          const [creatures, setCreatures] = useState([
            { id: '1', name: '個体 1号', stage: '幼虫', generation: 'F5', origin: '福岡', isForSale: false, exchangeHistory: [{size: '10g'}, {size: '15g'}] },
            { id: '2', name: '個体 2号', stage: '蛹', generation: 'F5', origin: '福岡', isForSale: true, exchangeHistory: [{size: '8g'}] }
          ]);

          const toggleSale = (id) => {
            setCreatures(creatures.map(c => c.id === id ? {...c, isForSale: !c.isForSale} : c));
          };

          const deleteCreature = (id) => {
            if(confirm('本当に削除しますか？')) setCreatures(creatures.filter(c => c.id !== id));
          };

          return (
            <div className="min-h-screen flex flex-col">
              <nav className="bg-neutral-900 p-4 border-b border-neutral-800 flex gap-4">
                <button onClick={() => setActiveTab('list')} className="font-bold">一覧</button>
              </nav>

              <main className="p-4 overflow-x-auto">
                <div className="bg-neutral-900 rounded-lg shadow-xl">
                  <table className="w-full text-sm border-collapse">
                    <thead>
                      <tr className="bg-neutral-800 text-left">
                        <th className="p-3 sticky left-0 bg-neutral-800 z-20">販売</th>
                        <th className="p-3 sticky left-12 bg-neutral-800 z-20">個体名</th>
                        <th className="p-3">累代</th>
                        <th className="p-3">ステージ</th>
                        <th className="p-3">サイズ履歴</th>
                        <th className="p-3">操作</th>
                      </tr>
                    </thead>
                    <tbody>
                      {creatures.map(c => (
                        <tr key={c.id} className="border-t border-neutral-800">
                          <td className="p-3 sticky left-0 bg-neutral-900 z-10">
                            <input type="checkbox" checked={c.isForSale} onChange={() => toggleSale(c.id)} className="w-5 h-5"/>
                          </td>
                          <td className="p-3 sticky left-12 bg-neutral-900 z-10 font-bold">{c.name}</td>
                          <td className="p-3">{c.generation}</td>
                          <td className="p-3">{c.stage}</td>
                          <td className="p-3 text-xs">{c.exchangeHistory.map(h => h.size).join(' → ')}</td>
                          <td className="p-3">
                            <button onClick={() => deleteCreature(c.id)} className="text-red-400 font-bold">削除</button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
