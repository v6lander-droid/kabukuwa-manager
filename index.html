<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beetle Base - 統合管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-neutral-950 text-white font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const generateDemoData = () => Array.from({ length: 50 }, (_, i) => ({
            id: (i + 1).toString(), name: `個体 ${i + 1}号`, alias: '極太血統',
            origin: '福岡県久留米市', generation: 'F5', maleParent: 'M-1', femaleParent: 'F-1',
            stage: '幼虫', saleStatus: '非売', hatchDate: '2026-05-01', history: []
        }));

        function App() {
            const [selectedCreature, setSelectedCreature] = useState(null);
            const [creatures, setCreatures] = useState(generateDemoData());
            const [sort, setSort] = useState({ key: 'id', direction: 'asc' });

            const toggleSaleStatus = (id, e) => {
                e.stopPropagation();
                const statuses = ['非売', '予備', '販売'];
                setCreatures(creatures.map(c => c.id === id ? { ...c, saleStatus: statuses[(statuses.indexOf(c.saleStatus) + 1) % 3] } : c));
            };

            const addNew = () => {
                const newCreature = {
                    id: Date.now().toString(), name: '新規個体', alias: '', origin: '', generation: '',
                    maleParent: '', femaleParent: '', stage: '幼虫', saleStatus: '非売', hatchDate: '-', history: []
                };
                setSelectedCreature({ data: newCreature, isNew: true });
            };

            const saveCreature = (creature, isNew) => {
                if (isNew) setCreatures([creature, ...creatures]);
                else setCreatures(creatures.map(c => c.id === creature.id ? creature : c));
                setSelectedCreature(null);
            };

            const processedCreatures = useMemo(() => {
                return [...creatures].sort((a, b) => (a[sort.key] < b[sort.key] ? -1 : 1) * (sort.direction === 'asc' ? 1 : -1));
            }, [creatures, sort]);

            if (selectedCreature) return <DetailView creature={selectedCreature.data} isNew={selectedCreature.isNew} onBack={() => setSelectedCreature(null)} onSave={saveCreature} />;

            const headers = [{k:'saleStatus',l:'販売'}, {k:'name',l:'個体名'}, {k:'alias',l:'名称'}, {k:'generation',l:'累代'}, {k:'stage',l:'ステージ'}, {k:'hatchDate',l:'羽化日'}];

            return (
                <div className="min-h-screen p-4">
                    <nav className="mb-4 flex justify-between items-center font-bold text-emerald-400">
                        <span>Beetle Base - 全個体一覧</span>
                        <button onClick={addNew} className="bg-emerald-600 px-3 py-1 rounded text-sm text-white font-bold">➕ 追加</button>
                    </nav>
                    <div className="overflow-x-auto bg-neutral-900 rounded-lg shadow-xl">
                        <table className="w-full text-sm border-collapse whitespace-nowrap">
                            <thead className="bg-neutral-800">
                                <tr>
                                    {headers.map(h => (
                                        <th key={h.k} className="p-3 cursor-pointer hover:bg-neutral-700" onClick={() => setSort({key:h.k, direction: sort.key===h.k && sort.direction==='asc'?'desc':'asc'})}>
                                            {h.l} <span className="opacity-50">{sort.key === h.k && sort.direction === 'asc' ? '▲' : '▼'}</span>
                                        </th>
                                    ))}
                                    <th className="p-3">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                {processedCreatures.map(c => (
                                    <tr key={c.id} className="border-t border-neutral-800 hover:bg-neutral-800 cursor-pointer" onClick={() => setSelectedCreature({data:c, isNew:false})}>
                                        <td className="p-3"><button onClick={(e) => toggleSaleStatus(c.id, e)} className={`px-2 py-1 rounded text-[10px] font-bold ${c.saleStatus === '販売' ? 'bg-emerald-600' : c.saleStatus === '予備' ? 'bg-amber-600' : 'bg-neutral-600'}`}>{c.saleStatus}</button></td>
                                        <td className="p-3 font-bold">{c.name}</td><td className="p-3">{c.alias}</td><td className="p-3">{c.generation}</td><td className="p-3">{c.stage}</td><td className="p-3">{c.hatchDate}</td>
                                        <td className="p-3"><button onClick={(e) => { e.stopPropagation(); if(confirm('削除?')) setCreatures(creatures.filter(x=>x.id!==c.id)) }} className="bg-emerald-600 px-2 py-1 rounded text-xs text-white">削除</button></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function DetailView({ creature, isNew, onBack, onSave }) {
            const [form, setForm] = useState(creature);
            const [showModal, setShowModal] = useState(null);
            const fields = [{key:'name', label:'個体名'}, {key:'alias', label:'名称'}, {key:'origin', label:'産地'}, {key:'generation', label:'累代'}, {key:'hatchDate', label:'羽化日'}, {key:'maleParent', label:'オス親'}, {key:'femaleParent', label:'メス親'}, {key:'stage', label:'ステージ'}];
            
            // 飼育記録のサイズをカンマ区切りで表示
            const sizeDisplay = form.history.map(h => h.size).join(', ') || '未計測';

            const saveRecord = (record) => {
                let h = [...form.history];
                if (record.index !== null) h[record.index] = {item:record.item, size:record.size, date:h[record.index].date};
                else h.push({item:record.item, size:record.size, date:new Date().toISOString().split('T')[0]});
                
                let newStage = '幼虫';
                if (record.item.includes('羽化')) newStage = '成虫';
                else if (record.item.includes('蛹化')) newStage = '蛹';
                
                setForm({...form, history: h, stage: newStage});
                setShowModal(null);
            };

            return (
                <div className="p-6 max-w-lg mx-auto">
                    <button onClick={onBack} className="mb-4 text-emerald-400 font-bold">← 一覧に戻る</button>
                    <div className="bg-neutral-900 p-6 rounded-xl border border-neutral-700 space-y-4">
                        <h2 className="text-xl font-bold border-b pb-2">{isNew ? '新規個体登録' : '詳細情報'}</h2>
                        <div className="grid grid-cols-2 gap-2 text-sm">{fields.map(f => <React.Fragment key={f.key}><p className="text-neutral-400">{f.label}:</p><input className="bg-neutral-800 p-1 w-full" value={form[f.key]} onChange={e=>setForm({...form, [f.key]:e.target.value})} /></React.Fragment>)}</div>
                        
                        <div className="bg-neutral-800 p-2 rounded text-sm"><p className="text-neutral-400">計測サイズ一覧:</p><p className="font-bold">{sizeDisplay}</p></div>

                        <div className="border-t border-neutral-700 pt-4">
                            <div className="flex justify-between items-center mb-3">
                                <h3 className="font-bold">飼育記録</h3>
                                <button onClick={() => setShowModal({item:'', size:'', index:null})} className="bg-emerald-600 px-2 py-1 rounded text-xs text-white">追加</button>
                            </div>
                            <table className="w-full text-xs">
                                <thead><tr className="text-neutral-400 border-b border-neutral-700 text-left"><th>項目</th><th>日付</th><th>サイズ</th><th>操作</th></tr></thead>
                                <tbody>{form.history.map((h,i) => <tr key={i} className="border-b border-neutral-800"><td>{h.item}</td><td>{h.date}</td><td>{h.size}</td><td><button onClick={() => setShowModal({item:h.item, size:h.size, index:i})} className="bg-emerald-600 px-1 rounded text-white">訂正</button></td></tr>)}</tbody>
                            </table>
                        </div>
                        <button onClick={() => onSave(form, isNew)} className="w-full bg-emerald-600 py-2 rounded font-bold text-white">保存</button>
                    </div>

                    {showModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4">
                            <div className="bg-neutral-900 p-6 rounded-xl w-full max-w-sm border border-neutral-700 space-y-4">
                                <h3 className="font-bold">{showModal.index !== null ? '記録の訂正' : '記録の追加'}</h3>
                                <input placeholder="項目" className="w-full bg-neutral-800 p-2 rounded" value={showModal.item} onChange={e=>setShowModal({...showModal, item:e.target.value})} />
                                <input placeholder="サイズ" className="w-full bg-neutral-800 p-2 rounded" value={showModal.size} onChange={e=>setShowModal({...showModal, size:e.target.value})} />
                                <button onClick={() => saveRecord(showModal)} className="w-full bg-emerald-600 py-2 rounded font-bold text-white">保存</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
