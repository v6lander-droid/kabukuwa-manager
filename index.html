<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beetle Base - 統合ブリーディング管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .sticky-col-1 { position: sticky; left: 0; z-index: 20; background-color: #171717; }
        .sticky-col-2 { position: sticky; left: 60px; z-index: 20; background-color: #171717; }
        thead th.sticky-col-1, thead th.sticky-col-2 { background-color: #262626; z-index: 30; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #404040; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #525252; }
    </style>
</head>
<body class="bg-neutral-950 text-white font-sans selection:bg-emerald-500/30">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            const [selectedCreature, setSelectedCreature] = useState(null);
            const [activeTab, setActiveTab] = useState('一覧');
            const [highlightId, setHighlightId] = useState(null);
            const [showAddModal, setShowAddModal] = useState(false);
            const [maleSelection, setMaleSelection] = useState('');
            const [femaleSelection, setFemaleSelection] = useState('');
            const [newCreatureData, setNewCreatureData] = useState({ 
                name: '', alias: '', origin: '', generation: 'F1', hatchDate: '-', emergenceDate: '-', 
                maleParent: '-', femaleParent: '-', stage: '幼虫', saleStatus: '非売', sex: 'オス' 
            });
            
            const [creatures, setCreatures] = useState(() => {
                const saved = localStorage.getItem('beetle_data');
                if (saved) return JSON.parse(saved);
                
                const sampleStages = ['孵化', '1令', '2令', '3令', '蛹', '成虫'];
                return Array.from({ length: 10 }, (_, i) => {
                    const historyLength = 3 + Math.floor(Math.random() * 3);
                    const history = Array.from({ length: historyLength }, (_, j) => ({
                        item: sampleStages[j] || '経過観察',
                        date: `2026-04-${10 + j}`,
                        size: j === historyLength -1 && j >= 4 ? `${75 + i}mm` : `${1 + j * 8}g`,
                        temp: `${22 + (i % 3)}℃`
                    }));
                    return {
                        id: (i + 1).toString(), 
                        name: `個体 ${i + 1}号`, 
                        alias: i < 5 ? 'Aライン' : 'Bライン', 
                        origin: '福岡県久留米市', 
                        generation: `F${(i % 3) + 1}`, 
                        maleParent: i > 2 ? `個体 ${i - 1}号` : '種親オス(野生)', 
                        femaleParent: '種親メス', 
                        stage: history[history.length - 1].item, 
                        saleStatus: '非売', 
                        hatchDate: '2026-04-01', 
                        emergenceDate: i < 8 ? '2026-09-15' : '-', 
                        history: history,
                        sex: i % 2 === 0 ? 'オス' : 'メス'
                    };
                });
            });

            const [sort, setSort] = useState({ key: 'id', direction: 'asc' });

            useEffect(() => { localStorage.setItem('beetle_data', JSON.stringify(creatures)); }, [creatures]);

            const toggleSaleStatus = (id, e) => {
                e.stopPropagation();
                const statuses = ['非売', '予備', '販売'];
                setCreatures(creatures.map(c => c.id === id ? { ...c, saleStatus: statuses[(statuses.indexOf(c.saleStatus) + 1) % 3] } : c));
            };

            const confirmAdd = () => {
                const newCreature = { ...newCreatureData, id: Date.now().toString(), history: [] };
                setCreatures([newCreature, ...creatures]);
                setShowAddModal(false);
                setNewCreatureData({ name: '', alias: '', origin: '', generation: 'F1', hatchDate: '-', emergenceDate: '-', maleParent: '-', femaleParent: '-', stage: '幼虫', saleStatus: '非売', sex: 'オス' });
            };

            const updateCreature = (updated) => {
                setCreatures(creatures.map(c => c.id === updated.id ? updated : c));
                setSelectedCreature(updated);
            };

            const processedCreatures = useMemo(() => {
                return [...creatures].sort((a, b) => (a[sort.key] < b[sort.key] ? -1 : 1) * (sort.direction === 'asc' ? 1 : -1));
            }, [creatures, sort]);

            const detailedSim = useMemo(() => {
                const male = creatures.find(c => c.id === maleSelection);
                const female = creatures.find(c => c.id === femaleSelection);
                if (!male || !female) return null;
                const genMale = parseInt(male.generation.replace(/[^0-9]/g, '')) || 1;
                const genFemale = parseInt(female.generation.replace(/[^0-9]/g, '')) || 1;
                const isSameLine = male.alias === female.alias;
                return {
                    nextGenStr: isSameLine ? `F${Math.max(genMale, genFemale) + 1}` : `CBF1`,
                    lineRisk: isSameLine ? "インブリード（蓄積あり）" : "アウトブリード（リセット）",
                    mendel: { largejaw: isSameLine ? "75%" : "25%", darkColor: "50%", vitality: !isSameLine ? "極めて高い" : "安定" },
                    expectedSize: `${((parseFloat(male.history.slice(-1)[0]?.size) || 70) + (parseFloat(female.history.slice(-1)[0]?.size) || 70)) / 2 + 5}mm`
                };
            }, [maleSelection, femaleSelection, creatures]);

            if (selectedCreature) return (
                <DetailView 
                    creature={selectedCreature} 
                    onBack={() => setSelectedCreature(null)} 
                    onUpdate={updateCreature} 
                    onGoToTree={(id) => { setHighlightId(id); setActiveTab('血統図'); setSelectedCreature(null); }} 
                />
            );

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <nav className="mb-6 flex justify-between items-end border-b border-neutral-800 pb-4">
                        <h1 className="text-2xl font-black text-emerald-500 tracking-tighter">BEETLE BASE</h1>
                        {activeTab === '一覧' && <button onClick={() => setShowAddModal(true)} className="bg-emerald-600 px-6 py-2 rounded-full text-sm font-black">新規追加</button>}
                    </nav>

                    <div className="flex gap-2 mb-6">
                        {['一覧', '血統図', '交配'].map(tab => (
                            <button key={tab} onClick={() => setActiveTab(tab)} className={`px-6 py-2 rounded-lg font-bold ${activeTab === tab ? 'bg-neutral-800 text-emerald-400' : 'text-neutral-500'}`}>{tab}</button>
                        ))}
                    </div>

                    {activeTab === '一覧' && (
                        <div className="overflow-x-auto bg-neutral-900 rounded-2xl border border-neutral-800 shadow-xl">
                            <table className="w-full text-sm">
                                <thead>
                                    <tr className="bg-neutral-800/50">
                                        {['販売', '個体名', '性別', '名称', '累代', 'サイズ'].map(h => <th key={h} className="p-4 text-left font-bold">{h}</th>)}
                                    </tr>
                                </thead>
                                <tbody>
                                    {processedCreatures.map(c => (
                                        <tr key={c.id} className="border-t border-neutral-800 hover:bg-neutral-800 cursor-pointer" onClick={() => setSelectedCreature(c)}>
                                            <td className="p-4"><button onClick={(e) => toggleSaleStatus(c.id, e)} className="text-[10px] bg-neutral-700 px-2 py-1 rounded">{c.saleStatus}</button></td>
                                            <td className="p-4 font-black">{c.name}</td>
                                            <td className="p-4">{c.sex}</td>
                                            <td className="p-4">{c.alias}</td>
                                            <td className="p-4">{c.generation}</td>
                                            <td className="p-4">{c.history.slice(-1)[0]?.size || '-'}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}

                    {activeTab === '交配' && (
                        <div className="bg-neutral-900 p-8 rounded-2xl space-y-6">
                            <h3 className="font-bold text-emerald-400">交配シミュレーション解析</h3>
                            <div className="flex gap-4">
                                <select className="w-full bg-neutral-800 p-3 rounded-lg" onChange={e => setMaleSelection(e.target.value)}>
                                    <option value="">オス親を選択</option>
                                    {creatures.filter(c => c.sex === 'オス').map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                </select>
                                <select className="w-full bg-neutral-800 p-3 rounded-lg" onChange={e => setFemaleSelection(e.target.value)}>
                                    <option value="">メス親を選択</option>
                                    {creatures.filter(c => c.sex === 'メス').map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                </select>
                            </div>
                            {detailedSim && (
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 p-6 bg-neutral-800 rounded-xl border border-neutral-700">
                                    <div>
                                        <p className="text-emerald-400 font-bold mb-2">【解析結果】</p>
                                        <p>予測累代: <span className="font-black">{detailedSim.nextGenStr}</span></p>
                                        <p>近親リスク: {detailedSim.lineRisk}</p>
                                        <p>期待サイズ: <span className="font-black">{detailedSim.expectedSize}</span></p>
                                    </div>
                                    <div>
                                        <p className="text-emerald-400 font-bold mb-2">【形質遺伝確率】</p>
                                        <p>太顎出現率: {detailedSim.mendel.largejaw}</p>
                                        <p>活力予測: {detailedSim.mendel.vitality}</p>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        function DetailView({ creature, onBack, onUpdate, onGoToTree }) {
            const [editForm, setEditForm] = useState(creature);
            return (
                <div className="p-8 max-w-2xl mx-auto space-y-6">
                    <button onClick={onBack} className="text-emerald-400 font-bold">← 一覧に戻る</button>
                    <div className="bg-neutral-900 p-8 rounded-2xl border border-neutral-700">
                        <h2 className="text-3xl font-black mb-4">{creature.name} ({creature.sex})</h2>
                        <button onClick={() => onGoToTree(creature.id)} className="bg-neutral-700 px-4 py-2 rounded text-sm font-bold mr-2">血統図</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
