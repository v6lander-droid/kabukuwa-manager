<!DOCTYPE html>
<html lang="ja">
<head>

        (function() {

                document.getElementById('apple-touch-icon').href = icon;

    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .sticky-col-1 { position: sticky; left: 0; z-index: 10; background-color: #171717; }
        .sticky-col-2 { position: sticky; left: 44px; z-index: 10; background-color: #171717; }

        tbody tr .sticky-col-1, tbody tr .sticky-col-2 { background-color: #171717; }

        ::-webkit-scrollbar-thumb:hover { background: #525252; }

            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px 2px 6px;
            border-radius: 9999px;
            font-size: 10px;
            font-weight: bold;

        }

</head>
<body class="bg-neutral-950 text-white font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const COMPARE_COLORS = [
            { border: '#10b981', bg: 'rgba(16,185,129,0.15)', text: '#10b981', label: 'emerald' },
            { border: '#f59e0b', bg: 'rgba(245,158,11,0.15)', text: '#f59e0b', label: 'amber' },
            { border: '#3b82f6', bg: 'rgba(59,130,246,0.15)', text: '#3b82f6', label: 'blue' },
            { border: '#ec4899', bg: 'rgba(236,72,153,0.15)', text: '#ec4899', label: 'pink' },
            { border: '#a855f7', bg: 'rgba(168,85,247,0.15)', text: '#a855f7', label: 'purple' },
            { border: '#ef4444', bg: 'rgba(239,68,68,0.15)', text: '#ef4444', label: 'red' },
            { border: '#06b6d4', bg: 'rgba(6,182,212,0.15)', text: '#06b6d4', label: 'cyan' },
            { border: '#84cc16', bg: 'rgba(132,204,22,0.15)', text: '#84cc16', label: 'lime' },
        ];

        // ========== 遺伝計算ユーティリティ ==========
        function getAncestors(name, nameMap, depth = 0, visited = new Map()) {
            if (depth > 6) return visited;
            const c = nameMap[name];
            if (!c) return visited;
            if (!visited.has(name)) visited.set(name, []);
            visited.get(name).push(depth);
            getAncestors(c.maleParent, nameMap, depth + 1, visited);
            getAncestors(c.femaleParent, nameMap, depth + 1, visited);
            return visited;
        }

        function calcF(maleParentName, femaleParentName, nameMap) {
            if (!maleParentName || maleParentName === '-' || !femaleParentName || femaleParentName === '-') return 0;
            const mAnc = getAncestors(maleParentName, nameMap);
            const fAnc = getAncestors(femaleParentName, nameMap);
            let F = 0;
            mAnc.forEach((mDepths, name) => {
                if (fAnc.has(name)) {
                    fAnc.get(name).forEach(n2 => {
                        mDepths.forEach(n1 => { F += Math.pow(0.5, n1 + n2 + 1); });
                    });
                }
            });
            return Math.min(F, 1);
        }

        function calcSelfF(creature, nameMap) {
            return calcF(creature.maleParent, creature.femaleParent, nameMap);
        }

        function calcR(nameA, nameB, nameMap) {
            if (!nameA || !nameB || nameA === nameB) return nameA === nameB ? 1 : 0;
            const ancA = getAncestors(nameA, nameMap, 0);
            const ancB = getAncestors(nameB, nameMap, 0);
            ancA.set(nameA, [0]);
            ancB.set(nameB, [0]);
            let r = 0;
            ancA.forEach((dA, name) => {
                if (ancB.has(name)) {
                    ancB.get(name).forEach(dB => {
                        dA.forEach(dAv => { r += Math.pow(0.5, dAv + dB); });
                    });
                }
            });
            return Math.min(r, 1);
        }

        function fRiskInfo(F) {
            const col = gradColor(F, 0.25);
            if (F === 0)       return { label: '血縁なし',                        color: col };
            if (F < 0.0625)    return { label: '低度',                            color: col };
            if (F < 0.125)     return { label: '中度（いとこ交配相当）',           color: col };
            if (F < 0.25)      return { label: '高度（半きょうだい交配相当）',     color: col };
            return               { label: '非常に高度（きょうだい・親子交配相当）', color: col };
        }

        function fRiskDesc(F) {
            if (F === 0)    return '登録されている血統情報の範囲内では共通祖先が確認されません。遺伝的多様性が高い交配です。';
            if (F < 0.0625) return '近親交配係数は低く、遺伝的健康度は良好です。';
            if (F < 0.125)  return 'いとこ交配（F=6.25%）に相当する近親度です。形質固定の効果はありますが、累代が進むにつれリスクが蓄積します。';
            if (F < 0.25)   return '半きょうだい交配（F=12.5%）相当です。有害遺伝子が顕在化するリスクが高まります。累代には注意が必要です。';
            return 'きょうだいまたは親子交配（F=25%以上）相当です。累代障害のリスクが非常に高く、系統外交配を強く推奨します。';
        }

        function gradColor(v, max) {
            const t = Math.min(v / max, 1);
            let r, g, b;
            if (t < 0.5) {
                const s = t / 0.5;
                r = Math.round(16  + (234 - 16)  * s);
                g = Math.round(185 + (179 - 185) * s);
                b = Math.round(129 + (8   - 129) * s);
            } else {
                const s = (t - 0.5) / 0.5;
                r = Math.round(234 + (239 - 234) * s);
                g = Math.round(179 + (68  - 179) * s);
                b = Math.round(8   + (68  - 8)   * s);
            }
            return `rgb(${r},${g},${b})`;
        }

        function barColor(v, max = 0.25) {
            return gradColor(v, max);
        }

        // 性別判定ヘルパー（オス/雄/♂ → blue, メス/雌/♀ → pink）
        function sexColor(sex) {
            if (!sex) return '#ffffff';
            if (sex === 'オス' || sex === '雄' || sex === '♂') return '#60a5fa';
            if (sex === 'メス' || sex === '雌' || sex === '♀') return '#f472b6';
            if (sex.indexOf('オス') !== -1 || sex.indexOf('雄') !== -1 || sex.indexOf('♂') !== -1) return '#60a5fa';
            if (sex.indexOf('メス') !== -1 || sex.indexOf('雌') !== -1 || sex.indexOf('♀') !== -1) return '#f472b6';
            return '#ffffff';
        }
        function isMale(sex) {
            if (!sex) return false;
            return sex === 'オス' || sex === '雄' || sex === '♂' ||
                   sex.indexOf('オス') !== -1 || sex.indexOf('雄') !== -1 || sex.indexOf('♂') !== -1;
        }
        function isFemale(sex) {
            if (!sex) return false;
            return sex === 'メス' || sex === '雌' || sex === '♀' ||
                   sex.indexOf('メス') !== -1 || sex.indexOf('雌') !== -1 || sex.indexOf('♀') !== -1;
        }

        // 重複IDを検出し、重複している個体に新しいIDを振り直す
        // （オス親・メス親の参照は個体名で行っているため、IDの変更による影響はない）
        function dedupeIds(creatures) {
            const seen = new Set();
            let changed = false;
            const result = creatures.map((c, i) => {
                let id = c.id != null ? String(c.id) : '';
                if (!id || seen.has(id)) {
                    id = `${Date.now().toString()}_${i}_${Math.random().toString(36).slice(2, 8)}`;
                    changed = true;
                }
                seen.add(id);
                return id === c.id ? c : { ...c, id };
            });
            if (changed) {
                console.warn('重複したID、または未設定のIDを検出したため、自動的に修正しました。');
            }
            return result;
        }

        // =============================================

        // ---- 年/月/日いずれか1列分のスクロールピッカー ----
        // 中央（選択位置）に来た項目が選択値になる。スクロールスナップで止まった位置を検出する。
        function ScrollPickerColumn({ items, value, onChange, formatLabel }) {
            const containerRef = useRef(null);
            const ITEM_H = 40;
            const isProgrammaticScroll = useRef(false);

            useEffect(() => {
                if (!containerRef.current) return;
                const idx = items.indexOf(value);
                if (idx < 0) return;
                isProgrammaticScroll.current = true;
                containerRef.current.scrollTop = idx * ITEM_H;
                const t = setTimeout(() => { isProgrammaticScroll.current = false; }, 50);
                return () => clearTimeout(t);
                // eslint-disable-next-line
            }, []);

            const handleScrollEnd = () => {
                if (!containerRef.current || isProgrammaticScroll.current) return;
                const idx = Math.round(containerRef.current.scrollTop / ITEM_H);
                const clamped = Math.max(0, Math.min(items.length - 1, idx));
                if (items[clamped] !== value) onChange(items[clamped]);
                // スナップ位置を正確に合わせる
                containerRef.current.scrollTop = clamped * ITEM_H;
            };

            const scrollTimer = useRef(null);
            const handleScroll = () => {
                if (isProgrammaticScroll.current) return;
                if (scrollTimer.current) clearTimeout(scrollTimer.current);
                scrollTimer.current = setTimeout(handleScrollEnd, 120);
            };

            return (
                <div className="relative" style={{ height: ITEM_H * 3, width: '100%' }}>
                    {/* 中央の選択位置を示す帯 */}
                    <div className="absolute left-0 right-0 pointer-events-none border-y border-neutral-600 bg-neutral-700/30" style={{ top: ITEM_H, height: ITEM_H }}></div>
                    <div
                        ref={containerRef}
                        onScroll={handleScroll}
                        className="overflow-y-auto h-full"
                        style={{ scrollSnapType: 'y mandatory', WebkitOverflowScrolling: 'touch' }}
                    >
                        {/* 上下に1項目分ずつ余白（パディング）を入れて、最初/最後の項目も中央に来られるようにする */}
                        <div style={{ height: ITEM_H }}></div>
                        {items.map(item => (
                            <div
                                key={item}
                                className={`flex items-center justify-center text-sm select-none ${item === value ? 'text-white font-bold' : 'text-neutral-500'}`}
                                style={{ height: ITEM_H, scrollSnapAlign: 'center' }}
                            >
                                {formatLabel ? formatLabel(item) : item}
                            </div>
                        ))}
                        <div style={{ height: ITEM_H }}></div>
                    </div>
                </div>
            );
        }

        // ---- 日付入力コンポーネント（不明対応、年/月/日スクロールピッカー方式）----
        // value: 'YYYY-MM-DD'形式の日付文字列、または不明を表す'-'
        // onChange(value): 値が変わった時に呼ばれる
        function DateInput({ value, onChange, className }) {
            // isUnknownは「不明（'-'）」の場合のみtrueにする。
            // 空文字列('')は「まだ日付が選択されていないが不明ではない（=入力可能な状態）」を表すため、
            // isUnknownには含めない（含めると、不明チェックを外しても入力欄がdisabledのままになるバグになる）。
            const isUnknown = value === '-';
            const today = new Date().toISOString().slice(0, 10);
            const [showPicker, setShowPicker] = useState(false);
            const [draftDate, setDraftDate] = useState(null); // { y, m, d } ピッカー内で編集中の一時値

            const parseYMD = (v) => {
                const base = (v && v !== '-') ? v : today;
                const [y, m, d] = base.split('-').map(Number);
                return { y, m, d };
            };

            const openPicker = () => {
                setDraftDate(parseYMD(value));
                setShowPicker(true);
            };

            const daysInMonth = (y, m) => new Date(y, m, 0).getDate();

            const confirmPicker = () => {
                if (!draftDate) return;
                const maxDay = daysInMonth(draftDate.y, draftDate.m);
                const d = Math.min(draftDate.d, maxDay);
                const pad = (n) => String(n).padStart(2, '0');
                onChange(`${draftDate.y}-${pad(draftDate.m)}-${pad(d)}`);
                setShowPicker(false);
            };

            const thisYear = new Date().getFullYear();
            const years = Array.from({ length: 41 }, (_, i) => thisYear - 30 + i); // 過去30年〜未来10年
            const months = Array.from({ length: 12 }, (_, i) => i + 1);
            const days = draftDate ? Array.from({ length: daysInMonth(draftDate.y, draftDate.m) }, (_, i) => i + 1) : [];

            const displayLabel = isUnknown ? '不明' : (value ? value : '日付を選択');

            return (
                <div className="flex items-center gap-2">
                    <button
                        type="button"
                        onClick={openPicker}
                        disabled={isUnknown}
                        className={`${className} text-left disabled:opacity-50 disabled:cursor-not-allowed`}
                    >
                        {displayLabel}
                    </button>
                    <label className="flex items-center gap-1 text-[10px] text-neutral-400 whitespace-nowrap shrink-0">
                        <input
                            type="checkbox"
                            checked={isUnknown}
                            onChange={e => onChange(e.target.checked ? '-' : today)}
                        />
                        不明
                    </label>

                    {showPicker && draftDate && (
                        <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-[3000] px-4" onClick={() => setShowPicker(false)}>
                            <div className="bg-neutral-900 border border-neutral-700 rounded-xl w-full max-w-xs p-4" onClick={e => e.stopPropagation()}>
                                <div className="text-sm font-bold text-white mb-3 text-center">日付を選択</div>
                                <div className="flex gap-2">
                                    <div className="flex-[1.3]">
                                        <div className="text-[9px] text-neutral-500 text-center mb-1">年</div>
                                        <ScrollPickerColumn items={years} value={draftDate.y} onChange={y => setDraftDate(prev => ({ ...prev, y }))} formatLabel={y => `${y}年`} />
                                    </div>
                                    <div className="flex-1">
                                        <div className="text-[9px] text-neutral-500 text-center mb-1">月</div>
                                        <ScrollPickerColumn items={months} value={draftDate.m} onChange={m => setDraftDate(prev => ({ ...prev, m }))} formatLabel={m => `${m}月`} />
                                    </div>
                                    <div className="flex-1">
                                        <div className="text-[9px] text-neutral-500 text-center mb-1">日</div>
                                        <ScrollPickerColumn items={days} value={Math.min(draftDate.d, days.length)} onChange={d => setDraftDate(prev => ({ ...prev, d }))} formatLabel={d => `${d}日`} />
                                    </div>
                                </div>
                                <div className="flex gap-2 mt-4">
                                    <button onClick={() => setShowPicker(false)} className="flex-1 bg-neutral-700 hover:bg-neutral-600 py-2 rounded text-xs text-white font-bold">キャンセル</button>
                                    <button onClick={confirmPicker} className="flex-1 bg-emerald-600 hover:bg-emerald-500 py-2 rounded text-xs text-white font-bold">決定</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function PedigreeView({ creatures, highlightId, onSelect, onUpdateGridPos, pedigreeLines, onUpdateLines, gridSize, onUpdateGridSize, onInsertRow, onInsertCol, onDeleteRow, onDeleteCol }) {
            const CARD_W = 112;
            const CARD_H = 72;
            const CELL_GAP = 24;
            // X方向のグリッド単位（CELL_W）はカード幅+間隔の半分にする。
            // カード自体の表示幅（CARD_W）は変えないため、1枚のカードは横方向に2セル分の幅を占めることになり、
            // セル単位ではより細かく（半セルずつ）カードを配置できる。
            const CELL_W = (CARD_W + CELL_GAP) / 2;
            const CELL_H = CARD_H + CELL_GAP;
            const TRAY_H = 110; // 一時置き場の高さ（上端配置）

            const containerRef = useRef(null);
            const trayRef = useRef(null);
            const ghostRef = useRef(null);
            const [containerWidth, setContainerWidth] = useState(0);
            const [zoomFactor, setZoomFactor] = useState(1);
            const [pan, setPan] = useState({ x: 0, y: 0 });
            const [editMode, setEditMode] = useState(false);
            // lineMode: null（通常）/ 'add'（線追加）/ 'edit'（線編集：タップで選択、端点/中間ドラッグで形状変更・移動）
            const [lineMode, setLineMode] = useState(null);
            const [selectedLineId, setSelectedLineId] = useState(null); // 線編集モードで選択中の線
            const [draggingId, setDraggingId] = useState(null);
            const [draggingCreature, setDraggingCreature] = useState(null);
            const [dragFromTray, setDragFromTray] = useState(false);
            const [lineDraft, setLineDraft] = useState(null);
            // 線編集モード用：どの線の何を掴んでいるか（'start'端点 / 'end'端点 / 'whole'全体移動）
            const [editingLine, setEditingLine] = useState(null); // { id, grabType, startSnapshot: {x1,y1,x2,y2,bendAfterX}, startGX, startGY }
            // 行・列挿入/削除モード：null（通常）/ 'insertRow' / 'insertCol' / 'deleteRow' / 'deleteCol'
            const [insertMode, setInsertMode] = useState(null);
            const [insertTargetIndex, setInsertTargetIndex] = useState(null); // ドラッグ中、対象として選択されているインデックス
            const [pendingInsert, setPendingInsert] = useState(null); // { type, index } 確認ダイアログ表示中の操作予定
            const cardRefs = useRef({});
            const dragState = useRef({ startX: 0, startY: 0, origRow: 0, origCol: 0 });
            const lineDragState = useRef({ startGX: 0, startGY: 0 });
            const touchState = useRef({ mode: null, startDist: 0, startZoom: 1, startPan: { x: 0, y: 0 }, startMid: { x: 0, y: 0 }, startSingle: { x: 0, y: 0 } });

            useEffect(() => {
                const updateWidth = () => {
                    if (containerRef.current) setContainerWidth(containerRef.current.clientWidth);
                };
                updateWidth();
                window.addEventListener('resize', updateWidth);
                return () => window.removeEventListener('resize', updateWidth);
            }, []);

            const rows = gridSize.rows;
            const cols = gridSize.cols;
            const svgW = cols * CELL_W + CELL_GAP;
            const svgH = rows * CELL_H + CELL_GAP;
            // 初期表示のスケール：グリッド全体ではなく「VISIBLE_CELLS セル分」が画面に収まる大きさを基準にする。
            // グリッド全体がそれより小さい（個体数が少ない）場合は、グリッド全体に収まるスケールを使う。
            const VISIBLE_CELLS = 10;
            const visibleAreaW = VISIBLE_CELLS * CELL_W + CELL_GAP;
            const baseScale = containerWidth > 0 ? Math.min(1, containerWidth / Math.min(svgW, visibleAreaW)) : 1;
            const scale = baseScale * zoomFactor;

            // カードの中心座標がグリッド線の交点（x = col*CELL_W + CELL_GAP/2, y = row*CELL_H + CELL_GAP/2）に
            // 一致するように計算する。
            const cellToPx = (row, col) => ({
                x: CELL_GAP / 2 + col * CELL_W,
                y: CELL_GAP / 2 + row * CELL_H,
            });

            // gridPosが現在のグリッドサイズの範囲内にある有効な値かどうかを判定する。
            // 過去のバージョンとの互換性や、グリッド縮小等で範囲外になったgridPosを持つ個体を
            // 「行方不明」にしないため、無効なgridPosは未配置（一時置き場行き）として扱う。
            const isValidGridPos = (gp) => gp && Number.isInteger(gp.row) && Number.isInteger(gp.col) && gp.row >= 0 && gp.row < rows && gp.col >= 0 && gp.col < cols;

            const occupied = {};
            creatures.forEach(c => { if (isValidGridPos(c.gridPos)) occupied[`${c.gridPos.row}_${c.gridPos.col}`] = c; });

            // 一時置き場に表示する個体：gridPos未設定、または範囲外の無効なgridPosを持つもの。
            // 登録順（新しい順）はcreatures配列の並び順に依存する
            // （Appで新規追加時に配列の先頭に追加しているため、creatures配列自体が新しい順）。
            const trayCreatures = creatures.filter(c => !isValidGridPos(c.gridPos));

            // ---- カードのドラッグ＆ドロップ（一時置き場からも、描画エリア内でも同じ仕組みで扱う） ----
            const handleCardPointerDown = (e, creature, fromTray) => {
                if (!editMode || lineMode) return;
                e.stopPropagation();
                e.preventDefault();
                setDraggingId(creature.id);
                setDraggingCreature(creature);
                setDragFromTray(fromTray);
                const point = e.touches ? e.touches[0] : e;
                dragState.current = {
                    startX: point.clientX,
                    startY: point.clientY,
                    origRow: creature.gridPos ? creature.gridPos.row : 0,
                    origCol: creature.gridPos ? creature.gridPos.col : 0,
                };
                // ゴースト要素の初期位置をポインタ位置に合わせる
                requestAnimationFrame(() => {
                    if (ghostRef.current) {
                        ghostRef.current.style.left = (point.clientX - CARD_W / 2) + 'px';
                        ghostRef.current.style.top = (point.clientY - CARD_H / 2) + 'px';
                    }
                });
            };

            useEffect(() => {
                if (!draggingId) return;
                const handleMove = (e) => {
                    if (e.cancelable) e.preventDefault();
                    const point = e.touches ? e.touches[0] : e;
                    const ghost = ghostRef.current;
                    if (!ghost) return;
                    // ゴースト要素はtransformの影響を受けない最上位に配置されているため、
                    // ポインタの画面座標（clientX/clientY）をそのままfixed位置として使える。
                    ghost.style.left = (point.clientX - CARD_W / 2) + 'px';
                    ghost.style.top = (point.clientY - CARD_H / 2) + 'px';

                    const containerRect = containerRef.current.getBoundingClientRect();
                    const localX = (point.clientX - containerRect.left - pan.x) / scale;
                    const localY = (point.clientY - containerRect.top - pan.y) / scale;
                    const targetCol = Math.max(0, Math.min(cols - 1, Math.round((localX - CELL_GAP / 2) / CELL_W)));
                    const targetRow = Math.max(0, Math.min(rows - 1, Math.round((localY - CELL_GAP / 2) / CELL_H)));
                    const isOverGrid = point.clientX >= containerRect.left && point.clientX <= containerRect.right && point.clientY >= containerRect.top && point.clientY <= containerRect.bottom;
                    ghost.dataset.overGrid = isOverGrid ? '1' : '0';
                    if (isOverGrid) {
                        ghost.dataset.targetRow = targetRow;
                        ghost.dataset.targetCol = targetCol;
                        ghost.style.outline = '2px solid #34d399';
                    } else {
                        ghost.style.outline = 'none';
                    }
                };
                const handleUp = () => {
                    const ghost = ghostRef.current;
                    if (ghost) {
                        const overGrid = ghost.dataset.overGrid === '1';
                        if (overGrid && ghost.dataset.targetRow != null) {
                            const newRow = parseInt(ghost.dataset.targetRow, 10);
                            const newCol = parseInt(ghost.dataset.targetCol, 10);
                            const key = `${newRow}_${newCol}`;
                            if (!occupied[key] || occupied[key].id === draggingId) {
                                onUpdateGridPos(draggingId, { row: newRow, col: newCol });
                            }
                        } else if (!overGrid && !dragFromTray) {
                            // 描画エリアのカードを一時置き場側（グリッド外）にドロップしたら、一時置き場に戻す
                            onUpdateGridPos(draggingId, null);
                        }
                    }
                    setDraggingId(null);
                    setDraggingCreature(null);
                    setDragFromTray(false);
                };
                window.addEventListener('mousemove', handleMove);
                window.addEventListener('mouseup', handleUp);
                window.addEventListener('touchmove', handleMove, { passive: false });
                window.addEventListener('touchend', handleUp);
                return () => {
                    window.removeEventListener('mousemove', handleMove);
                    window.removeEventListener('mouseup', handleUp);
                    window.removeEventListener('touchmove', handleMove);
                    window.removeEventListener('touchend', handleUp);
                };
            }, [draggingId, dragFromTray, scale, rows, cols, pan]);

            // ---- 線の追加（タップ＆ドラッグ、直線またはL字のみ） ----
            const getSvgPoint = (e) => {
                const rect = containerRef.current.getBoundingClientRect();
                const point = e.touches ? e.touches[0] : e;
                const screenX = point.clientX - rect.left - pan.x;
                const screenY = point.clientY - rect.top - pan.y;
                return { x: screenX / scale, y: screenY / scale };
            };
            // 線の座標は常に最も近いグリッド交点（縦横の線が交差する点）にスナップする
            const snapToGridIntersection = (pt) => {
                const c = Math.round((pt.x - CELL_GAP / 2) / CELL_W);
                const r = Math.round((pt.y - CELL_GAP / 2) / CELL_H);
                return { x: CELL_GAP / 2 + c * CELL_W, y: CELL_GAP / 2 + r * CELL_H };
            };

            // ---- 行・列挿入モード：ドラッグで挿入位置（帯）を選び、指を離した位置で確認ダイアログを出す ----
            const isRowMode = (m) => m === 'row' || m === 'deleteRow';
            const isDeleteMode = (m) => m === 'deleteRow' || m === 'deleteCol';
            // 削除対象の行・列にカードが1枚でも配置されているかを判定する
            const rowHasCard = (idx) => creatures.some(c => isValidGridPos(c.gridPos) && c.gridPos.row === idx);
            const colHasCard = (idx) => creatures.some(c => isValidGridPos(c.gridPos) && c.gridPos.col === idx);

            const handleInsertStart = (e) => {
                if (!insertMode) return;
                e.preventDefault();
                const pt = getSvgPoint(e);
                if (isRowMode(insertMode)) {
                    const idx = isDeleteMode(insertMode)
                        ? Math.max(0, Math.min(rows - 1, Math.floor((pt.y - CELL_GAP / 2) / CELL_H)))
                        : Math.max(0, Math.min(rows, Math.round((pt.y - CELL_GAP / 2) / CELL_H)));
                    setInsertTargetIndex(idx);
                } else {
                    const idx = isDeleteMode(insertMode)
                        ? Math.max(0, Math.min(cols - 1, Math.floor((pt.x - CELL_GAP / 2) / CELL_W)))
                        : Math.max(0, Math.min(cols, Math.round((pt.x - CELL_GAP / 2) / CELL_W)));
                    setInsertTargetIndex(idx);
                }
            };
            const handleInsertMove = (e) => {
                if (!insertMode) return;
                e.preventDefault();
                const pt = getSvgPoint(e);
                if (isRowMode(insertMode)) {
                    const idx = isDeleteMode(insertMode)
                        ? Math.max(0, Math.min(rows - 1, Math.floor((pt.y - CELL_GAP / 2) / CELL_H)))
                        : Math.max(0, Math.min(rows, Math.round((pt.y - CELL_GAP / 2) / CELL_H)));
                    setInsertTargetIndex(idx);
                } else {
                    const idx = isDeleteMode(insertMode)
                        ? Math.max(0, Math.min(cols - 1, Math.floor((pt.x - CELL_GAP / 2) / CELL_W)))
                        : Math.max(0, Math.min(cols, Math.round((pt.x - CELL_GAP / 2) / CELL_W)));
                    setInsertTargetIndex(idx);
                }
            };
            const handleInsertEnd = () => {
                if (!insertMode || insertTargetIndex == null) return;
                // カードが配置されている行/列は削除不可。ドラッグ中は赤帯で示しているため、
                // ここでは確認ダイアログを出さず、何も起きないようにする（エラー表示もしない）。
                if (insertMode === 'deleteRow' && rowHasCard(insertTargetIndex)) {
                    setInsertTargetIndex(null);
                    return;
                }
                if (insertMode === 'deleteCol' && colHasCard(insertTargetIndex)) {
                    setInsertTargetIndex(null);
                    return;
                }
                // 確認ダイアログ表示前にinsertModeを解除し、window.addEventListenerで貼っている
                // touchmove/touchend/mousemove/mouseupのグローバルリスナーを即座に外す。
                // これを残したままだと、ダイアログのOKボタンへの最初のタップがこの古いリスナーと
                // 競合し、1回目の操作が反映されない（2回目でようやく反応する）原因になる。
                setPendingInsert({ type: insertMode, index: insertTargetIndex });
                setInsertMode(null);
            };
            useEffect(() => {
                if (!insertMode) return;
                const moveHandler = (e) => handleInsertMove(e);
                const endHandler = () => handleInsertEnd();
                window.addEventListener('touchmove', moveHandler, { passive: false });
                window.addEventListener('touchend', endHandler);
                window.addEventListener('mousemove', moveHandler);
                window.addEventListener('mouseup', endHandler);
                return () => {
                    window.removeEventListener('touchmove', moveHandler);
                    window.removeEventListener('touchend', endHandler);
                    window.removeEventListener('mousemove', moveHandler);
                    window.removeEventListener('mouseup', endHandler);
                };
            }, [insertMode, insertTargetIndex, scale, pan, rows, cols]);

            // ---- 線追加モード ----
            const handleLineStart = (e) => {
                if (lineMode !== 'add') return;
                e.preventDefault();
                const pt = snapToGridIntersection(getSvgPoint(e));
                lineDragState.current = { startGX: pt.x, startGY: pt.y };
                setLineDraft({ x1: pt.x, y1: pt.y, x2: pt.x, y2: pt.y });
            };
            const handleLineMove = (e) => {
                if (lineMode !== 'add' || !lineDraft) return;
                e.preventDefault();
                const pt = snapToGridIntersection(getSvgPoint(e));
                setLineDraft(prev => prev ? { ...prev, x2: pt.x, y2: pt.y } : null);
            };
            const handleLineEnd = () => {
                if (lineMode !== 'add' || !lineDraft) return;
                const dx = Math.abs(lineDraft.x2 - lineDraft.x1);
                const dy = Math.abs(lineDraft.y2 - lineDraft.y1);
                if (dx > 5 || dy > 5) {
                    const newLine = {
                        id: `line_${Date.now()}_${Math.random().toString(36).slice(2, 6)}`,
                        x1: lineDraft.x1, y1: lineDraft.y1, x2: lineDraft.x2, y2: lineDraft.y2,
                        bendAfterX: dx >= dy,
                    };
                    onUpdateLines([...pedigreeLines, newLine]);
                }
                setLineDraft(null);
            };

            // ---- 線編集モード：タップで選択、選択中の線のみ端点ドラッグで長さ変更・中間部ドラッグで移動可能 ----
            // 端点・線分とみなす許容距離。画面上での見た目のタップしやすさが一定になるよう、
            // グリッド座標系の値を表示倍率(scale)で割って、ズームアウト時も指で掴みやすくする。
            // また、全体移動より端点優先で確実に判定できるよう、従来より広めの値にする。
            const LINE_GRAB_BASE_PX = 28; // 画面上での見た目の許容半径（px）
            const LINE_GRAB_THRESHOLD = LINE_GRAB_BASE_PX / scale;
            const distToSegment = (px, py, x1, y1, x2, y2) => {
                const dx = x2 - x1, dy = y2 - y1;
                if (dx === 0 && dy === 0) return Math.hypot(px - x1, py - y1);
                const t = Math.max(0, Math.min(1, ((px - x1) * dx + (py - y1) * dy) / (dx * dx + dy * dy)));
                const projX = x1 + t * dx, projY = y1 + t * dy;
                return Math.hypot(px - projX, py - projY);
            };
            const findNearestLineHit = (pt) => {
                // タップ位置に最も近い線・部位を探す（端点優先、なければ線分上の近さで判定）。
                // 端点同士が近い場合は、最も近い端点を優先的に選ぶ。
                let best = null;
                pedigreeLines.forEach(l => {
                    const distStart = Math.hypot(pt.x - l.x1, pt.y - l.y1);
                    const distEnd = Math.hypot(pt.x - l.x2, pt.y - l.y2);
                    if (distStart <= LINE_GRAB_THRESHOLD && (!best || distStart < best.dist)) best = { id: l.id, grabType: 'start', dist: distStart };
                    if (distEnd <= LINE_GRAB_THRESHOLD && (!best || distEnd < best.dist)) best = { id: l.id, grabType: 'end', dist: distEnd };
                });
                if (!best) {
                    pedigreeLines.forEach(l => {
                        const midX = l.bendAfterX ? l.x2 : l.x1;
                        const midY = l.bendAfterX ? l.y1 : l.y2;
                        const d1 = distToSegment(pt.x, pt.y, l.x1, l.y1, midX, midY);
                        const d2 = distToSegment(pt.x, pt.y, midX, midY, l.x2, l.y2);
                        const d = Math.min(d1, d2);
                        if (d <= LINE_GRAB_THRESHOLD && (!best || d < best.dist)) best = { id: l.id, grabType: 'whole', dist: d };
                    });
                }
                return best;
            };
            const handleLineEditStart = (e) => {
                if (lineMode !== 'edit') return;
                e.preventDefault();
                e.stopPropagation();
                const pt = getSvgPoint(e);
                const hit = findNearestLineHit(pt);
                if (!hit) {
                    // 何もない場所をタップしたら選択解除
                    setSelectedLineId(null);
                    return;
                }
                if (hit.id !== selectedLineId) {
                    // 未選択の線をタップした場合は、まず選択するだけ（この操作ではドラッグ編集は開始しない）
                    setSelectedLineId(hit.id);
                    return;
                }
                // 既に選択中の線の端点・中間部をタップした場合は、そのままドラッグ編集を開始する
                const target = pedigreeLines.find(l => l.id === hit.id);
                setEditingLine({ id: hit.id, grabType: hit.grabType, startSnapshot: { ...target }, startGX: pt.x, startGY: pt.y });
            };
            const handleLineEditMove = (e) => {
                if (lineMode !== 'edit' || !editingLine) return;
                e.preventDefault();
                const pt = getSvgPoint(e);
                const { id, grabType, startSnapshot, startGX, startGY } = editingLine;
                const dx = pt.x - startGX, dy = pt.y - startGY;
                onUpdateLines(pedigreeLines.map(l => {
                    if (l.id !== id) return l;
                    if (grabType === 'start') {
                        const snapped = snapToGridIntersection({ x: startSnapshot.x1 + dx, y: startSnapshot.y1 + dy });
                        return { ...l, x1: snapped.x, y1: snapped.y };
                    }
                    if (grabType === 'end') {
                        const snapped = snapToGridIntersection({ x: startSnapshot.x2 + dx, y: startSnapshot.y2 + dy });
                        return { ...l, x2: snapped.x, y2: snapped.y };
                    }
                    // whole: 線全体を平行移動（形状は変えない）。両端それぞれをグリッド交点にスナップする。
                    const snappedStart = snapToGridIntersection({ x: startSnapshot.x1 + dx, y: startSnapshot.y1 + dy });
                    const snappedEnd = snapToGridIntersection({ x: startSnapshot.x2 + dx, y: startSnapshot.y2 + dy });
                    return { ...l, x1: snappedStart.x, y1: snappedStart.y, x2: snappedEnd.x, y2: snappedEnd.y };
                }));
            };
            const handleLineEditEnd = () => {
                setEditingLine(null);
            };

            // 線追加モード中のtouchmove/touchendは、Reactの合成イベント（onTouchMove等）だと
            // ブラウザによってはpassiveリスナーとして扱われpreventDefault()が効かない場合があるため、
            // カードドラッグと同様にwindow.addEventListenerで確実にハンドリングする。
            useEffect(() => {
                if (lineMode !== 'add' || !lineDraft) return;
                const moveHandler = (e) => handleLineMove(e);
                const endHandler = () => handleLineEnd();
                window.addEventListener('touchmove', moveHandler, { passive: false });
                window.addEventListener('touchend', endHandler);
                window.addEventListener('mousemove', moveHandler);
                window.addEventListener('mouseup', endHandler);
                return () => {
                    window.removeEventListener('touchmove', moveHandler);
                    window.removeEventListener('touchend', endHandler);
                    window.removeEventListener('mousemove', moveHandler);
                    window.removeEventListener('mouseup', endHandler);
                };
            }, [lineMode, lineDraft, scale, pan]);

            // 線編集モード中のドラッグも同様にwindowリスナーで一元処理する
            useEffect(() => {
                if (lineMode !== 'edit' || !editingLine) return;
                const moveHandler = (e) => handleLineEditMove(e);
                const endHandler = () => handleLineEditEnd();
                window.addEventListener('touchmove', moveHandler, { passive: false });
                window.addEventListener('touchend', endHandler);
                window.addEventListener('mousemove', moveHandler);
                window.addEventListener('mouseup', endHandler);
                return () => {
                    window.removeEventListener('touchmove', moveHandler);
                    window.removeEventListener('touchend', endHandler);
                    window.removeEventListener('mousemove', moveHandler);
                    window.removeEventListener('mouseup', endHandler);
                };
            }, [lineMode, editingLine, scale, pan, pedigreeLines]);

            // ---- ピンチズーム・パン ----
            const getTouchDist = (touches) => { const dx = touches[0].clientX - touches[1].clientX; const dy = touches[0].clientY - touches[1].clientY; return Math.sqrt(dx * dx + dy * dy); };
            const getTouchMid = (touches) => ({ x: (touches[0].clientX + touches[1].clientX) / 2, y: (touches[0].clientY + touches[1].clientY) / 2 });
            const handleTouchStart = (e) => {
                if (lineMode === 'add') { handleLineStart(e); return; }
                if (lineMode === 'edit') { handleLineEditStart(e); return; }
                if (insertMode) { handleInsertStart(e); return; }
                if (e.touches.length === 2) {
                    touchState.current.mode = 'pinch';
                    touchState.current.startDist = getTouchDist(e.touches);
                    touchState.current.startZoom = zoomFactor;
                    touchState.current.startPan = { ...pan };
                    const rect = containerRef.current.getBoundingClientRect();
                    // ズームの基準は指の位置ではなく、常に「現在表示されているエリアの中心」（コンテナの中心）にする
                    touchState.current.startMid = { x: rect.width / 2, y: rect.height / 2 };
                } else if (e.touches.length === 1) {
                    // カード上のタッチはhandleCardPointerDown内でstopPropagationされるため、
                    // ここに届くのは「何もない余白部分」のタッチのみ。編集モード中もパン操作を許可する。
                    touchState.current.mode = 'pan';
                    touchState.current.startPan = { ...pan };
                    touchState.current.startSingle = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                }
            };
            const handleTouchMove = (e) => {
                if (lineMode === 'add' || lineMode === 'edit' || insertMode) return; // useEffect内のwindowリスナーで一元処理する
                if (touchState.current.mode === 'pinch' && e.touches.length === 2) {
                    e.preventDefault();
                    const dist = getTouchDist(e.touches);
                    const ratio = dist / touchState.current.startDist;
                    const newZoom = Math.min(20, Math.max(0.3, touchState.current.startZoom * ratio));
                    const oldScale = baseScale * touchState.current.startZoom;
                    const newScale = baseScale * newZoom;
                    const mid = touchState.current.startMid;
                    const startPan = touchState.current.startPan;
                    const contentX = (mid.x - startPan.x) / oldScale;
                    const contentY = (mid.y - startPan.y) / oldScale;
                    setZoomFactor(newZoom);
                    setPan({ x: mid.x - contentX * newScale, y: mid.y - contentY * newScale });
                } else if (touchState.current.mode === 'pan' && e.touches.length === 1) {
                    const dx = e.touches[0].clientX - touchState.current.startSingle.x;
                    const dy = e.touches[0].clientY - touchState.current.startSingle.y;
                    setPan({ x: touchState.current.startPan.x + dx, y: touchState.current.startPan.y + dy });
                }
            };
            const handleTouchEnd = (e) => {
                if (lineMode === 'add' || lineMode === 'edit' || insertMode) return; // useEffect内のwindowリスナーで一元処理する
                if (e.touches.length === 0) touchState.current.mode = null;
                else if (e.touches.length === 1) {
                    touchState.current.mode = 'pan';
                    touchState.current.startPan = { ...pan };
                    touchState.current.startSingle = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                }
            };

            const GridCard = ({ creature }) => {
                if (!isValidGridPos(creature.gridPos)) return null;
                const p = cellToPx(creature.gridPos.row, creature.gridPos.col);
                const isDragging = draggingId === creature.id;
                return (
                    <div
                        ref={(el) => { if (el) cardRefs.current[creature.id] = el; else delete cardRefs.current[creature.id]; }}
                        onClick={() => { if (!editMode && !lineMode) onSelect(creature); }}
                        onMouseDown={(e) => handleCardPointerDown(e, creature, false)}
                        onTouchStart={(e) => handleCardPointerDown(e, creature, false)}
                        style={{ position: 'absolute', left: p.x - CARD_W / 2, top: p.y - CARD_H / 2, width: CARD_W, height: CARD_H, borderTopWidth: 4, borderTopStyle: 'solid', borderTopColor: isMale(creature.sex) ? '#60a5fa' : '#f472b6', opacity: isDragging ? 0.3 : 1 }}
                        className={`${editMode && !lineMode ? 'cursor-move' : lineMode ? 'cursor-crosshair' : 'cursor-pointer'} rounded-lg border px-2 py-1.5 text-center select-none transition-all hover:scale-105 ${highlightId === creature.id ? 'bg-emerald-900 border-emerald-400' : 'bg-neutral-800 border-neutral-700 hover:border-neutral-400'}`}
                    >
                        <div style={{ color: sexColor(creature.sex) }} className="text-[9px] font-bold">
                            <i className={`fa-solid ${isMale(creature.sex) ? 'fa-mars' : 'fa-venus'}`}></i>
                        </div>
                        <div className="font-bold text-[11px] text-white leading-tight truncate mt-0.5">{creature.name}</div>
                        <div className="text-[9px] text-neutral-400">{creature.generation}</div>
                        <div className="text-[9px] text-neutral-300">{creature.stage}</div>
                    </div>
                );
            };

            const TrayCard = ({ creature }) => {
                const isDragging = draggingId === creature.id;
                return (
                    <div
                        ref={(el) => { if (el) cardRefs.current[creature.id] = el; else delete cardRefs.current[creature.id]; }}
                        onClick={() => { if (!editMode && !lineMode) onSelect(creature); }}
                        onMouseDown={(e) => handleCardPointerDown(e, creature, true)}
                        onTouchStart={(e) => handleCardPointerDown(e, creature, true)}
                        style={{ width: CARD_W, height: CARD_H, transform: `scale(${scale})`, transformOrigin: 'center center', borderTopWidth: 4, borderTopStyle: 'solid', borderTopColor: isMale(creature.sex) ? '#60a5fa' : '#f472b6', opacity: isDragging ? 0.3 : 1 }}
                        className={`${editMode ? 'cursor-move' : 'cursor-pointer'} rounded-lg border px-2 py-1.5 text-center select-none shrink-0 ${highlightId === creature.id ? 'bg-emerald-900 border-emerald-400' : 'bg-neutral-800 border-neutral-700 hover:border-neutral-400'}`}
                    >
                        <div style={{ color: sexColor(creature.sex) }} className="text-[9px] font-bold">
                            <i className={`fa-solid ${isMale(creature.sex) ? 'fa-mars' : 'fa-venus'}`}></i>
                        </div>
                        <div className="font-bold text-[11px] text-white leading-tight truncate mt-0.5">{creature.name}</div>
                        <div className="text-[9px] text-neutral-400">{creature.generation}</div>
                        <div className="text-[9px] text-neutral-300">{creature.stage}</div>
                    </div>
                );
            };

            const linePoints = (l) => {
                if (l.bendAfterX) return `${l.x1},${l.y1} ${l.x2},${l.y1} ${l.x2},${l.y2}`;
                return `${l.x1},${l.y1} ${l.x1},${l.y2} ${l.x2},${l.y2}`;
            };
            const deleteSelectedLine = () => {
                if (!selectedLineId) return;
                onUpdateLines(pedigreeLines.filter(l => l.id !== selectedLineId));
                setSelectedLineId(null);
            };

            return (
                <React.Fragment>
                <div className="bg-neutral-900 p-4 rounded-lg">
                    <div className="flex items-center gap-3 mb-4 flex-wrap">
                        <h3 className="font-bold text-emerald-400 text-sm">血統図</h3>
                        <span className="text-[10px] flex items-center gap-1"><span className="inline-block w-3 h-0.5" style={{backgroundColor:'#60a5fa'}}></span>オス</span>
                        <span className="text-[10px] flex items-center gap-1"><span className="inline-block w-3 h-0.5" style={{backgroundColor:'#f472b6'}}></span>メス</span>
                        <div className="ml-auto flex items-center gap-2 flex-wrap">
                            <button
                                onClick={() => {
                                    const next = !editMode;
                                    setEditMode(next);
                                    if (!next) { setLineMode(null); setSelectedLineId(null); }
                                }}
                                className={`px-2 py-1 rounded text-[10px] font-bold border ${editMode ? 'bg-amber-600 text-white border-amber-500' : 'bg-neutral-800 text-neutral-300 border-neutral-700 hover:border-neutral-500'}`}
                            >
                                <i className="fa-solid fa-arrows-up-down-left-right mr-1"></i>{editMode ? '編集モード中' : '編集モード'}
                            </button>
                            {editMode && (
                                <React.Fragment>
